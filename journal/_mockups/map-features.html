<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex">
<title>Map features prototype — What's Moving + Time Scrubber</title>
<link rel="icon" type="image/svg+xml" href="/media/img/favicon.svg">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet" />
<style>
  :root{--purple:#A78BFA;--purple-light:#B9A6FF;--gold:#E6C574;--green:#1FDF67;--amber:#F5A623;--ink:#0b0a12}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0c0e12;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:#fff}
  #map{position:absolute;inset:0}
  .mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib{opacity:.25}

  /* top-left control panel */
  .panel{position:absolute;top:16px;left:16px;z-index:5;background:rgba(14,14,18,.86);backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 16px;width:268px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .eyebrow{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--purple-light)}
  .panel h1{font-size:16px;font-weight:800;margin:4px 0 12px}
  .toggle{display:flex;align-items:center;gap:11px;cursor:pointer;padding:9px 10px;border-radius:11px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);transition:.15s}
  .toggle:hover{background:rgba(255,255,255,.06)}
  .toggle.on{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.1)}
  .sw{width:34px;height:20px;border-radius:999px;background:rgba(255,255,255,.15);position:relative;flex:0 0 auto;transition:.2s}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on .sw{background:var(--purple)}
  .toggle.on .sw::after{left:16px}
  .toggle .tt{font-size:13px;font-weight:600}
  .toggle .td{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
  .legend{margin-top:12px;display:flex;flex-direction:column;gap:6px;font-size:11.5px;color:rgba(255,255,255,.6)}
  .legend .row{display:flex;align-items:center;gap:8px}
  .dotc{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 1.5px rgba(255,255,255,.5)}

  /* time scrubber */
  .scrub{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:5;width:min(620px,92vw);
    background:rgba(14,14,18,.86);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:16px;
    padding:14px 18px 16px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .scrub-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .play{width:40px;height:40px;border-radius:50%;border:1px solid rgba(167,139,250,.5);background:rgba(167,139,250,.14);
    color:#fff;cursor:pointer;display:grid;place-items:center;flex:0 0 auto;transition:.15s}
  .play:hover{background:rgba(167,139,250,.26)}
  .play svg{width:17px;height:17px}
  .yr{font-size:30px;font-weight:800;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1}
  .yr small{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.02em}
  .cnt{margin-left:auto;text-align:right}
  .cnt b{font-size:22px;font-weight:800;color:var(--purple-light);font-variant-numeric:tabular-nums}
  .cnt span{display:block;font-size:11px;color:rgba(255,255,255,.5)}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:999px;
    background:linear-gradient(90deg,var(--purple) var(--pct,100%),rgba(255,255,255,.12) var(--pct,100%));outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;
    box-shadow:0 0 0 4px rgba(167,139,250,.3),0 2px 6px rgba(0,0,0,.5);cursor:pointer}
  .ticks{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:rgba(255,255,255,.4);font-variant-numeric:tabular-nums}

  /* pulsing halo markers (What's Moving) */
  .pulse-mk{width:14px;height:14px;border-radius:50%;background:var(--purple-light);
    box-shadow:0 0 0 2px rgba(255,255,255,.9),0 0 12px rgba(167,139,250,.9);position:relative;cursor:pointer}
  .pulse-mk::before,.pulse-mk::after{content:"";position:absolute;inset:50%;width:14px;height:14px;border-radius:50%;
    border:2px solid var(--purple);transform:translate(-50%,-50%);animation:halo 2.2s ease-out infinite}
  .pulse-mk::after{animation-delay:1.1s}
  @keyframes halo{0%{width:14px;height:14px;opacity:.85}100%{width:62px;height:62px;opacity:0}}
  .mapboxgl-popup-content{background:#16141c;color:#fff;border-radius:12px;border:1px solid rgba(167,139,250,.4);font-family:inherit;padding:10px 13px;box-shadow:0 14px 40px rgba(0,0,0,.55)}
  .mapboxgl-popup-content b{color:var(--purple-light)}
  .mapboxgl-popup-tip{display:none}
  .pp-t{font-weight:700;font-size:13px}.pp-s{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
  .pp-tag{display:inline-block;margin-top:6px;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--purple-light);border:1px solid rgba(167,139,250,.5);border-radius:5px;padding:2px 6px}
  .loading{position:absolute;inset:0;display:grid;place-items:center;z-index:9;color:rgba(255,255,255,.6);font-size:14px}
</style>
</head>
<body>
  <div id="map"></div>
  <div class="loading" id="loading">Loading the pipeline…</div>

  <div class="panel">
    <div class="eyebrow">Map of Tomorrow · Prototype</div>
    <h1>Interactive layers</h1>
    <div class="toggle on" id="movingToggle">
      <span class="sw"></span>
      <span><span class="tt">What's moving</span><span class="td">Pulse recent milestones</span></span>
    </div>
    <div class="legend">
      <div class="row"><span class="dotc" style="background:var(--purple-light)"></span> Moved in the last weeks</div>
      <div class="row"><span class="dotc" style="background:var(--green)"></span> Under construction</div>
      <div class="row"><span class="dotc" style="background:var(--amber)"></span> Announced / breaking ground</div>
      <div class="row"><span class="dotc" style="background:#8aa0b5"></span> Now open</div>
    </div>
  </div>

  <div class="scrub">
    <div class="scrub-top">
      <button class="play" id="play" aria-label="Play"><svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="yr" id="yrLabel">All<small>delivering by year</small></div>
      <div class="cnt"><b id="cnt">—</b><span>projects visible</span></div>
    </div>
    <input type="range" id="slider" min="0" max="100" value="100">
    <div class="ticks" id="ticks"></div>
  </div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiZmxvcmlkYW9mdG9tb3Jyb3ciLCJhIjoiY2xrYmpmdGQ2MGdibTNzcXZjMnA4aXh3ZiJ9.uBeYS7jmKwWS6xAgY-R1UA';
const map = new mapboxgl.Map({
  container:'map', style:'mapbox://styles/floridaoftomorrow/clkbk4qlw000a01qw94rj0xa7',
  center:[-80.1, 26.7], zoom:6.3, attributionControl:false
});
const norm = s => String(s==null?'':s).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
const yearOf = p => { const m=String(p.DeliveryDate||'').match(/20\d{2}/); return m?+m[0]:0; };
const statusColor = ['match',['get','status'],
  'Under Construction','#1FDF67',
  'Now Open','#8aa0b5',
  'Announced','#F5A623','Breaking Ground','#F5A623','Opening Soon','#F5A623',
  '#A78BFA'];

let MIN=2024, MAX=2030, curYear=null, playing=false, playTimer=null, movingOn=true, movingMarkers=[], FEATS=[];

Promise.all([
  fetch('/map/projects-flat.json',{cache:'no-cache'}).then(r=>r.json()),
  fetch('/map/pulse.json',{cache:'no-cache'}).then(r=>r.ok?r.json():{events:[]}).catch(()=>({events:[]}))
]).then(([projects, pulse])=>{
  // "moving" set: projects with a milestone in the recent feed (most recent ~12
  // by event date — production wires this to the 2-week Pulse window).
  const events=(pulse.events||[]).slice().sort((a,b)=> new Date(b.event_date||b.timestamp)-new Date(a.event_date||a.timestamp));
  const movingSet=new Set(events.slice(0,12).map(e=>norm(e.project_title||e.title)));

  const feats=[]; const years=[];
  projects.forEach(p=>{
    const la=parseFloat(p.Latitude), ln=parseFloat(p.Longitude);
    if(!isFinite(la)||!isFinite(ln)) return;
    const y=yearOf(p); if(y) years.push(y);
    feats.push({type:'Feature',geometry:{type:'Point',coordinates:[ln,la]},
      properties:{title:p.Title||'',city:p.City||'',status:p.Delivery||'',year:y||0,
        moving: movingSet.has(norm(p.Title))?1:0, delivery:(p.DeliveryDate||'')}});
  });
  if(years.length){ MIN=Math.min(...years); MAX=Math.max(...years); }
  FEATS=feats; curYear=MAX;

  map.on('load',()=>{
    document.getElementById('loading').remove();
    map.addSource('proj',{type:'geojson',data:{type:'FeatureCollection',features:feats}});
    map.addLayer({id:'pins',type:'circle',source:'proj',
      paint:{'circle-radius':['interpolate',['linear'],['zoom'],5,3.4,11,6.5,15,9],
        'circle-color':statusColor,'circle-stroke-width':1.4,'circle-stroke-color':'rgba(255,255,255,.85)',
        'circle-opacity':0.92}});
    applyYear(MAX);
    buildMovingMarkers(feats);
    buildTicks();
    map.on('click','pins',e=>{ const p=e.features[0].properties;
      new mapboxgl.Popup({offset:12,closeButton:false}).setLngLat(e.lngLat)
        .setHTML('<div class="pp-t">'+esc(p.title)+'</div><div class="pp-s">'+esc(p.city)+' · '+esc(p.status||'')+(p.delivery?' · delivers '+esc(p.delivery):'')+'</div>'+(p.moving==1?'<span class="pp-tag">● Moving now</span>':'')).addTo(map); });
    map.on('mouseenter','pins',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','pins',()=>map.getCanvas().style.cursor='');
  });
});

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---- What's Moving: pulsing DOM halos on the moving projects ----
function buildMovingMarkers(feats){
  feats.filter(f=>f.properties.moving==1).forEach(f=>{
    const el=document.createElement('div'); el.className='pulse-mk';
    const mk=new mapboxgl.Marker({element:el}).setLngLat(f.geometry.coordinates).addTo(map);
    el.addEventListener('click',()=>{ const p=f.properties;
      new mapboxgl.Popup({offset:14,closeButton:false}).setLngLat(f.geometry.coordinates)
      .setHTML('<div class="pp-t">'+esc(p.title)+'</div><div class="pp-s">'+esc(p.city)+' · '+esc(p.status||'')+'</div><span class="pp-tag">● Moving now</span>').addTo(map); });
    movingMarkers.push(el.parentElement||el);
  });
  setMovingVisible(movingOn);
}
function setMovingVisible(on){ movingMarkers.forEach(m=>{ m.style.display=on?'':'none'; });
  if(map.getLayer('pins')) map.setPaintProperty('pins','circle-opacity', on?0.62:0.92); }
document.getElementById('movingToggle').addEventListener('click',function(){
  movingOn=!movingOn; this.classList.toggle('on',movingOn); setMovingVisible(movingOn); });

// ---- Time scrubber ----
const slider=document.getElementById('slider');
function applyYear(y){ curYear=y;
  if(map.getLayer('pins')) map.setFilter('pins',['any',['==',['get','year'],0],['<=',['get','year'],y]]);
  const c=document.getElementById('cnt');
  if(map.getSource('proj')){ /* count via querySourceFeatures after render */ }
  document.getElementById('yrLabel').innerHTML = (y>=MAX?'All':y)+'<small>delivering by year</small>';
  const pct=((y-MIN)/(MAX-MIN))*100; slider.style.setProperty('--pct',pct+'%');
  updateCount(y);
}
function countByYear(y){ return FEATS.filter(f=>{const fy=f.properties.year; return fy===0||fy<=y;}).length; }
function updateCount(y){ document.getElementById('cnt').textContent = FEATS.length ? countByYear(y).toLocaleString() : '—'; }
slider.addEventListener('input',()=>{ stopPlay(); const y=Math.round(MIN+(slider.value/100)*(MAX-MIN)); applyYear(y); });
function buildTicks(){
  const t=document.getElementById('ticks'); t.innerHTML='';
  for(let y=MIN;y<=MAX;y++){ const s=document.createElement('span'); s.textContent=("'"+String(y).slice(2)); t.appendChild(s); }
  applyYear(MAX);
}
const playBtn=document.getElementById('play'), playIcon=document.getElementById('playIcon');
function startPlay(){ playing=true; playIcon.innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  let y=curYear>=MAX?MIN:curYear; applyYear(y); slider.value=((y-MIN)/(MAX-MIN))*100;
  playTimer=setInterval(()=>{ y++; if(y>MAX){ stopPlay(); return; } applyYear(y); slider.value=((y-MIN)/(MAX-MIN))*100; }, 900);
}
function stopPlay(){ playing=false; clearInterval(playTimer); playIcon.innerHTML='<path d="M8 5v14l11-7z"/>'; }
playBtn.addEventListener('click',()=>{ playing?stopPlay():startPlay(); });
</script>
</body>
</html>
