<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Atlas — Markets of Tomorrow</title>
<link rel="icon" type="image/svg+xml" href="/media/img/favicon.svg">
<meta name="description" content="The Atlas — every tracked project in the Markets of Tomorrow pipeline on one canvas: leaderboards, momentum, openings, and coverage.">
<link rel="canonical" href="https://www.oftmw.com/atlas">
<meta property="og:title" content="The Atlas — Markets of Tomorrow">
<meta property="og:description" content="Every tracked project on one canvas — leaderboards, momentum, openings, and coverage.">
<meta property="og:url" content="https://www.oftmw.com/atlas">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://pub-7da0281887564d10a10107987c7c6c0c.r2.dev" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* CSS vars the shared journal chrome + dock expect (mirrors the journal pages). */
  :root{
    --ink:#070807; --ink-2:#0c0e0c; --panel:#131613;
    --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.14);
    --white:#fff; --cream:#ECEAE5; --mute:#9AA39C; --mute-2:#C2C9C3;
    --green:#1FDF67; --green-soft:#42EB81; --gold:#e6c574; --gold-soft:#f0d68a; --purple:#A78BFA; --purple-soft:#B9A6FF; --purple-bright:#A78BFA;
    --accent:#1FDF67; --orange:#FF9500; --blue:#6FA8FF; --warn:#FFD300;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --mono:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --serif:'Fraunces',Georgia,serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:auto}
  /* Native Atlas: the page scrolls normally. The shared journal chrome
     header is sticky at the top (position:sticky; top:0; z-index:60 — see
     journal-chrome.js); the atlas content flows below it. This replaces the
     old cross-origin iframe with a first-party render of atlas.json. */
  body{background:#0a0a0a; color:var(--cream); font-family:var(--sans); -webkit-font-smoothing:antialiased; min-height:100%}
  /* The shared chrome footer isn't shown — the atlas carries its own footer
     line. Leave room at the bottom for the fixed dock. */
  .tmw-chrome-foot{display:none !important}

  /* ───────────────────────────────────────────────────────────────────
     ATLAS — ported from the map (repo-root index.html). The .atlas-overlay
     was a fixed full-takeover on the map (hidden until atlas-mode); here it
     is a normal-flow always-visible block below the sticky header.
     ─────────────────────────────────────────────────────────────────── */
  .atlas-overlay {
    position: relative;
    background: #0a0a0a;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .atlas-container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  @media(max-width:800px) { .atlas-container { padding: 0 18px; } }

  /* Top padding gives the content air below the sticky header; bottom
     padding clears the fixed dock (position:fixed; bottom:22px). */
  .atlas-body { padding: 0 0 140px; }
  @media(max-width:800px) { .atlas-body { padding: 0 0 140px; } }

  /* State filter bar */
  .atlas-filter-bar {
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
  }
  .atlas-filter-row { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .atlas-filter-label {
    flex: 0 0 auto; width: 40px;
    font-family: var(--mono); font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase;
    color: rgba(255,255,255,.38);
  }
  /* Market-calculator-style filter (mirrors the /markets hub) */
  .atlas-calc { margin-bottom: 32px; }
  .mc-box { background: linear-gradient(120deg, rgba(167,139,250,.10), rgba(255,211,0,.03)); border: 1px solid rgba(167,139,250,.30); border-radius: 18px; padding: 22px 24px; }
  .mc-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr auto; gap: 12px; align-items: end; margin: 0; }
  .mc-field label { display:block; font-family: var(--mono); font-size: 10px; letter-spacing:.14em; text-transform: uppercase; color: var(--purple-bright,#A78BFA); margin-bottom: 8px; font-weight: 600; }
  .mc-field select { width: 100%; background: rgba(0,0,0,.45); border: 1px solid rgba(167,139,250,.32); border-radius: 10px; padding: 13px 15px; font-family: var(--sans); font-size: 14px; color: #fff; appearance: none; cursor: pointer; }
  .mc-field select:focus { outline: 0; border-color: var(--purple-bright,#A78BFA); }
  .mc-go { font-family: var(--mono); font-size: 11px; letter-spacing:.12em; text-transform: uppercase; font-weight: 700; padding: 13px 22px; border-radius: 10px; background: var(--purple,#A78BFA); color: #0a0a0a; border: 0; cursor: pointer; white-space: nowrap; }
  .mc-go:hover { filter: brightness(1.08); }
  @media (max-width: 720px) { .mc-row { grid-template-columns: 1fr 1fr; } .mc-go { grid-column: 1 / -1; } }
  .atlas-filter-pills {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-wrap: wrap;
  }
  .atlas-filter-pills::-webkit-scrollbar { display: none; }
  .atlas-filter-pill {
    padding: 8px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .atlas-filter-pill:hover {
    background: rgba(255,255,255,0.07);
    color: #fff;
  }
  .atlas-filter-pill.active {
    background: rgba(31,223,103,0.15);
    border-color: rgba(31,223,103,0.4);
    color: #1FDF67;
  }
  .atlas-filter-count {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums;
  }
  .atlas-filter-pill.active .atlas-filter-count { color: rgba(31,223,103,0.7); }
  @media(max-width:800px) {
    .atlas-filter-pills { flex-wrap: nowrap; padding-bottom: 4px; }
    .atlas-filter-pill { padding: 6px 12px; font-size: 11px; }
  }

  .atlas-section { padding-bottom: 36px; }
  @media(max-width:800px) {
    .atlas-section { padding-bottom: 20px; }
    .atlas-section-head { margin-bottom: 14px; }
  }
  .atlas-section-head {
    display: flex; justify-content: space-between; align-items: end;
    margin-bottom: 22px; gap: 16px; flex-wrap: wrap;
  }
  .atlas-section-title { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; color: #fff; margin: 0; }
  .atlas-section-sub { color: rgba(255,255,255,0.55); font-size: 13px; margin-top: 4px; }
  .atlas-section-link {
    color: #1FDF67; text-decoration: none;
    font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .atlas-section-link:hover { text-decoration: underline; }
  .atlas-section-link-arrow {
    width: 13px; height: 13px;
    flex-shrink: 0;
    vertical-align: middle;
  }

  /* Leaderboard rows become clickable links to /architects/<slug>/ or
     /developers/<slug>/ — those firm pages live on map.oftmw.com (they 404
     on www), so the render emits absolute map URLs. Inherits the number,
     bar, and count layout from the .atlas-lb-row grid. */
  .atlas-lb-link {
    color: inherit;
    text-decoration: none;
    display: block;
    transition: color 0.12s;
  }
  .atlas-lb-row.is-linkable { cursor: pointer; }
  .atlas-lb-row.is-linkable:hover .atlas-lb-name {
    color: #1FDF67;
  }
  .atlas-lb-link .atlas-lb-name {
    transition: color 0.12s;
  }

  .atlas-lb-wrap {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
  }
  .atlas-lb-tabs {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 6px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    touch-action: pan-x;
    overscroll-behavior-x: contain;
    -webkit-overflow-scrolling: touch;
  }
  .atlas-lb-tabs::-webkit-scrollbar { display: none; }
  .atlas-lb-tab {
    padding: 16px 18px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .atlas-lb-tab:hover { color: #fff; }
  .atlas-lb-tab.active { color: #fff; border-bottom-color: #1FDF67; }
  .atlas-lb-content { padding: 4px 0; }
  .atlas-lb-row {
    display: grid;
    grid-template-columns: 32px 1fr 100px 110px;
    gap: 16px;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .atlas-lb-row:hover { background: rgba(255,255,255,0.02); }
  .atlas-lb-row:last-child { border-bottom: none; }
  @media(max-width:800px) {
    .atlas-lb-row { grid-template-columns: 28px 1fr 60px; gap: 12px; padding: 12px 16px; }
    .atlas-lb-row .atlas-lb-bar-wrap { display: none; }
  }
  .atlas-lb-rank {
    color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 500;
    text-align: right; font-variant-numeric: tabular-nums;
  }
  .atlas-lb-rank.top { color: #1FDF67; font-weight: 600; }
  .atlas-lb-name { font-size: 14px; font-weight: 500; color: #fff; }
  .atlas-lb-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
  .atlas-lb-count {
    font-size: 14px; font-weight: 600; color: #fff;
    font-variant-numeric: tabular-nums; text-align: right;
  }
  .atlas-lb-bar-wrap { background: rgba(255,255,255,0.05); height: 5px; border-radius: 3px; overflow: hidden; }
  .atlas-lb-bar { background: #1FDF67; height: 100%; }
  .atlas-load-more {
    display: block; width: 100%; text-align: center; padding: 14px;
    background: transparent; color: rgba(255,255,255,0.65); border: none;
    border-top: 1px solid rgba(255,255,255,0.04); cursor: pointer; font-size: 13px;
    font-family: inherit;
  }
  .atlas-load-more:hover { color: #fff; }
  .atlas-load-more[hidden] { display: none !important; }

  .atlas-grid-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
  @media(max-width:800px) { .atlas-grid-2 { grid-template-columns: 1fr; } }
  .atlas-panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 24px;
  }
  .atlas-panel-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .atlas-panel-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }

  .atlas-status-row {
    display: grid; grid-template-columns: 130px 1fr 50px;
    gap: 14px; align-items: center; padding: 10px 0;
  }
  @media(max-width:800px) { .atlas-status-row { grid-template-columns: 110px 1fr 40px; gap: 10px; } }
  .atlas-status-label { font-size: 13px; color: rgba(255,255,255,0.75); }
  .atlas-status-bar-wrap { background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden; }
  .atlas-status-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .atlas-status-bar[data-status="Announced"]       { background: rgba(255,255,255,0.55); }
  .atlas-status-bar[data-status="Breaking Ground"] { background: #FFD300; }
  .atlas-status-bar[data-status="Construction"]    { background: #FF9500; }
  .atlas-status-bar[data-status="Topping Out"]     { background: #FF9500; }
  .atlas-status-bar[data-status="Opening Soon"]    { background: #1FDF67; }
  .atlas-status-bar[data-status="Now Open"]        { background: #1FDF67; }
  .atlas-status-count {
    font-size: 13px; text-align: right;
    font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.75);
  }

  .atlas-trend-chart { height: 180px; display: flex; align-items: end; gap: 5px; padding: 14px 0; }
  .atlas-trend-bar {
    flex: 1;
    background: linear-gradient(180deg, #A78BFA 0%, rgba(167,139,250,0.25) 100%);
    border-radius: 3px 3px 0 0;
    min-height: 4px;
  }
  .atlas-trend-bar[data-count="0"] { background: rgba(255,255,255,0.05); min-height: 4px; }

  /* ── Intelligence beef-up: purple identity + scale tiles + by-type ── */
  .atlas-intel-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);margin-bottom:16px}
  .atlas-intel-eyebrow svg{width:13px;height:13px}
  .atlas-panel.intel{border-color:rgba(167,139,250,.26);background:linear-gradient(180deg,rgba(167,139,250,.06),rgba(167,139,250,.015))}
  .atlas-panel.intel .atlas-panel-title{color:var(--purple-soft,#B9A6FF)}
  /* Scale tiles */
  .atlas-scale-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:640px){.atlas-scale-grid{grid-template-columns:1fr}}
  .atlas-scale-tile{background:linear-gradient(180deg,rgba(167,139,250,.10),rgba(167,139,250,.02));border:1px solid rgba(167,139,250,.24);border-radius:14px;padding:18px 18px 16px}
  .atlas-scale-tile .n{font-family:var(--serif);font-weight:600;font-size:clamp(26px,3vw,34px);color:#fff;line-height:1;letter-spacing:-.01em}
  .atlas-scale-tile .n .suf{color:var(--purple-soft,#B9A6FF);font-size:.55em;font-weight:600;margin-left:4px;font-family:var(--mono);letter-spacing:.02em}
  .atlas-scale-tile .l{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-top:9px}
  /* By-type bars (purple) */
  .atlas-type-row{display:grid;grid-template-columns:128px 1fr 46px;align-items:center;gap:12px;padding:6px 0}
  @media(max-width:800px){.atlas-type-row{grid-template-columns:104px 1fr 40px;gap:10px}}
  .atlas-type-label{font-size:13px;color:rgba(255,255,255,0.78);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .atlas-type-bar-wrap{background:rgba(255,255,255,0.05);height:8px;border-radius:4px;overflow:hidden}
  .atlas-type-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#7c63d6,#A78BFA);transition:width .3s}
  .atlas-type-count{font-family:var(--mono);font-size:12px;color:var(--mute-2);text-align:right}

  /* ── TMW intelligence hexagon spinner (used wherever the page surfaces
     autonomous / intelligence-driven data) ── */
  .tmw-hex{display:inline-block;vertical-align:middle;flex:0 0 auto;line-height:0}
  .tmw-hex svg{display:block;overflow:visible}
  .tmw-hex .hx-spin{transform-origin:50% 50%;animation:tmwHexSpin 4.2s cubic-bezier(.16,1,.3,1) infinite}
  .tmw-hex .hx-core{transform-origin:50% 50%;animation:tmwHexPulse 4.2s ease-in-out infinite}
  @keyframes tmwHexSpin{0%{transform:rotate(0)}55%{transform:rotate(810deg)}70%{transform:rotate(900deg)}100%{transform:rotate(1080deg)}}
  @keyframes tmwHexPulse{0%,45%{stroke:var(--purple-bright);filter:drop-shadow(0 0 0 rgba(167,139,250,0))}70%{stroke:var(--purple-soft);filter:drop-shadow(0 0 5px rgba(185,166,255,.9))}100%{stroke:var(--purple-bright);filter:drop-shadow(0 0 0 rgba(167,139,250,0))}}
  @media (prefers-reduced-motion: reduce){.tmw-hex .hx-spin{animation:tmwHexSlow 6s ease-in-out infinite}@keyframes tmwHexSlow{0%,100%{transform:rotate(0)}50%{transform:rotate(180deg)}}}

  /* ── Intelligence dashboard header ── */
  .atlas-intel-header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;padding:8px 0 22px;border-bottom:1px solid var(--hair);margin-bottom:26px}
  .atlas-intel-header .ihb-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--purple-soft);display:flex;align-items:center;gap:9px;margin:10px 0 14px}
  .atlas-intel-header h1{font-family:var(--serif);font-weight:600;font-size:clamp(26px,3.6vw,38px);letter-spacing:-.02em;color:#fff;margin:0}
  .atlas-intel-header .ihb-sub{color:var(--mute-2);font-size:14px;margin-top:8px;max-width:540px;line-height:1.5}
  .atlas-live{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--green-soft);display:flex;align-items:center;gap:7px;white-space:nowrap}
  .atlas-live .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:atlasLivePulse 1.8s ease-in-out infinite}
  @keyframes atlasLivePulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ── Headline tiles (moved to top) ── */
  .atlas-tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:26px}
  @media(max-width:900px){.atlas-tiles{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:520px){.atlas-tiles{grid-template-columns:repeat(2,1fr)}}
  .atlas-tile{background:rgba(255,255,255,.03);border:1px solid var(--hair);border-radius:13px;padding:16px}
  .atlas-tile .n{font-family:var(--serif);font-weight:600;font-size:clamp(23px,2.3vw,30px);color:#fff;line-height:1;letter-spacing:-.01em}
  .atlas-tile .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-top:8px}
  .atlas-tile.accent .n{color:var(--orange)}
  .atlas-tile.green .n{color:var(--green-soft)}
  .atlas-tile.purple .n{color:var(--purple-soft)}

  /* ── Dashboard 2-col grid + panel headers ── */
  /* Dashboard rows — two equal columns, items stretch to a shared height. */
  .atlas-dash-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:stretch;margin-bottom:18px}
  .atlas-dash-row > .atlas-panel{height:100%;margin-bottom:0}
  .atlas-dash-stack{display:flex;flex-direction:column;gap:18px;min-width:0}
  .atlas-dash-stack .atlas-panel{margin-bottom:0}
  @media(max-width:900px){.atlas-dash-row{grid-template-columns:1fr}}

  /* ── Rich project-card grid (Overview) — ported from generate_market_pages.py ── */
  .apcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
  @media(max-width:560px){.apcards{grid-template-columns:1fr}}
  .apcards .card{display:flex;flex-direction:column;background:#111;border-radius:14px;overflow:hidden;transition:transform .15s,border-color .15s;border:1px solid transparent;position:relative}
  .apcards .card:hover{transform:translateY(-2px);border-color:rgba(167,139,250,.3)}
  .apcards .card-link{display:block;text-decoration:none;color:inherit}
  .apcards .card-firms-wrap{padding:0 20px 20px}
  .apcards .card-feat-badge{position:absolute;top:10px;right:10px;z-index:2;width:22px;height:22px;border-radius:5px;background:var(--gold);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .apcards .card-feat-badge svg{width:12px;height:12px;fill:#0a0a0a}
  .apcards .card-img{height:220px;background-size:cover;background-position:center;position:relative}
  .apcards .card-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.45) 100%)}
  .apcards .card-body{padding:18px 20px 4px}
  .apcards .card-title{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.014em;line-height:1.2;color:var(--white);margin-bottom:6px}
  .apcards .card-loc{font-family:var(--sans);font-size:13px;color:var(--mute-2);margin-bottom:14px}
  .apcards .pm-tl{margin-bottom:14px}
  .apcards .pm-tl-date{text-align:right;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
  .apcards .pm-tl-meter{position:relative;height:11px;border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.55)}
  .apcards .pm-tl-grad{position:absolute;inset:0;background:linear-gradient(90deg,#3a2f6b,#7C5CE0 38%,#A78BFA 64%,#1FDF67)}
  .apcards .pm-tl-empty{position:absolute;top:0;bottom:0;right:0;background:#0d0f0e;box-shadow:inset 2px 0 3px rgba(0,0,0,.6)}
  .apcards .pm-tl-knob{position:absolute;top:50%;transform:translate(-50%,-50%);background:#fff;color:#0a0a0a;font-size:9.5px;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap;z-index:2;font-family:var(--sans);box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .apcards .pm-tl-stages{display:flex;gap:3px;margin-top:10px}
  .apcards .pm-tl-stage{flex:1;font-size:7.5px;letter-spacing:.02em;text-transform:uppercase;color:rgba(255,255,255,.2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;font-family:var(--sans)}
  .apcards .pm-tl-stage:first-child{text-align:left}
  .apcards .pm-tl-stage:last-child{text-align:right}
  .apcards .pm-tl-stage.done{color:rgba(255,255,255,.5)}
  .apcards .pp-minis{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px;margin-bottom:14px}
  .apcards .pp-mini{padding:10px 11px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden}
  .apcards .pp-mini-empty .v{color:rgba(255,255,255,.3)}
  .apcards .pp-mini .v{font-family:var(--sans);font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--white);white-space:nowrap}
  .apcards .pp-mini .k{font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:5px;white-space:nowrap}
  .apcards .pp-firms{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .apcards .pp-firm{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 14px;text-decoration:none;color:inherit;display:block;transition:border-color .15s}
  .apcards .pp-firm:hover{border-color:rgba(31,223,103,.35)}
  .apcards .pp-firm .k{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4)}
  .apcards .pp-firm .v{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--white);margin-top:4px;line-height:1.25;min-height:2.5em}
  .apcards .pp-firm .go{display:inline-block;margin-top:7px;font-family:var(--sans);font-size:11px;color:var(--green)}
  .apcards .pp-firm-empty{cursor:default}
  .apcards .pp-firm-empty:hover{border-color:rgba(255,255,255,.08)}
  .apcards-more-wrap{text-align:center;margin-top:20px}
  .apcards-more{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--purple-soft);background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.3);border-radius:999px;padding:11px 26px;cursor:pointer;transition:background .15s,border-color .15s}
  .apcards-more:hover{background:rgba(167,139,250,.16);border-color:rgba(167,139,250,.5)}
  .atlas-ph{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);margin:0 0 16px;display:flex;align-items:center;gap:9px;justify-content:space-between;font-weight:600}
  .atlas-ph .lbl{display:flex;align-items:center;gap:9px}
  .atlas-ph .hint{font-size:9px;letter-spacing:.06em;color:var(--mute);font-weight:400;text-transform:none}
  .atlas-panel.intel .atlas-ph{color:var(--purple-soft)}

  /* movers */
  .atlas-mover{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--hair)}
  .atlas-mover:last-child{border-bottom:0}
  .atlas-mover .md{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:0 0 auto}
  .atlas-mover .mname{font-size:14px;color:#fff;font-weight:600}
  .atlas-mover .mchg{font-family:var(--mono);font-size:11px;color:var(--mute-2);margin-top:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .atlas-mover .mchg .to{color:var(--purple);font-weight:700;text-transform:capitalize}
  .atlas-mover .mchg .marrow{color:var(--mute);font-weight:400}
  .atlas-mover .msrc{font-family:var(--mono);font-size:10px;color:var(--mute);margin-top:4px;line-height:1.5}
  .atlas-mover .msrc a{color:var(--green-soft);text-decoration:none}
  .atlas-mover .msrc a:hover{text-decoration:underline}
  .atlas-mover .msrc .sdot{opacity:.55;margin:0 1px}

  /* index chart */
  .atlas-indexrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:10px}
  .atlas-indexrow .iv{font-family:var(--serif);font-size:26px;color:#fff;font-weight:600;line-height:1}
  .atlas-indexrow .ich{font-family:var(--mono);font-size:11px;color:var(--purple-soft);white-space:nowrap}
  .atlas-idxchart{width:100%;height:88px;display:block}
  .atlas-idxchart-x{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--mute);letter-spacing:.06em;margin-top:7px}

  /* stage bars (full lifecycle colors) */
  .atlas-stage{display:grid;grid-template-columns:124px 1fr 46px;align-items:center;gap:12px;padding:6px 0}
  @media(max-width:800px){.atlas-stage{grid-template-columns:104px 1fr 40px;gap:10px}}
  .atlas-stage .lab{font-size:12.5px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .atlas-stage .track{height:9px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden}
  .atlas-stage .fill{height:100%;border-radius:99px}
  .atlas-stage .val{font-family:var(--mono);font-size:11.5px;color:var(--mute-2);text-align:right}
  .st-announced{background:linear-gradient(90deg,#6b726c,#8b938c)}
  .st-breaking{background:linear-gradient(90deg,#caa24a,var(--gold))}
  .st-construction{background:linear-gradient(90deg,#d98a4a,var(--orange))}
  .st-coming{background:linear-gradient(90deg,#4a86d9,#6CA8FF)}
  .st-open{background:linear-gradient(90deg,#1aa84f,var(--green))}

  /* "how this stays current" footnote */
  .atlas-foot-note{margin:6px 0 30px;padding:16px 18px;border:1px dashed var(--hair-2);border-radius:12px;font-family:var(--mono);font-size:11.5px;color:var(--mute);line-height:1.65}
  .atlas-foot-note b{color:var(--purple-soft)}
  .atlas-foot-note .fn-lbl{display:flex;align-items:center;gap:9px;margin-bottom:9px;color:var(--purple-soft);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:10.5px}
  .atlas-trend-labels {
    display: flex; justify-content: space-between;
    padding: 0 6px; font-size: 11px; color: rgba(255,255,255,0.4);
  }

  /* ── Recent activity ("This week on the map") pulse rows. On the map these
     reuse the v2 drawer's .v2-pulse-content styling; here we ship a compact,
     self-contained version of those rules (spine, colored dot, type label,
     title) so the section reads identically without the map's v2 chrome. */
  /* Pulse is now universal in the header — hide the atlas "This week on the
     map" Pulse section (the one carrying .v2-pulse-content). */
  .atlas-section:has(.v2-pulse-content) { display: none !important; }
  .v2-pulse-content .pulse-spine { padding: 0; position: relative; }
  .v2-pulse-content .pulse-ev-wrap {
    position: relative;
    padding: 14px 16px 14px 30px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    width: 100%;
  }
  .v2-pulse-content .pulse-ev-wrap:last-child { border-bottom: none; }
  .v2-pulse-content .pulse-ev-wrap::before {
    content: '';
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }
  .v2-pulse-content .pulse-ev-wrap:hover { background: rgba(255,255,255,0.04); }
  .v2-pulse-content .pulse-ev-wrap[data-event-type="status_change"]::before { background: var(--purple, #A78BFA); box-shadow: 0 0 0 3px rgba(167,139,250,0.18); }
  .v2-pulse-content .pulse-ev-wrap[data-event-type="article"]::before      { background: var(--accent, #1FDF67); box-shadow: 0 0 0 3px rgba(31,223,103,0.18); }
  .v2-pulse-content .pulse-ev-wrap[data-event-type="new_project"]::before  { background: #8b93a7; box-shadow: 0 0 0 3px rgba(139,147,167,0.18); }
  .v2-pulse-content .pulse-ev {
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .v2-pulse-content .pulse-ev-tsrow {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .v2-pulse-content .pulse-ev-type-lbl {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--purple, #A78BFA);
  }
  .v2-pulse-content .pulse-ev-wrap[data-event-type="article"]     .pulse-ev-type-lbl { color: var(--accent, #1FDF67); }
  .v2-pulse-content .pulse-ev-wrap[data-event-type="new_project"] .pulse-ev-type-lbl { color: #8b93a7; }
  .v2-pulse-content .pulse-ev-loc,
  .v2-pulse-content .pulse-ev-ts {
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
  }
  .v2-pulse-content .pulse-ev-sep { color: rgba(255,255,255,0.35); }
  .v2-pulse-content .pulse-ev-title {
    font-size: 14px;
    color: #fff;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.01em;
    margin: 4px 0 0;
  }
  .v2-pulse-content .pulse-ev-ext-icon {
    display: inline-block;
    vertical-align: -1px;
    margin-left: 10px;
    color: rgba(255,255,255,0.35);
    stroke: currentColor;
  }

  /* Most-covered projects -- ranked list like the leaderboards */
  .atlas-coverage-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: padding-left 0.15s, background 0.1s;
    text-decoration: none;
    color: inherit;
  }
  .atlas-coverage-row:last-child { border-bottom: none; }
  .atlas-coverage-row:hover {
    background: rgba(255,255,255,0.02);
    padding-left: 4px;
  }
  .atlas-coverage-rank {
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    text-align: center;
  }
  .atlas-coverage-rank.top { color: #1FDF67; }
  .atlas-coverage-info { min-width: 0; }
  .atlas-coverage-title {
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .atlas-coverage-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .atlas-coverage-count {
    text-align: right;
  }
  .atlas-coverage-count-num {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .atlas-coverage-count-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Coming soon -- bucketed list of upcoming deliveries */
  .atlas-coming-bucket { margin-bottom: 24px; }
  .atlas-coming-bucket:last-child { margin-bottom: 0; }
  .atlas-coming-bucket-head {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 0 0 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .atlas-coming-bucket-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #1FDF67;
  }
  .atlas-coming-bucket[data-bucket="30d"] .atlas-coming-bucket-dot  { background: #1FDF67; }
  .atlas-coming-bucket[data-bucket="90d"] .atlas-coming-bucket-dot  { background: #FF9500; }
  .atlas-coming-bucket[data-bucket="rest"] .atlas-coming-bucket-dot { background: #6FA8FF; }
  .atlas-coming-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: padding-left 0.15s, background 0.1s;
    text-decoration: none;
    color: inherit;
  }
  .atlas-coming-row:last-child { border-bottom: none; }
  .atlas-coming-row:hover {
    background: rgba(255,255,255,0.02);
    padding-left: 4px;
  }
  .atlas-coming-info { min-width: 0; }
  .atlas-coming-title {
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .atlas-coming-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .atlas-coming-days {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .atlas-coming-days-num {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }
  .atlas-coming-days-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  /* Coming soon — purple treatment */
  .atlas-coming-panel{background:linear-gradient(160deg,rgba(124,92,224,.12),rgba(167,139,250,.035));border:1px solid rgba(167,139,250,.24)}
  .atlas-coming-panel .atlas-coming-bucket-head{color:var(--purple-soft);border-bottom-color:rgba(167,139,250,.16)}
  .atlas-coming-panel .atlas-coming-bucket[data-bucket="30d"] .atlas-coming-bucket-dot{background:#C9B8FF}
  .atlas-coming-panel .atlas-coming-bucket[data-bucket="90d"] .atlas-coming-bucket-dot{background:#A78BFA}
  .atlas-coming-panel .atlas-coming-bucket[data-bucket="rest"] .atlas-coming-bucket-dot{background:#7C5CE0}
  .atlas-coming-panel .atlas-coming-row{border-bottom-color:rgba(167,139,250,.08)}
  .atlas-coming-panel .atlas-coming-row:hover{background:rgba(167,139,250,.08);box-shadow:inset 2px 0 0 var(--purple)}
  .atlas-coming-panel .atlas-coming-days-num{color:var(--purple-soft)}

  /* Side-by-side desktop layout for these two sections */
  .atlas-coverage-coming-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding-bottom: 36px;
    align-items: stretch;
  }
  /* ── Atlas view tabs (Overview / Pipeline) ──────────────────────────
     Top-level switcher sitting above the state filter. Toggling re-renders
     the atlas content into either the Overview (leaderboards + outlook +
     distribution + coverage + recent) or the Pipeline (timeline only). */
  .atlas-view-tabs {
    display: inline-flex;
    gap: 4px;
    margin: 0 0 22px;
    padding: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
  }
  .atlas-view-tab {
    padding: 9px 18px;
    background: transparent; border: none;
    color: rgba(255,255,255,0.55);
    font-size: 13px; font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
    display: flex; align-items: center; gap: 8px;
  }
  .atlas-view-tab:hover { color: #fff; }
  .atlas-view-tab.active {
    background: rgba(31,223,103,0.14);
    color: #1FDF67;
  }
  @media (max-width: 700px) {
    .atlas-view-tabs { width: 100%; display: flex; }
    .atlas-view-tab { flex: 1; justify-content: center; padding: 9px 12px; }
  }

  /* Pinned sub-header: the view tabs (Pipeline/Overview) + the location filter
     pills stay fixed just below the journal nav; everything else scrolls under.
     --atlas-head is the live journal-chrome header height (set by JS). The
     negative side margins + matching padding bleed the bar's background to the
     container edges so scrolling content is fully covered as it passes under. */
  .atlas-stickyhead {
    position: sticky; top: var(--atlas-head, 64px); z-index: 30;
    background: #0a0a0a;
    margin: 0 -32px 22px; padding: 12px 32px 13px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; gap: 12px;
  }
  .atlas-stickyhead .atlas-view-tabs { margin: 0; align-self: flex-start; }
  .atlas-stickyhead .atlas-filter-bar { margin: 0; }
  @media (max-width: 800px) {
    .atlas-stickyhead { margin: 0 -18px 18px; padding: 10px 18px 11px; gap: 10px; }
  }

  /* ── Pipeline timeline section (atlas) — mockup-style layout ────────
     Hero (title + description + 4-stat row), filter chips (status + featured),
     then a single-column vertical timeline with a thin connector line down
     the left. Each project row: date column · connector · full-width card
     with image + body + scale stats. */

  /* Hero */
  .atlas-tl-hero { padding: 12px 0 28px; max-width: 720px; }
  .atlas-tl-hero h2 {
    font-size: 38px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
  }
  .atlas-tl-hero p {
    font-size: 15px; color: rgba(255,255,255,0.62);
    margin-top: 12px; line-height: 1.55;
  }
  .atlas-tl-hero-stats { margin-top: 24px; display: flex; gap: 22px; flex-wrap: wrap; }
  .atlas-tl-hero-stat { display: flex; flex-direction: column; gap: 2px; }
  .atlas-tl-hero-stat .val {
    font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums;
    line-height: 1; color: #fff;
  }
  .atlas-tl-hero-stat .val.accent { color: #1FDF67; }
  .atlas-tl-hero-stat .lbl {
    font-size: 10.5px; color: rgba(255,255,255,0.4);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
    margin-top: 4px;
  }
  @media (max-width: 700px) {
    .atlas-tl-hero h2 { font-size: 28px; }
    .atlas-tl-hero p { font-size: 14px; }
    .atlas-tl-hero-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px 24px;
      margin-top: 20px;
    }
    .atlas-tl-hero-stat .val { font-size: 20px; }
  }

  /* Filter chip row: status pills + featured toggle + count, side by side */
  .atlas-tl-filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center; margin-bottom: 28px;
  }
  .atlas-tl-filter-group {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 3px;
  }
  .atlas-tl-chip {
    padding: 7px 12px; background: transparent; border: none;
    color: rgba(255,255,255,0.55); border-radius: 7px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; display: flex; align-items: center; gap: 6px;
    transition: background 0.12s, color 0.12s; white-space: nowrap;
  }
  .atlas-tl-chip:hover { color: #fff; }
  .atlas-tl-chip.active { background: rgba(255,255,255,0.08); color: #fff; }
  .atlas-tl-chip .swatch { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .atlas-tl-meta-count {
    color: rgba(255,255,255,0.4); font-size: 11px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    margin-left: auto;
  }
  @media (max-width: 700px) {
    .atlas-tl-filters {
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      margin-left: -18px;
      margin-right: -18px;
      padding-left: 18px;
      padding-right: 18px;
    }
    .atlas-tl-filters::-webkit-scrollbar { display: none; }
    .atlas-tl-filter-group { flex-shrink: 0; }
    .atlas-tl-meta-count { display: none; }
  }

  /* Timeline list + vertical connector line. Line at left:122px desktop,
     8px mobile (date column collapses). Faded ends via mask gradient. */
  .atlas-tl-list { position: relative; margin-bottom: 40px; }
  .atlas-tl-list::before {
    content: ""; position: absolute;
    left: 122px; top: 24px; bottom: 24px;
    width: 1px;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.10) 6%, rgba(255,255,255,0.10) 94%, transparent 100%);
  }
  @media (max-width: 700px) {
    .atlas-tl-list::before { left: 9px; }
  }

  /* Sticky quarter header — single green dot on the line marks each quarter.
     top offset accounts for the sticky journal-chrome header (~62px) so the
     quarter header parks just below it instead of under it. */
  .atlas-tl-qhead {
    display: grid; grid-template-columns: 110px 24px 1fr; gap: 12px;
    padding: 18px 0 10px;
    background: #0a0a0a;
    margin-bottom: 4px;
  }
  .atlas-tl-qhead-date {
    text-align: right;
    font-size: 18px; font-weight: 800;
    color: #fff; letter-spacing: -0.01em; line-height: 1;
  }
  .atlas-tl-qhead-date .yr {
    display: block;
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.45);

<body>
  <!-- Atlas content (always shown — on the map this was hidden until
       atlas-mode; here it's the whole page). The render JS writes into
       #atlasRoot. -->
  <div class="atlas-overlay" id="atlasOverlay">
    <div class="atlas-body">
      <div class="atlas-container" id="atlasRoot">
        <div class="atlas-loading">Loading Atlas…</div>
      </div>
    </div>
  </div>

  <!-- Universal journal chrome: injects the header (with the Map · Atlas · Journal
       toggle — Atlas active on /atlas) + the bottom dock. -->
  <script src="/_shared/journal-chrome.js" defer></script>
  <script src="/_shared/journal-dock.js" defer></script>
  <!-- Native Pro paywall (window.tmwShowPaywall). Memberstack + _isPaidMember
       come from journal-auth.js, which journal-chrome.js loads on this page. -->
  <script src="/_shared/journal-paywall.js" defer></script>

  <!-- ───────────────────────────────────────────────────────────────────
       ATLAS RENDER — ported from the map (repo-root index.html, the
       self-contained atlas IIFE ~lines 19674–21258). Adapted for the native
       journal page: data fetched cross-origin from map.oftmw.com; firm /
       project / coverage links point at absolute map.oftmw.com URLs (those
       routes 404 on www); the Pipeline timeline's project list is built from
       projects-flat.json (mapped into the {properties:{...}} shape the map's
       window.allProjectFeatures uses); no Pro gating (everything is public);
       the firm-sheet SPA modal and map deep-link handlers are dropped in
       favor of plain navigation.
       ─────────────────────────────────────────────────────────────────── -->
  <script>
  (function() {
    'use strict';

    // Same-origin asset base. This page lives at www.oftmw.com/atlas; the
    // atlas data + native map now live at www.oftmw.com/map (map.oftmw.com is
    // retired). atlas.json/projects-flat.json are mirrored into /map by the
    // generate-pages workflow, so all fetches + deep-links resolve here.
    const MAP_ORIGIN = 'https://www.oftmw.com/map';

    // Keep --atlas-head in sync with the live journal-chrome header height so the
    // pinned sub-header (tabs + filters) parks exactly below the nav on every
    // breakpoint. The chrome header is injected async, so we also re-measure on
    // load + resize.
    function syncHeadOffset() {
      try {
        const h = document.querySelector('.tmw-chrome-head') || document.querySelector('nav.main');
        const hh = h ? Math.round(h.getBoundingClientRect().height) : 0;
        if (hh > 0) document.documentElement.style.setProperty('--atlas-head', hh + 'px');
      } catch (_) {}
    }

    let atlasData = null;
    let atlasLoaded = false;
    let lbState = {
      developers: { showAll: false },
      architects: { showAll: false },
      cities:     { showAll: false },
      types:      { showAll: false },
    };
    const TOP_N_DESKTOP = 8;
    const TOP_N_MOBILE  = 5;

    function isMobileNow() { return window.matchMedia('(max-width: 800px)').matches; }

    function escapeHtml(s) {
      const decoded = window.decodeEntitiesOnce ? window.decodeEntitiesOnce(s) : (s == null ? '' : String(s));
      return decoded
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Render functions ────────────────────────────────────────────────
    function renderOpeningsByYear() {
      const data = ctx().openings_by_year || [];
      if (!data.length) return '';
      const max = Math.max(...data.map(d => d.count), 1);
      const rows = data.map(d => {
        const pct = (d.count / max) * 100;
        return `
          <div class="atlas-status-row">
            <div class="atlas-status-label">${d.year}</div>
            <div class="atlas-status-bar-wrap"><div class="atlas-status-bar" data-status="Opening Soon" style="width: ${pct}%;"></div></div>
            <div class="atlas-status-count">${d.count}</div>
          </div>`;
      }).join('');
      return `
        <section class="atlas-section">
          <div class="atlas-section-head">
            <div>
              <h2 class="atlas-section-title">Openings outlook</h2>
              <p class="atlas-section-sub">Projects delivering each year, ${new Date().getFullYear()} onward.</p>
            </div>
          </div>
          <div class="atlas-panel">
            ${rows}
          </div>
        </section>`;
    }

    function renderStateFilter() {
      const states = atlasData.available_states || [];
      const types = atlasData.available_types || [];
      if (!states.length && !types.length) return '';
      // City options from the project array (cities with ≥2 tracked projects).
      const cityC = {};
      (atlasData.projects || []).forEach(p => { if (p.ci) cityC[p.ci] = (cityC[p.ci] || 0) + 1; });
      const cities = Object.keys(cityC).filter(c => cityC[c] >= 2).sort((a, b) => cityC[b] - cityC[a]);
      const placeVal = (currentStateFilter && currentStateFilter !== 'ALL') ? ('st:' + currentStateFilter)
                     : (currentCityFilter && currentCityFilter !== 'ALL') ? ('ci:' + currentCityFilter) : '';
      const stateOpts = states.map(s => `<option value="st:${escapeHtml(s.code)}"${placeVal === 'st:' + s.code ? ' selected' : ''}>${escapeHtml(s.label)}</option>`).join('');
      const cityOpts = cities.map(c => `<option value="ci:${escapeHtml(c)}"${placeVal === 'ci:' + c ? ' selected' : ''}>${escapeHtml(c)}</option>`).join('');
      const catOpts = types.map(t => `<option value="${escapeHtml(t.type)}"${currentTypeFilter === t.type ? ' selected' : ''}>${escapeHtml(t.type)}</option>`).join('');
      const nowY = new Date().getFullYear();
      const yearOpts = [nowY, nowY + 1, nowY + 2, nowY + 4].map(y => `<option value="${y}"${String(currentYearFilter) === String(y) ? ' selected' : ''}>By end of ${y}</option>`).join('');
      return `
        <div class="atlas-calc">
          <div class="mc-box"><form class="mc-row" id="atlas-calc-form">
            <div class="mc-field"><label>Market</label><select id="ac-place">
              <option value="">Any market</option>
              <optgroup label="States">${stateOpts}</optgroup>
              <optgroup label="Cities">${cityOpts}</optgroup>
            </select></div>
            <div class="mc-field"><label>Category</label><select id="ac-cat">
              <option value="">Any category</option>${catOpts}
            </select></div>
            <div class="mc-field"><label>Delivery by</label><select id="ac-year">
              <option value="">Any time</option>${yearOpts}
            </select></div>
            <button type="submit" class="mc-go">Show me →</button>
          </form></div>
        </div>`;
    }

    let currentStateFilter = 'ALL';
    // Default to the Overview ('stats') view — it renders instantly from
    // atlas.json alone (no projects-flat.json dependency), so the page is
    // never stuck on a loading state.
    let currentAtlasView = (new URLSearchParams(location.search).get('aview') === 'timeline') ? 'timeline' : 'stats';
    let currentLbKey = 'developers'; // active leaderboard tab — preserved across re-renders
    let currentTimelineStatus = 'all';
    let currentTimelineFeatured = false;

    let currentTypeFilter = 'ALL';
    let currentCityFilter = 'ALL';
    let currentYearFilter = '';   // '', '2026', '2027'… → projects delivering by end of year
    // Global filter context: when any filter is active, every panel reads from
    // a single client recompute over atlasData.projects (the compact per-project
    // array). No filter → the precomputed global fields.
    let _ctxCache = null, _ctxKey = '';
    function _filterActive() {
      return (currentStateFilter && currentStateFilter !== 'ALL') ||
             (currentCityFilter && currentCityFilter !== 'ALL') ||
             (currentTypeFilter && currentTypeFilter !== 'ALL') ||
             !!currentYearFilter;
    }
    function computeCtx() {
      const ps = atlasData.projects || [];
      const st = (currentStateFilter && currentStateFilter !== 'ALL') ? currentStateFilter : null;
      const ci = (currentCityFilter && currentCityFilter !== 'ALL') ? currentCityFilter : null;
      const ty = (currentTypeFilter && currentTypeFilter !== 'ALL') ? currentTypeFilter : null;
      const yr = currentYearFilter ? parseInt(currentYearFilter, 10) : null;
      const fp = ps.filter(p => (!st || p.st === st) && (!ci || p.ci === ci) && (!ty || p.ty === ty) && (!yr || (p.yr && p.yr <= yr)));
      const nowY = new Date().getFullYear();
      const devM = new Map(), archM = new Map(), cityM = new Map(), typeM = new Map();
      const statusM = new Map(), openM = new Map(), momM = new Map();
      const devCity = new Map(), archCity = new Map();
      let underC = 0, openThis = 0, units = 0, keys = 0, floors = 0;
      function bump(map, key, name, slug) { let e = map.get(key); if (!e) { e = { name: name, slug: slug || '', count: 0 }; map.set(key, e); } e.count++; if (slug && !e.slug) e.slug = slug; }
      function trackCity(m, name, city) { if (!city) return; let c = m.get(name); if (!c) { c = new Map(); m.set(name, c); } c.set(city, (c.get(city) || 0) + 1); }
      fp.forEach(p => {
        (p.dv || []).forEach(d => { bump(devM, d[0], d[0], d[1]); trackCity(devCity, d[0], p.ci); });
        (p.ar || []).forEach(d => { bump(archM, d[0], d[0], d[1]); trackCity(archCity, d[0], p.ci); });
        if (p.ci) bump(cityM, p.ci, p.ci, '');
        if (p.ty) bump(typeM, p.ty, p.ty, '');
        if (p.sl) statusM.set(p.sl, (statusM.get(p.sl) || 0) + 1);
        if (p.sl === 'Construction') underC++;
        if (p.yr && p.sl !== 'Now Open') { if (p.yr === nowY) openThis++; if (p.yr >= nowY && p.yr <= nowY + 4) openM.set(p.yr, (openM.get(p.yr) || 0) + 1); }
        if (p.sm) momM.set(p.sm, (momM.get(p.sm) || 0) + 1);
        units += (p.u || 0); keys += (p.k || 0); floors += (p.fl || 0);
      });
      function topCity(m) { let best = '', bc = 0; if (m) m.forEach((c, city) => { if (c > bc) { bc = c; best = city; } }); return best; }
      function sortTop(m, n, subFn) { return [...m.values()].sort((a, b) => b.count - a.count).slice(0, n).map(e => ({ name: e.name, slug: e.slug, count: e.count, sub: subFn ? subFn(e) : '' })); }
      const subFirm = (cm) => (e) => { const tc = topCity(cm.get(e.name)); return tc ? (e.count + ' in ' + tc) : (e.count + ' project' + (e.count !== 1 ? 's' : '')); };
      const order = (atlasData.status_distribution || []).map(d => d.label);
      const statusDist = (order.length ? order : [...statusM.keys()]).map(label => ({ label: label, count: statusM.get(label) || 0 }));
      const MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const momentum = [...momM.keys()].sort().slice(-12).map(k => { const a2 = k.split('-'); return { month: MON[parseInt(a2[1], 10) - 1], year: parseInt(a2[0], 10), count: momM.get(k) }; });
      return {
        leaderboards: { developers: sortTop(devM, 40, subFirm(devCity)), architects: sortTop(archM, 40, subFirm(archCity)), cities: sortTop(cityM, 40), types: sortTop(typeM, 40) },
        status_distribution: statusDist,
        momentum: momentum,
        openings_by_year: [...openM.entries()].sort((a, b) => a[0] - b[0]).map(([year, count]) => ({ year: year, count: count })),
        hero_stats: { total_projects: fp.length, under_construction: underC, opening_this_year: openThis, total_dollars_short: (atlasData.hero_stats || {}).total_dollars_short },
        scale: { units: units, keys: keys, floors: floors },
      };
    }
    function ctx() {
      if (!_filterActive()) return atlasData;
      const key = currentStateFilter + '|' + currentCityFilter + '|' + currentTypeFilter + '|' + currentYearFilter;
      if (_ctxKey !== key) { _ctxCache = computeCtx(); _ctxKey = key; }
      return _ctxCache;
    }
    function leaderboardSource(key) {
      const c = ctx();
      return (c.leaderboards && c.leaderboards[key]) || [];
    }

    function renderLeaderboardRows(key) {
      const data = leaderboardSource(key);
      if (!data.length) {
        return '<div style="padding:32px;text-align:center;color:rgba(255,255,255,0.4);font-size:13px;">No entries match this filter</div>';
      }
      const max = data[0].count || 1;
      const limit = lbState[key].showAll ? data.length : (isMobileNow() ? TOP_N_MOBILE : TOP_N_DESKTOP);
      const visible = data.slice(0, limit);
      // Developers/architects with slugs link to their unified firm page at
      // https://www.oftmw.com/firm/<slug>/ (a firm that is both shares one page).
      const isFirmKey = (key === 'developers' || key === 'architects');
      return visible.map((row, i) => {
        const pct = (row.count / max) * 100;
        const rankClass = i < 3 ? 'top' : '';
        const linkable = isFirmKey && row.slug;
        const nameInner = `<div class="atlas-lb-name">${escapeHtml(row.name)}</div>
              <div class="atlas-lb-sub">${escapeHtml(row.sub || '')}</div>`;
        const rowInner = linkable
          ? `<a class="atlas-lb-link" href="https://www.oftmw.com/firm/${encodeURIComponent(row.slug)}/">${nameInner}</a>`
          : `<div>${nameInner}</div>`;
        return `
          <div class="atlas-lb-row${linkable ? ' is-linkable' : ''}">
            <div class="atlas-lb-rank ${rankClass}">${i + 1}</div>
            ${rowInner}
            <div class="atlas-lb-bar-wrap"><div class="atlas-lb-bar" style="width: ${pct}%;"></div></div>
            <div class="atlas-lb-count">${row.count}</div>
          </div>`;
      }).join('');
    }

    function renderLeaderboardSection() {
      const tabs = [

    function renderMovers() {
      // Sourced from the Pulse feed (recent_activity) — the SAME event-dated, sourced
      // milestones the project dossiers use. When the calculator is engaged the feed
      // is scoped to the cities in the active filter.
      const TAGDOT = {
        'Now Open': 'var(--green)', 'Opened': 'var(--green)', 'Coming soon': '#6CA8FF', 'Opening Soon': '#6CA8FF',
        'Under construction': 'var(--orange)', 'Going vertical': 'var(--orange)', 'Topped out': 'var(--orange)', 'Halfway there': 'var(--orange)',
        'Broke ground': 'var(--gold)', 'Breaking Ground': 'var(--gold)', 'Financing secured': 'var(--purple-soft)',
        'Tenant announced': 'var(--purple-soft)', 'TCO received': '#6CA8FF', 'Resident move-in': 'var(--green)', 'Bookings open': 'var(--green)', 'Announced': 'var(--mute)',
      };
      const fmtEv = (s) => {
        s = (s || '').toString().trim();
        const m = s.match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/);
        if (!m) return '';
        const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        if (m[2] && m[3]) return `${MON[+m[2]-1]} ${+m[3]}, ${m[1]}`;
        if (m[2]) return `${MON[+m[2]-1]} ${m[1]}`;
        return m[1];
      };
      const dom = (u) => { try { const h = new URL(u).hostname.toLowerCase(); return h.indexOf('www.') === 0 ? h.slice(4) : h; } catch (e) { return ''; } };
      // Parse a milestone event date (YYYY / YYYY-MM / YYYY-MM-DD) to a Date.
      const parseEv = (s) => {
        const m = (s || '').toString().match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?/);
        return m ? new Date(+m[1], (+m[2] || 1) - 1, +m[3] || 1) : null;
      };
      // "Movers" = real, event-dated milestones that happened RECENTLY — sorted
      // by the event date (newest first) and limited to the last ~90 days, so a
      // backfilled milestone with an old event date never shows up as a current
      // mover. (Additions/tracking are not movers — they have no event date.)
      // When the calculator is engaged, scope movers to cities present in the
      // active filter (the only clean geo signal Pulse events carry).
      const allowedCities = _filterActive()
        ? new Set(((ctx().leaderboards && ctx().leaderboards.cities) || []).map(c => c.name))
        : null;
      const RECENT_MS = 365 * 86400000, FUTURE_SLACK = 14 * 86400000, nowT = Date.now();
      const evs = (atlasData.recent_activity || [])
        .filter(e => e.type === 'status_change' && e.event_date)
        .filter(e => !allowedCities || allowedCities.has(e.city))
        .map(e => { const d = parseEv(e.event_date); return { e, t: d ? d.getTime() : NaN }; })
        .filter(x => !isNaN(x.t) && (nowT - x.t) <= RECENT_MS && (nowT - x.t) >= -FUTURE_SLACK)
        .sort((a, b) => b.t - a.t)
        .slice(0, 10)
        .map(x => x.e);
      if (!evs.length) return '';
      const rows = evs.map(e => {
        const isNew = e.type === 'new_project';
        const tag = e.tag || (isNew ? 'Added to the map' : '');
        // Uniform dossier purple for milestone movers — matches the Pulse drawer.
        const dot = 'var(--purple)';
        const name = escapeHtml(e.project_title || e.title || '');
        const href = e.link || '#';
        const nameInner = `<div class="mname">${name}</div>`;
        const nm = (href && href !== '#')
          ? `<a href="${escapeHtml(href)}" style="text-decoration:none;color:inherit">${nameInner}</a>`
          : nameInner;
        const ev = e.event_date ? fmtEv(e.event_date) : '';
        const srcDom = e.source_url ? dom(e.source_url) : '';
        const srcHtml = srcDom
          ? `<a href="${escapeHtml(e.source_url)}" target="_blank" rel="noopener" style="color:var(--green-soft);text-decoration:none">${escapeHtml(srcDom)} ↗</a>`
          : (e.city ? escapeHtml(e.city) : '');
        const meta = [ev, srcHtml].filter(Boolean).join(' <span class="sdot">·</span> ');
        return `<div class="atlas-mover"><span class="md" style="background:${dot}"></span>`
          + `<div>${nm}<div class="mchg"><span class="to">${escapeHtml(tag)}</span> ${hexMarker(11)}</div>`
          + `${meta ? `<div class="msrc">${meta}</div>` : ''}</div></div>`;
      }).join('');
      return `<div class="atlas-panel"><h3 class="atlas-ph"><span class="lbl">Recent movers</span><span class="hint">last 12 months</span></h3>${rows}</div>`;
    }

    function renderIndexPanel() {
      const m = activeCore().momentum || [];
      if (m.length < 2) return '';
      let cum = 0; const pts = m.map(x => (cum += (x.count || 0)));
      const W = 300, H = 88, max = Math.max(...pts, 1), min = Math.min(...pts, 0);
      const span = (max - min) || 1;
      const coords = pts.map((v, i) => {
        const x = (i / (pts.length - 1)) * W;
        const y = H - ((v - min) / span) * (H - 14) - 7;
        return `${x.toFixed(0)},${y.toFixed(0)}`;
      });
      const poly = coords.join(' ');
      const area = `0,${H} ${poly} ${W},${H}`;
      const half = Math.floor(m.length / 2);
      const recent = m.slice(half).reduce((a, x) => a + (x.count || 0), 0);
      const prior = m.slice(0, half).reduce((a, x) => a + (x.count || 0), 0) || 1;
      const chg = Math.round((recent - prior) / prior * 100);
      const idx = [0, Math.floor(m.length / 4), Math.floor(m.length / 2), Math.floor(3 * m.length / 4), m.length - 1];
      const xl = [...new Set(idx)].map(i => m[i]).filter(Boolean);
      const yr = x => x.year ? " '" + String(x.year).slice(2) : '';
      return `<div class="atlas-panel intel">
        <h3 class="atlas-ph"><span class="lbl">${hexMarker(13)} TMW Development Index</span><span class="hint">12-mo momentum</span></h3>
        <div class="atlas-indexrow"><span class="iv">${cum.toLocaleString()}</span><span class="ich">${chg >= 0 ? '▲' : '▼'} ${Math.abs(chg)}% vs prior 6 mo</span></div>
        <svg class="atlas-idxchart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">
          <defs><linearGradient id="atlasIdxG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(167,139,250,.35)"/><stop offset="100%" stop-color="rgba(167,139,250,0)"/></linearGradient></defs>
          <polygon fill="url(#atlasIdxG)" points="${area}"/>
          <polyline fill="none" stroke="#A78BFA" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" points="${poly}"/>
        </svg>
        <div class="atlas-idxchart-x">${xl.map(x => `<span>${escapeHtml(x.month)}${yr(x)}</span>`).join('')}</div>
      </div>`;
    }

    // ── Rich project-card grid (Overview) — the full markets-page card,
    //    rendered client-side from window.allProjectFeatures, filtered to the
    //    Market Calculator. Mirrors generate_market_pages.py card_html exactly.
    let _pcardShown = 24;
    const PCARD_STEP = 24;
    function _pcSlug(t) {
      return (t || '').toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/[\s-]+/g, '-').replace(/^-|-$/g, '');
    }
    function _pcNum(n) {
      if (n == null || n === '') return '';
      const v = parseInt(n, 10);
      return isNaN(v) ? '' : v.toLocaleString();
    }
    function _pcYear(s) {
      const m = String(s || '').match(/^(\d{4})/);
      return m ? m[1] : '';
    }
    function _pcMonYear(s) {
      const m = String(s || '').match(/^(\d{4})(?:-(\d{2}))?/);
      if (!m) return '';
      const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return m[2] ? `${MON[+m[2]-1] || ''} ${m[1]}` : m[1];
    }
    function _pcStatusIdx(delivery) {
      const s = (delivery || '').toString().toLowerCase();
      if (s.includes('now open') || s === 'open' || s.includes('complete') || s.includes('delivered')) return 4;
      if (s.includes('opening') || s.includes('coming')) return 3;
      if (s.includes('construction')) return 2;
      if (s.includes('breaking')) return 1;
      return 0;
    }
    // Client port of progress_bar_html — five-stage gradient meter, knob at the
    // active stage's anchor. Pct anchors match generate_pages.py (5/20/40/78/100).
    function buildCardProgress(p) {
      const STAGES = ['Announced', 'Breaking Ground', 'Construction', 'Opening Soon', 'Now Open'];
      const ANCHOR = [5, 20, 40, 78, 100];
      const ai = _pcStatusIdx(p.delivery);
      const complete = ai >= 4;
      const pct = complete ? 100 : ANCHOR[ai];
      const glow = complete ? '31,223,103' : '167,139,250';
      const accent = complete ? '#1FDF67' : '#B9A6FF';
      const stages = STAGES.map((label, i) => {
        const on = !complete && i === ai;
        const cls = on ? 'on' : ((complete || i < ai) ? 'done' : '');
        const style = on ? ` style="color:${accent};font-weight:800;text-shadow:0 0 12px rgba(${glow},.5)"` : '';
        return `<span class="pm-tl-stage ${cls}"${style}>${label}</span>`;
      }).join('');
      const sub = complete ? 'Delivered' : (p.deliveryDate ? 'Est. ' + _pcMonYear(p.deliveryDate) : '');
      // Always render the date line (blank when absent) so the meter — and
      // everything below it — lines up across every card in a row.
      const dateHtml = `<div class="pm-tl-date">${sub ? escapeHtml(sub) : '&nbsp;'}</div>`;
      const knobLeft = pct >= 98 ? 'calc(100% - 18px)' : pct + '%';
      return `<div class="pm-tl">${dateHtml}
        <div class="pm-tl-meter"><div class="pm-tl-grad"></div>
          <div class="pm-tl-empty" style="left:${pct}%"></div>
          <div class="pm-tl-knob" style="left:${knobLeft};box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 2px rgba(${glow},.42),0 0 12px rgba(${glow},.55)">${pct}%</div>
        </div>
        <div class="pm-tl-stages">${stages}</div>
      </div>`;
    }
    function _pcMini(label, value) {
      // Always render the slot (em-dash when missing) so Start/Completion/Units/
      // Floors columns line up across every card in the grid.
      const has = value != null && value !== '';
      return `<div class="pp-mini${has ? '' : ' pp-mini-empty'}"><div class="v">${has ? escapeHtml(value) : '—'}</div><div class="k">${escapeHtml(label)}</div></div>`;
    }
    function _pcFirm(label, firm) {
      const name = (firm && firm.name) ? firm.name : '';
      if (!name) {
        return `<div class="pp-firm pp-firm-empty"><div class="k">${label}</div><div class="v" style="opacity:.45">—</div></div>`;
      }
      const inner = `<div class="k">${label}</div><div class="v">${escapeHtml(name)}</div><span class="go">View firm profile →</span>`;
      const slug = (firm && firm.slug) ? firm.slug : '';
      return slug
        ? `<a class="pp-firm" href="https://www.oftmw.com/firm/${encodeURIComponent(slug)}/">${inner}</a>`
        : `<div class="pp-firm">${inner}</div>`;
    }
    function pcardHtml(p) {
      const title = escapeHtml(p.title || '');
      const slug = _pcSlug(p.title || '');
      const href = slug ? `${MAP_ORIGIN}/projects/${encodeURIComponent(slug)}/` : '#';
      const featured = !!p.featured;
      const type = p.preferredType || ((p.projectType || '').split(',')[0] || '').trim();
      const loc = [p.city, type].filter(Boolean).map(escapeHtml).join(' · ');
      const featStar = featured
        ? '<span class="card-feat-badge" aria-label="Featured project"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.95 6.55 7.18.75-5.35 4.82 1.55 7.05L12 18l-6.33 3.67 1.55-7.05L1.87 9.8l7.18-.75L12 2.5z"/></svg></span>'
        : '';
      const imgStyle = p.image ? `background-image:url('${escapeHtml(p.image)}')` : 'background:#1a1d1a';
      const minis = [
        _pcMini('Start', _pcYear(p.startDate)),
        _pcMini('Completion', _pcYear(p.deliveryDate) || _pcMonYear(p.deliveryDate)),
        _pcMini('Units', _pcNum(p.units)),
        _pcMini('Floors', String(p.floors || '').trim()),
      ].join('');
      const minisHtml = `<div class="pp-minis">${minis}</div>`;
      const firms = `<div class="pp-firms">${_pcFirm('Developer', (p.developers || [])[0])}${_pcFirm('Architect', (p.architects || [])[0])}</div>`;
      return `<div class="card${featured ? ' featured' : ''}"${featured ? ' data-featured="1"' : ''}>
        <a class="card-link" href="${escapeHtml(href)}" aria-label="Open ${title}">
          <div class="card-img" style="${imgStyle}">${featStar}</div>
          <div class="card-body">
            <div class="card-title">${title}</div>
            <div class="card-loc">${loc}</div>
            ${buildCardProgress(p)}
            ${minisHtml}
          </div>
        </a>
        <div class="card-firms-wrap">${firms}</div>
      </div>`;
    }
    function filterProjectsByCalc() {
      const features = window.allProjectFeatures || [];
      if (!features.length) return null;
      const cityToState = buildCityStateMap();
      const st = (currentStateFilter && currentStateFilter !== 'ALL') ? currentStateFilter : null;
      const ci = (currentCityFilter && currentCityFilter !== 'ALL') ? currentCityFilter : null;
      const ty = (currentTypeFilter && currentTypeFilter !== 'ALL') ? currentTypeFilter : null;
      const yr = currentYearFilter ? parseInt(currentYearFilter, 10) : null;
      return features.map(f => f.properties).filter(p => {
        if (st && (cityToState[p.city] || 'Other') !== st) return false;
        if (ci && p.city !== ci) return false;
        if (ty) { const pty = ((p.projectType || '').split(',')[0] || '').trim(); if (pty !== ty) return false; }
        if (yr) { const dy = parseInt(String(p.deliveryDate || '').slice(0, 4), 10); if (!dy || dy > yr) return false; }
        return true;
      });
    }
    function renderProjectCards() {
      const list = filterProjectsByCalc();
      if (list === null) {
        return `<section class="atlas-section"><div class="atlas-section-head"><div>
            <h2 class="atlas-section-title">Tracked projects</h2>
            <p class="atlas-section-sub">Loading the pipeline&hellip;</p>
          </div></div><div class="atlas-tl-empty">Projects loading&hellip;</div></section>`;
      }
      const dval = (p) => { const m = String(p.deliveryDate || '').match(/^(\d{4})(?:-(\d{2}))?/); return m ? (+m[1]) * 12 + (m[2] ? +m[2] - 1 : 11) : Infinity; };
      const sorted = list.slice().sort((a, b) => {
        if (!!b.featured - !!a.featured) return (!!b.featured) - (!!a.featured);
        return dval(a) - dval(b);
      });
      const total = sorted.length;
      if (!total) {
        return `<section class="atlas-section"><div class="atlas-section-head"><div>
            <h2 class="atlas-section-title">Tracked projects</h2>
            <p class="atlas-section-sub">No projects match the current filter.</p>
          </div></div></section>`;
      }
      const shown = sorted.slice(0, _pcardShown);
      const cards = shown.map(pcardHtml).join('');
      const moreBtn = total > shown.length
        ? `<div class="apcards-more-wrap"><button class="apcards-more" type="button" data-pcard-more="1">Show all ${total} projects</button></div>`
        : '';
      return `<section class="atlas-section">
        <div class="atlas-section-head"><div>
          <h2 class="atlas-section-title">Tracked projects</h2>
          <p class="atlas-section-sub">Every project in the filter, with live construction status — ${total} tracked.</p>
        </div></div>
        <div class="apcards">${cards}</div>
        ${moreBtn}
      </section>`;
    }

    function renderFootnote() {
      const total = (atlasData.hero_stats && atlasData.hero_stats.total_projects) || '';
      return `<div class="atlas-foot-note">
        <div class="fn-lbl">${hexMarker(13)} How this stays current</div>
        This dashboard reads straight from the live Map of Tomorrow database${total ? ` — the same ${total} projects` : ''} the autonomous routines keep current. The <b>construction sweep</b> updates statuses, dates and unit counts each week from sourced news; <b>discovery</b> adds new projects with photos and coordinates. Every tile, bar and mover above refreshes on its own — the longer it runs, the deeper the history gets.
      </div>`;
    }

    function renderRecentActivity() {
      const events = atlasData.recent_activity || [];
      if (!events.length) return '';
      const atlasTagClass = (ev) => {
        if (ev.type === 'article')     return 'news';
        if (ev.type === 'new_project') return 'map';
        return 'update';
      };
      const atlasTagLabel = (ev) => {
        if (ev.type === 'article')     return 'News';
        if (ev.type === 'new_project' || ev.type === 'tracking') return 'Tracking';
        return '';  // milestones use their own phase tag; no generic "Update"
      };
      const sepDot = '<span class="pulse-ev-sep">&middot;</span>';
      const cards = events.slice(0, 10).map(ev => {
        const type = ev.type || 'article';
        const tag = ev.tag || atlasTagLabel(ev);
        const typeLblHtml = tag ? '<span class="pulse-ev-type-lbl">' + escapeHtml(tag.toUpperCase()) + '</span>' : '';
        // Article rows always open in a new tab; map events (new_project /
        // status_change) deep-link into the map, so they also open there.
        const target = ' target="_blank" rel="noopener"';
        const locPart = ev.city
          ? sepDot + '<span class="pulse-ev-loc">' + escapeHtml(ev.city) + '</span>'
          : '';
        const tsPart = ev.ago
          ? sepDot + '<span class="pulse-ev-ts">' + escapeHtml(ev.ago) + '</span>'
          : '';
        const extIcon = type === 'article'
          ? '<svg class="pulse-ev-ext-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
          : '';
        // Map events carry a relative ?project= link on the map; rewrite to an
        // absolute map URL so the row opens the project on map.oftmw.com.
        let href = ev.link || '#';
        if (type !== 'article' && href && href.charAt(0) !== 'h') {
          href = MAP_ORIGIN + (href.charAt(0) === '/' ? '' : '/') + href;
        }
        return `
          <div class="pulse-ev-wrap pulse-ev-type-${atlasTagClass(ev)}" data-event-type="${escapeHtml(type)}">
            <a class="pulse-ev" href="${escapeHtml(href)}"${target}>
              <div class="pulse-ev-tsrow">
                ${typeLblHtml}
                ${locPart}
                ${tsPart}
              </div>
              <div class="pulse-ev-title">${escapeHtml(ev.title || '')}${extIcon}</div>
            </a>
          </div>`;
      }).join('');
      return `
        <section class="atlas-section">
          <div class="atlas-section-head">
            <div>
              <h2 class="atlas-section-title">This week on the map</h2>
              <p class="atlas-section-sub">Latest additions, status changes, and TMW coverage.</p>
            </div>
            <a href="${MAP_ORIGIN}/" class="atlas-section-link">Open the map <svg class="atlas-section-link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
          </div>
          <div class="v2-pulse-content">
            <div class="pulse-spine">${cards}</div>
          </div>
        </section>`;
    }

    function renderMostCovered() {
      const data = atlasData.most_covered || [];
      if (!data.length) return '';
      const rows = data.slice(0, 15).map((p, i) => {
        const rankClass = i < 3 ? 'top' : '';
        const href = p.slug ? `${MAP_ORIGIN}/projects/${encodeURIComponent(p.slug)}/` : '#';

            <div class="atlas-coverage-count">

              <div class="atlas-coverage-count-label">article${p.count === 1 ? '' : 's'}</div>

      return `
        <section class="atlas-section atlas-section-half">
          <div class="atlas-section-head">
