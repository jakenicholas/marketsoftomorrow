              <h2 class="atlas-section-title">Most covered on Tomorrow</h2>
              <p class="atlas-section-sub">Projects making the most headlines.</p>
            </div>
          </div>
          <div class="atlas-panel">${rows}</div>
        </section>`;
    }

    function renderComingSoon() {
      let data = atlasData.coming_soon || [];
      if (!data.length) return '';
      // Scope to the Market Calculator. coming_soon rows carry only title/city,
      // so match them against the filtered project set by title (and slug).
      if (_filterActive()) {
        const fl = filterProjectsByCalc();
        if (fl) {
          const allow = new Set();
          fl.forEach(p => { const t = (p.title || '').toLowerCase().trim(); if (t) allow.add(t); allow.add(_pcSlug(p.title || '')); });
          data = data.filter(p => allow.has((p.title || '').toLowerCase().trim()) || (p.slug && allow.has(p.slug)) || allow.has(_pcSlug(p.title || '')));
        }
      }
      if (!data.length) return '';
      const buckets = { '30d': [], '90d': [], 'rest': [] };
      data.forEach(p => { if (buckets[p.bucket]) buckets[p.bucket].push(p); });
      const yearLabel = new Date().getFullYear();
      const bucketLabels = {
        '30d':  'Next 30 days',
        '90d':  'Next 90 days',
        'rest': `Later in ${yearLabel}`,
      };
      const sections = ['30d', '90d', 'rest'].map(key => {
        if (!buckets[key].length) return '';
        const rows = buckets[key].map(p => {
          const href = p.slug ? `${MAP_ORIGIN}/projects/${encodeURIComponent(p.slug)}/` : '#';
          const label = p.display_label || (p.days_out != null ? `${p.days_out}d` : '');
          const showOut = (p.display_precision === 'day');
          return `
            <a class="atlas-coming-row" href="${escapeHtml(href)}">
              <div class="atlas-coming-info">
                <div class="atlas-coming-title">${escapeHtml(p.title || '')}</div>
                <div class="atlas-coming-meta">${escapeHtml(p.city || '')}${p.status ? ' · ' + escapeHtml(p.status) : ''}</div>
              </div>
              <div class="atlas-coming-days">
                <div class="atlas-coming-days-num">${escapeHtml(label)}</div>
                ${showOut ? '<div class="atlas-coming-days-label">out</div>' : ''}
              </div>
            </a>`;
        }).join('');
        return `
          <div class="atlas-coming-bucket" data-bucket="${key}">
            <div class="atlas-coming-bucket-head">
              <span class="atlas-coming-bucket-dot"></span>
              ${escapeHtml(bucketLabels[key])} <span style="color:rgba(255,255,255,0.4);font-weight:500;margin-left:auto;">${buckets[key].length}</span>
            </div>
            ${rows}
          </div>`;
      }).join('');
      return `
        <section class="atlas-section atlas-section-half">
          <div class="atlas-section-head">
            <div>
              <h2 class="atlas-section-title">Coming soon</h2>
              <p class="atlas-section-sub">Projects delivering through year-end.</p>
            </div>
          </div>
          <div class="atlas-panel atlas-coming-panel">${sections}</div>
        </section>`;
    }

    function renderCoverageAndComing() {
      // "Most covered on Tomorrow" (TMW coverage) section removed per request;
      // Coming Soon now renders full-width on its own.
      return renderComingSoon();
    }

    function renderFooter() {
      const ts = atlasData.generated_at ? new Date(atlasData.generated_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
      return `<div class="atlas-footer">Atlas · part of <a href="https://oftmw.com" style="color:rgba(255,255,255,0.6);">Markets of Tomorrow</a>${ts ? ' · data updated ' + escapeHtml(ts) : ''}</div>`;
    }

    // Build a city → state lookup from atlas data.
    function buildCityStateMap() {
      if (!atlasData) return {};
      if (atlasData.city_state_map && typeof atlasData.city_state_map === 'object') {
        return atlasData.city_state_map;
      }
      const out = {};
      const byState = atlasData.leaderboards_by_state || {};
      Object.entries(byState).forEach(([state, lb]) => {
        (lb && lb.cities || []).forEach(c => {
          if (c && c.name && !(c.name in out)) out[c.name] = state;
        });
      });
      (atlasData.leaderboards && atlasData.leaderboards.cities || []).forEach(c => {
        if (c && c.name && !(c.name in out) && c.states && c.states.length) {
          out[c.name] = c.states[0];
        }
      });
      return out;
    }

    // ── View tabs renderer — Overview vs Pipeline switcher
    function renderViewTabs() {
      return `
        <div class="atlas-view-tabs" role="tablist" aria-label="Atlas view">
          <button class="atlas-view-tab ${currentAtlasView === 'timeline' ? 'active' : ''}" data-atlas-view="timeline" role="tab" type="button">Pipeline timeline</button>
          <button class="atlas-view-tab ${currentAtlasView === 'stats' ? 'active' : ''}" data-atlas-view="stats" role="tab" type="button">Overview</button>
        </div>`;
    }

    // ── Pipeline timeline section — reads window.allProjectFeatures (built
    //    from projects-flat.json, see ensureProjectsLoaded). Each row links to
    //    the project page on map.oftmw.com.
    function renderTimelineSection() {
      const features = window.allProjectFeatures || [];
      if (!features.length) {
        return `
          <section class="atlas-section">
            <div class="atlas-tl-hero">
              <h2>What's opening next.</h2>
              <p>Every project in the TMW pipeline, ordered by delivery date.</p>
            </div>
            <div class="atlas-tl-empty">Pipeline still loading&hellip;</div>
          </section>`;
      }

      const cityToState = buildCityStateMap();
      const stateFilter = (currentStateFilter && currentStateFilter !== 'ALL') ? currentStateFilter : null;
      const typeFilter = (currentTypeFilter && currentTypeFilter !== 'ALL') ? currentTypeFilter : null;
      const cityFilter = (currentCityFilter && currentCityFilter !== 'ALL') ? currentCityFilter : null;
      const yearFilter = currentYearFilter ? parseInt(currentYearFilter, 10) : null;

      const STATUS_INFO = {
        'announced':       { label: 'Announced',       color: '#9CA3AF' },
        'breaking-ground': { label: 'Breaking Ground', color: '#FFD300' },
        'construction':    { label: 'Construction',    color: '#FF9500' },
        'coming-soon':     { label: 'Coming Soon',     color: '#4DABFF' },
        'open':            { label: 'Now Open',        color: '#1FDF67' },
      };
      const STATUS_FILTERS = [
        { id: 'all',              label: 'All' },
        { id: 'breaking-ground',  label: 'Breaking ground', color: '#FFD300' },
        { id: 'construction',     label: 'Construction',    color: '#FF9500' },
        { id: 'coming-soon',      label: 'Coming soon',     color: '#4DABFF' },
        { id: 'open',             label: 'Now open',        color: '#1FDF67' },
      ];
      function normStatus(raw) {
        const s = (raw || '').toString().toLowerCase();
        if (s.includes('now open') || s === 'open' || s.includes('complete')) return 'open';
        if (s.includes('opening') || s.includes('coming')) return 'coming-soon';
        if (s.includes('construction')) return 'construction';
        if (s.includes('breaking')) return 'breaking-ground';
        return 'announced';
      }
      function pyStyleSlugLocal(text) {
        return (text || '').toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '').replace(/[\s-]+/g, '-').replace(/^-|-$/g, '');
      }
      function escapeAttr(s) {
        return (s == null ? '' : String(s))
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }
      function fmtMonthYear(s) {
        if (!s) return '—';
        const m = String(s).match(/^(\d{4})(?:-(\d{2}))?/);
        if (!m) return s;
        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return m[2] ? `${MONTHS[+m[2]-1] || m[2]} ${m[1]}` : m[1];
      }
      function fmtNum(n) {
        if (n == null || n === '') return null;
        const v = parseInt(n, 10);
        return isNaN(v) ? null : v.toLocaleString();
      }

      const allBase = features.map(f => f.properties).filter(p => {
        if (!p.deliveryDate) return false;
        if (stateFilter) {
          const projectState = cityToState[p.city] || 'Other';
          if (projectState !== stateFilter) return false;
        }
        if (typeFilter) {
          const pty = ((p.projectType || '').split(',')[0] || '').trim();
          if (pty !== typeFilter) return false;
        }
        if (cityFilter && p.city !== cityFilter) return false;
        if (yearFilter) {
          const dy = parseInt(String(p.deliveryDate || '').slice(0, 4), 10);
          if (!dy || dy > yearFilter) return false;
        }
        if (currentTimelineFeatured && !p.featured) return false;
        return true;
      });

      const _now = new Date();
      const todayPivot = new Date(_now.getFullYear(), _now.getMonth(), 1);
      function deliveryAsDate(p) {
        const m = (p.deliveryDate || '').match(/^(\d{4})(?:-(\d{2}))?/);
        if (!m) return null;
        const year = +m[1];
        const month = m[2] ? +m[2] - 1 : 11;
        return new Date(year, month, 1);
      }

      const pipelineBase  = allBase.filter(p => { const d = deliveryAsDate(p); return d && d >= todayPivot; });
      const completedBase = allBase.filter(p => { const d = deliveryAsDate(p); return d && d <  todayPivot; });

      const statusFilter = currentTimelineStatus;
      const showCompleted = (statusFilter === 'all' || statusFilter === 'open');
      const showPipeline  = (statusFilter !== 'open');
      const pipelineShown = showPipeline
        ? pipelineBase.filter(p => statusFilter === 'all' || normStatus(p.delivery) === statusFilter)
        : [];
      const completedShown = showCompleted
        ? completedBase.filter(p => statusFilter === 'all' || normStatus(p.delivery) === statusFilter)
        : [];

      const filtered = (statusFilter === 'open') ? completedShown : pipelineShown;

      const totalCount = filtered.length;
      const totalUnits = filtered.reduce((s, p) => s + (parseInt(p.units, 10) || 0), 0);
      const totalKeys  = filtered.reduce((s, p) => s + (parseInt(p.keys, 10)  || 0), 0);
      const now = new Date();
      const cutoff = new Date(now.getFullYear(), now.getMonth() + 12, 1);
      let next12 = 0;
      for (const p of filtered) {
        const m = (p.deliveryDate || '').match(/^(\d{4})(?:-(\d{2}))?/);
        if (!m) continue;
        const d = new Date(+m[1], (m[2] ? +m[2] - 1 : 11), 1);
        if (d <= cutoff) next12++;
      }

      const heroHtml = `
        <div class="atlas-tl-hero">
          <h2>What's opening next.</h2>
          <p>Every project in the TMW pipeline, ordered by delivery date. Scroll forward through the calendar — see what's about to land in your market.</p>
          <div class="atlas-tl-hero-stats">
            <div class="atlas-tl-hero-stat"><span class="val accent">${totalCount}</span><span class="lbl">In pipeline</span></div>
            <div class="atlas-tl-hero-stat"><span class="val">${fmtNum(totalUnits) || '—'}</span><span class="lbl">Residential units</span></div>
            <div class="atlas-tl-hero-stat"><span class="val">${fmtNum(totalKeys) || '—'}</span><span class="lbl">Hotel keys</span></div>
            <div class="atlas-tl-hero-stat"><span class="val">${next12}</span><span class="lbl">Open in next 12 mo</span></div>
          </div>
        </div>`;

      const statusChipsHtml = STATUS_FILTERS.map(s => `
        <button class="atlas-tl-chip ${currentTimelineStatus === s.id ? 'active' : ''}" data-tl-status="${s.id}" type="button">
          ${s.color ? `<span class="swatch" style="background:${s.color}"></span>` : ''}${s.label}
        </button>
      `).join('');
      const featuredChipsHtml = `
        <button class="atlas-tl-chip ${!currentTimelineFeatured ? 'active' : ''}" data-tl-featured="all" type="button">All projects</button>
        <button class="atlas-tl-chip ${currentTimelineFeatured  ? 'active' : ''}" data-tl-featured="featured" type="button"><span style="color:#FFD300">&#9733;</span> Featured only</button>
      `;
      const totalAvailable = allBase.length;
      const filtersHtml = `
        <div class="atlas-tl-filters">
          <div class="atlas-tl-filter-group">${statusChipsHtml}</div>
          <div class="atlas-tl-filter-group">${featuredChipsHtml}</div>
          <span class="atlas-tl-meta-count">${totalCount} of ${totalAvailable}</span>
        </div>`;

      if (!pipelineShown.length && !completedShown.length) {
        const stateNote = stateFilter
          ? `No matching projects in <b>${escapeAttr(stateFilter)}</b>. Try a different state or filter.`
          : `No projects match the current filters.`;
        return `
          <section class="atlas-section">
            ${heroHtml}
            ${filtersHtml}
            <div class="atlas-tl-empty">${stateNote}</div>
          </section>`;
      }

      function buildGroups(items) {
        const groups = new Map();
        for (const p of items) {
          const m = (p.deliveryDate || '').match(/^(\d{4})(?:-(\d{2}))?/);
          if (!m) continue;
          const year = +m[1];
          const month = m[2] ? +m[2] : 12;
          const quarter = Math.ceil(month / 3);
          const key = `${year}-${quarter}`;
          if (!groups.has(key)) groups.set(key, { year, quarter, items: [] });
          groups.get(key).items.push(p);
        }
        return groups;
      }
      function rowHtml(p, isCompleted) {
        const status = normStatus(p.delivery);
        const info = STATUS_INFO[status] || STATUS_INFO.announced;
        const imgHtml = p.image
          ? `<img class="atlas-tl-row-img-photo" src="${escapeAttr(p.image)}" alt="" loading="lazy" decoding="async" />`
          : '';
        const type = p.preferredType || ((p.projectType || '').split(',')[0] || '').trim();
          const metaParts = [];
          if (p.city) metaParts.push(`<span>${escapeAttr(p.city)}</span>`);
          if (type)  metaParts.push(`<span class="sep">·</span><span>${escapeAttr(type)}</span>`);
          const firstFirm = (p.architects && p.architects[0] && p.architects[0].name)
            || (p.developers && p.developers[0] && p.developers[0].name)
            || '';
          if (firstFirm) {
            metaParts.push(`<span class="sep">&middot;</span><span>${escapeAttr(firstFirm)}</span>`);
          }
          const cfgChip = (() => {
            const s = (p.configSummary || '').trim();
            if (!s) return '';
            const SPELL = { two:2, three:3, four:4, five:5, six:6, seven:7, eight:8 };
            let m = s.match(/\b(\d+)[\s-]?(tower|building)s?\b/i);
            if (!m) {
              m = s.match(/\b(two|three|four|five|six|seven|eight)[\s-]?(tower|building)s?\b/i);
              if (m) m = [m[0], String(SPELL[m[1].toLowerCase()]), m[2]];
            }
            if (m) {
              const n = parseInt(m[1], 10);
              const noun = m[2].toLowerCase() === 'building' ? 'buildings' : 'towers';
              return `<span class="sep">&middot;</span><span class="atlas-tl-row-chip">${n} ${noun}</span>`;
            }
            if (/\b(tower|building)s?\b/i.test(s)) {
              return `<span class="sep">&middot;</span><span class="atlas-tl-row-chip">Multi-tower</span>`;
            }
            return '';
          })();
          if (cfgChip) metaParts.push(cfgChip);
          const phsChip = (() => {
            const s = (p.deliveryPhases || '').trim();
            if (!s) return '';
            const phaseMatches = s.match(/\bphase\s+\d+\b/gi);
            if (phaseMatches && phaseMatches.length >= 2) {
              return `<span class="sep">&middot;</span><span class="atlas-tl-row-chip warn">${phaseMatches.length} phases</span>`;
            }
            const dotParts = s.split(/\s+·\s+/).filter(Boolean);
            if (dotParts.length >= 2) {
              return `<span class="sep">&middot;</span><span class="atlas-tl-row-chip warn">${dotParts.length} phases</span>`;
            }
            return `<span class="sep">&middot;</span><span class="atlas-tl-row-chip warn">Phased</span>`;
          })();
          if (phsChip) metaParts.push(phsChip);
          if (p.datesSpeculative) {
            metaParts.push(`<span class="sep">&middot;</span><span class="atlas-tl-row-chip est">EST date</span>`);
          }
        const scaleParts = [];
        if (p.keys)   scaleParts.push(`<div class="stat"><b>${fmtNum(p.keys)}</b>keys</div>`);
        if (p.units)  scaleParts.push(`<div class="stat"><b>${fmtNum(p.units)}</b>units</div>`);
        if (p.floors) scaleParts.push(`<div class="stat"><b>${escapeAttr(p.floors)}</b>floors</div>`);
        const slug = pyStyleSlugLocal(p.title || '');
        const rowClass = 'atlas-tl-row atlas-tl-item' + (isCompleted ? ' atlas-tl-row--completed' : '');
        const projHref = slug ? `${MAP_ORIGIN}/projects/${encodeURIComponent(slug)}/` : '#';
        // Wrap the whole grid row in an anchor (display:contents) so the row
        // navigates to the project page on map.oftmw.com instead of relying on
        // the map's in-app click handler.
        return `
          <a class="atlas-tl-row-link" href="${escapeAttr(projHref)}">
          <div class="${rowClass}" data-project-slug="${escapeAttr(slug)}">
            <div class="atlas-tl-row-date">${escapeAttr(fmtMonthYear(p.deliveryDate))}</div>
            <div class="atlas-tl-row-dot-slot"></div>
            <div class="atlas-tl-row-card">
              <div class="atlas-tl-row-img">
                ${imgHtml}
                ${p.featured ? '<div class="atlas-tl-row-featured" title="Featured">&#9733;</div>' : ''}
                <div class="atlas-tl-row-status"><span class="dot" style="background:${info.color}"></span>${escapeAttr(info.label)}</div>
              </div>
              <div class="atlas-tl-row-body">
                <div class="atlas-tl-row-title">${escapeAttr(p.title || '')}</div>
                <div class="atlas-tl-row-meta">${metaParts.join('')}</div>
                ${scaleParts.length ? `<div class="atlas-tl-row-scale">${scaleParts.join('')}</div>` : ''}
              </div>
            </div>
          </div>
          </a>`;
      }
      function buildGroupsHtml(items, { isCompleted = false, descending = false } = {}) {
        if (!items.length) return '';
        const groups = buildGroups(items);
        const keys = [...groups.keys()].sort();
        if (descending) keys.reverse();
        const verb = isCompleted ? 'opened' : 'opening';
        return keys.map(k => {
          const g = groups.get(k);
          const sortedItems = g.items.slice().sort((a, b) => {
            const fa = (a.featured ? 1 : 0) - (b.featured ? 1 : 0);
            if (fa !== 0) return -fa;
            const cmp = (a.deliveryDate || '').localeCompare(b.deliveryDate || '');
            return descending ? -cmp : cmp;
          });
          const rowsHtml = sortedItems.map(p => rowHtml(p, isCompleted)).join('');
          const qheadClass = 'atlas-tl-qhead' + (isCompleted ? ' atlas-tl-qhead--completed' : '');
          return `
            <div class="${qheadClass}">
              <div class="atlas-tl-qhead-date">Q${g.quarter}<span class="yr">${g.year}</span></div>
              <div class="atlas-tl-qhead-dot"></div>
              <div class="atlas-tl-qhead-count"><span class="atlas-tl-qhead-date-inline">Q${g.quarter} ${g.year} &middot;</span> <b>${g.items.length}</b> project${g.items.length === 1 ? '' : 's'} ${verb}</div>
            </div>
            ${rowsHtml}`;
        }).join('');
      }
      const completedGroupsHtml = buildGroupsHtml(completedShown, { isCompleted: true, descending: false });
      const pipelineGroupsHtml  = buildGroupsHtml(pipelineShown,  { isCompleted: false });
      const archiveHeaderHtml = completedShown.length ? `
        <div class="atlas-tl-archive-head">
          <div class="atlas-tl-archive-eyebrow">Scroll down for today &darr;</div>
          <div class="atlas-tl-archive-title">Recently opened</div>
          <div class="atlas-tl-archive-sub">${completedShown.length} project${completedShown.length === 1 ? '' : 's'} already delivered &mdash; oldest first, working forward to today.</div>
        </div>` : '';
      const nowBoundaryHtml = (completedShown.length && pipelineShown.length) ? `
        <div class="atlas-tl-now-boundary" id="atlasTlNowBoundary">
          <span class="atlas-tl-now-pill">Today</span>
        </div>` : '';

      return `
        <section class="atlas-section">
          ${heroHtml}
          ${filtersHtml}
          <div class="atlas-tl-list">
            ${archiveHeaderHtml}
            ${completedGroupsHtml}
            ${nowBoundaryHtml}
            ${pipelineGroupsHtml}
          </div>
        </section>`;
    }

    function renderAll() {
      if (!atlasData) return;
      const root = document.getElementById('atlasRoot');
      if (!root) return;
      syncHeadOffset();
      const stickyhead = '<div class="atlas-stickyhead">' + renderViewTabs() + '</div>';
      const sections = [];
      if (currentAtlasView === 'timeline') {
        sections.push(stickyhead, renderStateFilter(), renderTimelineSection());
      } else {
        sections.push(
          renderIntelHeader(),
          stickyhead,
          renderStateFilter(),
          renderHeadlineTiles(),
          renderDashGrid(),
          renderProjectCards(),
          renderLeaderboardSection(),
          renderCoverageAndComing(),
          renderFootnote()
        );
      }
      sections.push(renderFooter());
      root.innerHTML = sections.join('');
      wireInteractions();
      updateLoadMoreBtn(currentLbKey);
      // Land the user at the "Today" boundary in timeline view. On the native
      // page the scroll container is the window (not a fixed overlay), so we
      // scroll the boundary element into view just below the sticky header.
      if (currentAtlasView === 'timeline' && !_atlasTlScrolledOnce) {
        const boundary = document.getElementById('atlasTlNowBoundary');
        if (boundary) {
          requestAnimationFrame(() => {
            const rect = boundary.getBoundingClientRect();
            const top = window.pageYOffset + rect.top - 100;
            window.scrollTo({ top: top > 0 ? top : 0, behavior: 'auto' });
            _atlasTlScrolledOnce = true;
          });
        }
      }
    }
    let _atlasTlScrolledOnce = false;

    function wireInteractions() {
      // Atlas view tabs (Overview / Pipeline timeline)
      document.querySelectorAll('.atlas-view-tab').forEach(t => {
        t.addEventListener('click', function() {
          const view = this.dataset.atlasView;
          if (!view || view === currentAtlasView) return;
          currentAtlasView = view;
          _atlasTlScrolledOnce = false;
          // Switching to the Pipeline view the first time needs the project
          // list; kick off the fetch and re-render when it resolves.
          if (view === 'timeline' && !(window.allProjectFeatures && window.allProjectFeatures.length)) {
            renderAll();           // render hero + "loading" placeholder immediately
            ensureProjectsLoaded().then(() => {
              if (currentAtlasView === 'timeline') renderAll();
            });
            return;
          }
          renderAll();
          if (view !== 'timeline') {
            window.scrollTo({ top: 0, behavior: 'auto' });
          }
        });
      });

      // Timeline status filter chips
      document.querySelectorAll('.atlas-tl-chip[data-tl-status]').forEach(chip => {
        chip.addEventListener('click', function() {
          const next = this.dataset.tlStatus;
          if (next === currentTimelineStatus) return;
          currentTimelineStatus = next;
          renderAll();
        });
      });
      // Timeline featured-only toggle
      document.querySelectorAll('.atlas-tl-chip[data-tl-featured]').forEach(chip => {
        chip.addEventListener('click', function() {
          const next = this.dataset.tlFeatured === 'featured';
          if (next === currentTimelineFeatured) return;
          currentTimelineFeatured = next;
          renderAll();
        });
      });

      // Market calculator — Market (state/city) · Category · Delivery by.
      // Applies on select change and on "Show me", re-rendering every panel.
      function applyCalc() {
        const place = document.getElementById('ac-place');
        const cat = document.getElementById('ac-cat');
        const yr = document.getElementById('ac-year');
        const pv = place ? place.value : '';
        if (pv.indexOf('st:') === 0) { currentStateFilter = pv.slice(3); currentCityFilter = 'ALL'; }
        else if (pv.indexOf('ci:') === 0) { currentCityFilter = pv.slice(3); currentStateFilter = 'ALL'; }
        else { currentStateFilter = 'ALL'; currentCityFilter = 'ALL'; }
        currentTypeFilter = (cat && cat.value) ? cat.value : 'ALL';
        currentYearFilter = (yr && yr.value) ? yr.value : '';
        _pcardShown = PCARD_STEP;
        Object.keys(lbState).forEach(k => { lbState[k].showAll = false; });
        const y = window.pageYOffset;
        renderAll();
        window.scrollTo({ top: y, behavior: 'auto' });
      }
      const calcForm = document.getElementById('atlas-calc-form');
      if (calcForm) {
        calcForm.addEventListener('submit', function(e) { e.preventDefault(); applyCalc(); });
        ['ac-place', 'ac-cat', 'ac-year'].forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener('change', applyCalc); });
      }
      // Project-card grid "show all" — reveal the full filtered set.
      const pcardMore = document.querySelector('[data-pcard-more]');
      if (pcardMore) {
        pcardMore.addEventListener('click', function() {
          _pcardShown = Infinity;
          const y = window.pageYOffset;
          renderAll();
          window.scrollTo({ top: y, behavior: 'auto' });
        });
      }
      // Leaderboard tab switching
      document.querySelectorAll('.atlas-lb-tab').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.atlas-lb-tab').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const key = this.dataset.lbTab;
          currentLbKey = key;
          const content = document.getElementById('atlasLbContent');
          if (content) content.innerHTML = renderLeaderboardRows(key);
          updateLoadMoreBtn(key);
        });
      });
      // Load more / Show less toggle
      const loadMore = document.getElementById('atlasLoadMore');
      if (loadMore) {
        loadMore.addEventListener('click', function() {
          const activeTab = document.querySelector('.atlas-lb-tab.active');
          const key = activeTab ? activeTab.dataset.lbTab : 'developers';
          lbState[key].showAll = !lbState[key].showAll;
          const content = document.getElementById('atlasLbContent');
          if (content) content.innerHTML = renderLeaderboardRows(key);
          updateLoadMoreBtn(key);
          if (!lbState[key].showAll) {
            const tabs = document.querySelector('.atlas-lb-tabs');
            if (tabs) tabs.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      }
    }

    // ── Data loading ────────────────────────────────────────────────────
    function loadAtlasData() {
      if (atlasLoaded) return Promise.resolve(atlasData);
      // Absolute URL — this page is on www.oftmw.com; atlas.json is served
      // from map.oftmw.com (CORS: access-control-allow-origin: *).
      return fetch(`${MAP_ORIGIN}/atlas.json`, { cache: 'no-cache' })
        .then(r => {
          if (!r.ok) throw new Error('atlas.json fetch failed: ' + r.status);
          return r.json();
        })
        .then(data => {
          atlasData = data;
          atlasLoaded = true;
          return data;
        })
        .catch(err => {
          console.warn('[Atlas] Could not load atlas.json:', err);
          const root = document.getElementById('atlasRoot');
          if (root) {
            root.innerHTML = '<div class="atlas-error">Could not load Atlas data. Please try again later.</div>';
          }
          throw err;
        });
    }

    // Build window.allProjectFeatures from projects-flat.json, mapping each
    // flat (PascalCase) record into the {properties:{...camelCase}} shape the
    // map's render code expects — mirrors the map's initializeData() mapping
    // (architects/developers zipped name+slug arrays, boolean featured, etc.).
    let _projectsLoaded = false;
    let _projectsPromise = null;
    function ensureProjectsLoaded() {
      if (_projectsLoaded) return Promise.resolve(window.allProjectFeatures);
      if (_projectsPromise) return _projectsPromise;
      _projectsPromise = fetch(`${MAP_ORIGIN}/projects-flat.json`, { cache: 'no-store' })
        .then(r => {
          if (!r.ok) throw new Error('projects-flat.json fetch failed: ' + r.status);
          return r.json();
        })
        .then(jsonRows => {
          const rows = Array.isArray(jsonRows) ? jsonRows : [];
          const features = rows.map(p => {
            const types = p.ProjectType
              ? p.ProjectType.split(',').map(t => t.trim().toLowerCase()).filter(Boolean)
              : [];
            return {
              type: 'Feature',
              geometry: { type: 'Point', coordinates: [+p.Longitude, +p.Latitude] },
              properties: {
                title: p.Title, city: p.City, description: p.Description,
                delivery: p.Delivery, image: p.ImageURL, website: p.OfficialWebsite,
                projectType: p.ProjectType,
                preferredType: (p.PreferredType || '').trim(),
                projectTypesStr: types.join(','),
                developer: p.Developer || '',
                architect: p.Architect || '',
                architects: (function () {
                  const names = (p.Architect || '').split(',').map(s => s.trim()).filter(Boolean);
                  const slugs = (p.ArchitectSlugs || '').split(',').map(s => s.trim()).filter(Boolean);
                  return names.map((name, i) => ({ name, slug: slugs[i] || '' }));
                })(),
                developers: (function () {
                  const names = (p.Developer || '').split(',').map(s => s.trim()).filter(Boolean);
                  const slugs = (p.DeveloperSlugs || '').split(',').map(s => s.trim()).filter(Boolean);
                  return names.map((name, i) => ({ name, slug: slugs[i] || '' }));
                })(),
                deliveryDate: p.DeliveryDate || '',
                keys: p.Keys || '',
                units: p.Units || '',
                floors: p.Floors || '',
                configSummary: p.ConfigSummary || '',
                deliveryPhases: p.DeliveryPhases || '',
                startSpeculative:    (p.StartSpeculative === '1' || p.StartSpeculative === true),
                deliverySpeculative: (p.DeliverySpeculative === '1' || p.DeliverySpeculative === true),
                datesSpeculative:    (p.DatesSpeculative === '1' || p.DatesSpeculative === true
                                     || p.StartSpeculative === '1' || p.DeliverySpeculative === '1'),
                startDate: p.StartDate || '',
                descriptionLong: p.DescriptionLong || '',
                featured: (p.Featured || '').trim().toLowerCase() === 'featured'
              },
              _projectTypes: types
            };
          });
          window.allProjectFeatures = features;
          _projectsLoaded = true;
          return features;
        })
        .catch(err => {
          console.warn('[Atlas] Could not load projects-flat.json:', err);
          window.allProjectFeatures = window.allProjectFeatures || [];
          _projectsLoaded = true;   // don't retry-storm; timeline degrades to empty state
          return window.allProjectFeatures;
        });
      return _projectsPromise;
    }

    // ── Boot ─────────────────────────────────────────────────────────────
    // Allow deep-linking the timeline via ?view=timeline (anything else,
    // including no param, defaults to the instant-rendering Overview).
    (function readInitialView() {
      try {
        const params = new URLSearchParams(window.location.search);
        const v = params.get('view');
        if (v === 'timeline' || v === 'pipeline') currentAtlasView = 'timeline';
      } catch (_) {}
    })();

    function init() {
      loadAtlasData().then(() => {
        if (!atlasData) return;
        renderAll();  // instant data panels (timeline hero / overview cards show a loading state)
        // Both views need the project list — the Overview for its card grid,
        // the timeline for its rows. Fetch once, then re-render to fill them in.
        if (!(window.allProjectFeatures && window.allProjectFeatures.length)) {
          ensureProjectsLoaded().then(() => { if (atlasData) renderAll(); });
        }
      }).catch(() => {});
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    // The journal-chrome header injects asynchronously — re-measure once it lands.
    window.addEventListener('load', syncHeadOffset);
    setTimeout(syncHeadOffset, 300);
    setTimeout(syncHeadOffset, 1000);

    // Re-render leaderboard if viewport crosses the mobile/desktop boundary
    let lastMobile = isMobileNow();
    window.addEventListener('resize', function() {
      syncHeadOffset();
      const m = isMobileNow();
      if (m !== lastMobile) {
        lastMobile = m;
        if (atlasData && currentAtlasView === 'stats') {
          const activeTab = document.querySelector('.atlas-lb-tab.active');
          const key = activeTab ? activeTab.dataset.lbTab : 'developers';
          const content = document.getElementById('atlasLbContent');
          if (content) content.innerHTML = renderLeaderboardRows(key);
          updateLoadMoreBtn(key);
        }
      }
    });
  })();
  </script>

  <!-- ───────────────────────────────────────────────────────────────────
       ATLAS PAYWALL GATE — 24-hour preview for non-Pro users, shared with the
       map (same `mot_trial_start` localStorage key) so the whole product is one
       24h trial. After 24h, a Pro paywall nudges (soft — dismissible). Paid
       members are never gated (Memberstack/_isPaidMember via journal-auth).
       ─────────────────────────────────────────────────────────────────── -->
  <script>
  (function () {
    var TRIAL_MS = 24 * 60 * 60 * 1000, KEY = 'mot_trial_start';
    function trialStart() {
      var t = parseInt(localStorage.getItem(KEY) || '0', 10);
      if (!t) { t = Date.now(); try { localStorage.setItem(KEY, String(t)); } catch (e) {} }
      return t;
    }
    function expired() { return (Date.now() - trialStart()) >= TRIAL_MS; }
    function isPro() {
      try {
        if (window._isPaidMember) return true;
        if (window.tmwAuth && window.tmwAuth.paid) return true;
        if (localStorage.getItem('tmw_auth_state') === 'pro') return true;
      } catch (e) {}
      return false;
    }
    function start() {
      if (isPro()) return;                        // never gate Pro members
      trialStart();                              // stamp the 24h clock on first visit
      if (expired() && typeof window.tmwShowPaywall === 'function') {
        window.tmwShowPaywall('atlas', { hard: false });
      }
    }
    // Decide only once auth is actually RESOLVED (tmwAuth.ready), not merely when
    // _isPaidMember is defined — it's pre-set to false before Memberstack resolves,
    // which was briefly gating Pro members. Cached pro state short-circuits.
    function ready(cb) {
      if (isPro() || (window.tmwAuth && window.tmwAuth.ready)) return cb();
      var n = 0, t = setInterval(function () {
        if ((window.tmwAuth && window.tmwAuth.ready) || isPro() || ++n > 50) { clearInterval(t); cb(); }
      }, 100);
    }
    function boot() { ready(start); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  })();
  </script>
