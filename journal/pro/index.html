<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">

<link rel="icon" type="image/svg+xml" href="/media/img/favicon.svg">
<meta name="description" content="Markets of Tomorrow Pro — the full development pipeline, TMW Intelligence, Atlas, and more. See tomorrow before it's built.">
<link rel="canonical" href="https://www.oftmw.com/pro/">
<meta property="og:type" content="website">
<meta property="og:title" content="Markets of Tomorrow Pro">
<meta property="og:description" content="The full pipeline, before the cranes arrive.">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#070807;--gold:#e6c574;--gold-soft:#f0d68a;--mute:#9AA39C;--hair:rgba(255,255,255,.08);--serif:'Fraunces',Georgia,serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--ink);color:#ECEAE5;font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
.pro-hero{padding:54px 0 80px;text-align:center;position:relative}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);margin:0 0 18px}
.pro-h1{font-family:var(--serif);font-size:clamp(34px,5vw,56px);font-weight:500;line-height:1.05;letter-spacing:-.02em;color:#fff;margin:0 auto 30px;max-width:18ch}
.videoWrap{position:relative;width:100%;max-width:920px;margin:0 auto;aspect-ratio:16/9;border-radius:18px;overflow:hidden;border:1px solid var(--hair);box-shadow:0 30px 80px rgba(0,0,0,.6);background:#0c0c0e}
.videoWrap video{width:100%;height:100%;object-fit:cover;display:block}
.unmute{position:absolute;right:16px;bottom:16px;z-index:2;display:inline-flex;align-items:center;gap:8px;cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#0a0a0a;
  background:linear-gradient(135deg,var(--gold-soft),var(--gold));border:0;border-radius:999px;padding:9px 16px;box-shadow:0 6px 20px rgba(0,0,0,.45)}
.unmute svg{width:14px;height:14px;display:block}
.unmute[hidden]{display:none}
.caption{font-family:var(--serif);font-style:italic;font-weight:300;font-size:clamp(17px,2.2vw,21px);line-height:1.5;color:#cfd3cd;margin:26px auto 0;max-width:60ch}
.cta-row{margin-top:34px}
.goPro{appearance:none;cursor:pointer;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a2c08;
  background:linear-gradient(135deg,var(--gold-soft),var(--gold));border:0;border-radius:999px;padding:16px 40px;box-shadow:0 0 26px rgba(230,197,116,.4);transition:box-shadow .2s,transform .05s}
.goPro:hover{box-shadow:0 0 38px rgba(230,197,116,.6)}
.goPro:active{transform:scale(.985)}
.cta-sub{margin-top:14px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
@media(max-width:640px){.pro-hero{padding:34px 0 56px}.videoWrap{border-radius:14px}}
</style>
</head>
<body>

<!-- NAV — injected by /_shared/journal-chrome.js (universal header). -->

<main class="wrap">
  <section class="pro-hero">
    <p class="eyebrow">Markets of TMW &middot; Pro</p>
    <h1 class="pro-h1">See tomorrow before it&rsquo;s built.</h1>

    <div class="videoWrap">
      <video id="proVid" autoplay muted loop playsinline preload="auto"
             poster="https://pub-7da0281887564d10a10107987c7c6c0c.r2.dev/wix/video/pro-poster.jpg">
        <source src="https://pub-7da0281887564d10a10107987c7c6c0c.r2.dev/wix/video/pro.mp4" type="video/mp4">
      </video>
      <button class="unmute" id="unmute" type="button" aria-label="Tap for sound" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path></svg>
        Tap for sound
      </button>
    </div>

    <p class="caption">Every tower, tracked from filing to topping-out &mdash; TMW Intelligence, Atlas, and the full pipeline, before the cranes arrive.</p>

    <div class="cta-row">
      <button class="goPro" id="goPro" type="button">Go Pro</button>
      <div class="cta-sub">Unlock everything</div>
    </div>
  </section>
</main>

<script src="/_shared/journal-auth.js" defer></script>
<script src="/_shared/journal-chrome.js" defer></script>
<script>
(function(){
  var v=document.getElementById('proVid'), um=document.getElementById('unmute');

  // Browsers block autoplay WITH sound until the user has interacted with the
  // page. So we always start muted (guaranteed to play), attempt to unmute, and
  // if that's refused we surface a "Tap for sound" affordance + unmute on the
  // first interaction anywhere.
  function withSound(){ if(!v)return; v.muted=false; v.volume=1; var p=v.play(); if(p&&p.then){p.then(function(){ if(um) um.hidden=true; }).catch(function(){ v.muted=true; if(um) um.hidden=false; });} }
  if(v){
    v.play().catch(function(){});
    setTimeout(withSound, 250);
    setTimeout(function(){ if(v.muted && um) um.hidden=false; }, 900);
  }
  function enableSound(){ withSound(); document.removeEventListener('click',enableSound); document.removeEventListener('touchstart',enableSound); }
  if(um) um.addEventListener('click', function(e){ e.stopPropagation(); enableSound(); });
  document.addEventListener('click', enableSound);
  document.addEventListener('touchstart', enableSound, {passive:true});

  var g=document.getElementById('goPro');
  if(g) g.addEventListener('click', function(){
    try{ if(window.gtag) gtag('event','pro_landing_go_pro_clicked'); }catch(_){}
    if(typeof window.tmwShowPaywall==='function') window.tmwShowPaywall('pro-landing');
    else window.location.href='https://www.oftmw.com/map/?upgrade=1';
  });
})();
</script>
</body>
</html>
