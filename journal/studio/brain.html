<!DOCTYPE html>
<!-- build-stamp: studio-v1 · brand brain viewer -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>TMW Studio · Brand Brain</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070807; --panel:#131613; --panel-2:#1a1d1a;
  --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.16);
  --text:#ECEAE5; --mute:#9AA39C; --mute-2:#C2C9C3; --white:#fff;
  --green:#1FDF67; --green-soft:#42EB81; --gold:#e6c574; --gold-soft:#f0d68a;
  --purple:#A78BFA; --purple-soft:#C4B5FD; --danger:#ff5d5d;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --serif:'Fraunces',Georgia,serif; --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--ink); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased}
.topbar{position:sticky; top:0; z-index:30; background:rgba(7,8,7,.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--hair)}
.topbar-inner{display:flex; align-items:center; gap:16px; padding:14px 20px; flex-wrap:wrap}
.brand{display:flex; flex-direction:column; gap:2px}
.brand-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--green)}
.brand-title{font-family:var(--serif); font-weight:600; font-size:20px; color:var(--white)}
.tablinks{display:flex; gap:4px; padding:5px; background:rgba(255,255,255,.04); border:1px solid var(--hair); border-radius:99px; flex-wrap:wrap}
.tablinks a{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; padding:9px 16px; border-radius:99px; color:var(--mute-2); text-decoration:none; font-weight:600}
.tablinks a:hover{color:var(--white)} .tablinks a.on{background:var(--white); color:var(--ink)}

.bar{display:flex; align-items:center; gap:10px; padding:12px 20px; border-bottom:1px solid var(--hair); flex-wrap:wrap; background:var(--panel)}
.bar .grow{flex:1; min-width:120px}
.btn{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; padding:9px 14px; border-radius:8px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--text); cursor:pointer; white-space:nowrap}
.btn:hover{border-color:rgba(255,255,255,.32); color:var(--white)}
.btn-primary{background:var(--green); color:#0a0a0a; border-color:var(--green)}
.btn-primary:hover{background:var(--green-soft)}
.btn-ghost{background:transparent}
.btn:disabled{opacity:.45; cursor:not-allowed}
.status{font-family:var(--mono); font-size:11px; color:var(--mute)}
.status.ok{color:var(--green-soft)} .status.err{color:var(--danger)} .status.warn{color:var(--gold-soft)}
.search{background:rgba(255,255,255,.04); border:1px solid var(--hair-2); color:var(--white); font-family:var(--sans); font-size:13px; padding:9px 12px; border-radius:8px; outline:0; min-width:200px}
.search:focus{border-color:var(--green)}

.wrap{max-width:1080px; margin:0 auto; padding:22px 20px 80px}

/* add / edit form */
.form{background:var(--panel); border:1px solid var(--hair-2); border-radius:14px; padding:16px; margin-bottom:26px; display:grid; grid-template-columns:170px 1fr; gap:12px 14px}
.form .full{grid-column:1/-1}
.form label{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute-2); display:block; margin-bottom:5px}
.form select, .form input, .form textarea{width:100%; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); color:var(--white); font-family:var(--sans); font-size:13.5px; padding:9px 11px; border-radius:8px; outline:0; resize:vertical}
.form select{font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em}
.form select:focus, .form input:focus, .form textarea:focus{border-color:var(--green)}
.form .actions{grid-column:1/-1; display:flex; gap:10px; align-items:center}
.form-title{grid-column:1/-1; font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--green); margin-bottom:2px}

.section{margin-bottom:28px}
.section-head{display:flex; align-items:baseline; gap:10px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--hair)}
.section-head h2{font-family:var(--serif); font-weight:600; font-size:19px; color:var(--white)}
.section-head .count{font-family:var(--mono); font-size:11px; color:var(--mute)}
.notes{display:flex; flex-direction:column; gap:9px}
.note{display:grid; grid-template-columns:96px 1fr auto; gap:14px; align-items:start; background:var(--panel); border:1px solid var(--hair); border-radius:11px; padding:13px 15px}
.note:hover{border-color:var(--hair-2)}
.note .k{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:5px 8px; border-radius:6px; text-align:center; align-self:start; border:1px solid currentColor; opacity:.9}
.k.voice{color:var(--purple-soft)} .k.rule{color:var(--green-soft)} .k.structure{color:var(--gold-soft)}
.k.topic,.k.like{color:var(--green-soft)} .k.avoid,.k.dislike{color:var(--danger)} .k.example{color:var(--gold-soft)}
.note .body{font-size:14px; line-height:1.5; color:var(--text)}
.note .ctx{color:var(--mute); font-style:italic}
.note .meta{font-family:var(--mono); font-size:10px; color:var(--mute); margin-top:6px}
.note .tools{display:flex; gap:5px}
.tbtn{width:28px; height:28px; display:grid; place-items:center; border-radius:7px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--mute-2); cursor:pointer; font-size:13px}
.tbtn:hover{color:var(--white); border-color:rgba(255,255,255,.3)} .tbtn.del:hover{color:var(--danger); border-color:var(--danger)}
.empty{padding:60px 20px; text-align:center; color:var(--mute); font-family:var(--mono); font-size:13px}
.gate{padding:50px 20px; text-align:center; color:var(--mute); font-family:var(--mono); font-size:13px}
.gate a{color:var(--green-soft)}
.hint{font-family:var(--mono); font-size:11px; color:var(--mute); margin-top:4px}
@media(max-width:640px){ .form{grid-template-columns:1fr} .note{grid-template-columns:1fr; gap:8px} }
</style>
<script src="/_shared/admin-auth.js"></script>
</head>
<body>

<div class="topbar"><div class="topbar-inner">
  <div class="brand"><div class="brand-eyebrow">TMW Studio</div><div class="brand-title">Brand Brain</div></div>
  <div class="tablinks">
    <a href="/studio/">Posts</a>
    <a href="/studio/media.html">Media</a>
    <a href="/studio/migrate-wix.html">Wix library</a>
    <a href="/studio/lists.html">Lists</a>
    <a href="/studio/brain.html" class="on">Brain</a>
    <a href="/studio/sync.html">Wix sync</a>
    <a href="/studio/analytics.html">Analytics</a>
  </div>
</div></div>

<div class="bar">
  <input class="search" id="search" placeholder="Filter notes…">
  <div class="grow"></div>
  <span class="status" id="status">—</span>
  <button class="btn btn-ghost" id="reloadBtn">Reload</button>
</div>

<div class="wrap">
  <div class="form" id="form">
    <div class="form-title" id="formTitle">Add a note to the brain</div>
    <div>
      <label>Kind</label>
      <select id="f_kind">
        <option value="voice">voice</option>
        <option value="rule">rule</option>
        <option value="structure">structure</option>
        <option value="topic">topic</option>
        <option value="like">like</option>
        <option value="avoid">avoid</option>
        <option value="dislike">dislike</option>
        <option value="example">example</option>
      </select>
    </div>
    <div>
      <label>Category (optional)</label>
      <input id="f_category" placeholder="e.g. headline, carousel">
    </div>
    <div class="full">
      <label>Note — one crisp, reusable sentence</label>
      <textarea id="f_note" rows="2" placeholder="e.g. Write in flowing paragraph prose — never bullet lists."></textarea>
    </div>
    <div class="full">
      <label>Context (optional — a post slug, example, or the reason)</label>
      <input id="f_context" placeholder="optional">
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="saveBtn">Add note</button>
      <button class="btn btn-ghost" id="cancelBtn" style="display:none">Cancel edit</button>
      <span class="hint">Shared with the connector — Claude sees changes instantly.</span>
    </div>
  </div>

  <div id="sections"><div class="empty">Loading…</div></div>
</div>

<script>
const WORKER_URL='https://tmw.jake-ab7.workers.dev';
const TOKEN_KEY='tmw-admin-token-v1';
const SECTIONS=[
  {title:'Voice & identity', kinds:['voice']},
  {title:'Rules', kinds:['rule']},
  {title:'Structure & format', kinds:['structure']},
  {title:'Lean into (topics & likes)', kinds:['topic','like']},
  {title:'Avoid', kinds:['avoid','dislike']},
  {title:'Examples that worked', kinds:['example']},
];
let NOTES=[], editingId=null, FILTER='';
const $=s=>document.querySelector(s);
function getToken(){return ((window.TMWAuth&&window.TMWAuth.token&&window.TMWAuth.token())||localStorage.getItem(TOKEN_KEY)||'').trim();}
function loginUrl(){return (window.TMWAuth&&window.TMWAuth.loginUrl&&window.TMWAuth.loginUrl())||'/studio/';}
function whoami(){return ((window.TMWAuth&&window.TMWAuth.user&&window.TMWAuth.user())||'studio');}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function status(m,c){const e=$('#status');e.textContent=m;e.className='status '+(c||'')}
function fmtDate(ts){try{return new Date(ts*1000).toLocaleDateString(undefined,{month:'short',day:'numeric'})}catch(e){return''}}

async function load(){
  const tok=getToken();
  if(!tok){ $('#sections').innerHTML=`<div class="gate">Log in with GitHub to view the brain — <a href="${loginUrl()}">sign in</a>.</div>`; status('Not signed in','err'); return; }
  status('Loading…');
  try{
    const r=await fetch(`${WORKER_URL}/brain`,{headers:{'Authorization':'Bearer '+tok},cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json(); NOTES=d.notes||[];
    status(`${NOTES.length} notes`,'ok'); render();
  }catch(e){ status('Load failed: '+(e.message||e),'err'); $('#sections').innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; }
}

function render(){
  const q=FILTER.toLowerCase();
  const visible=NOTES.filter(n=>!q || (n.note+' '+(n.category||'')+' '+(n.context||'')+' '+n.kind).toLowerCase().includes(q));
  if(!visible.length){ $('#sections').innerHTML='<div class="empty">'+(q?'No notes match “'+esc(FILTER)+'”.':'No notes yet — add one above.')+'</div>'; return; }
  const used=new Set(); let html='';
  for(const sec of SECTIONS){
    const items=visible.filter(n=>sec.kinds.includes(n.kind));
    if(!items.length)continue;
    items.forEach(n=>used.add(n.id));
    html+=`<div class="section"><div class="section-head"><h2>${esc(sec.title)}</h2><span class="count">${items.length}</span></div><div class="notes">`;
    html+=items.map(noteCard).join('');
    html+=`</div></div>`;
  }
  const other=visible.filter(n=>!used.has(n.id));
  if(other.length){ html+=`<div class="section"><div class="section-head"><h2>Other</h2><span class="count">${other.length}</span></div><div class="notes">`+other.map(noteCard).join('')+`</div></div>`; }
  $('#sections').innerHTML=html;
  $('#sections').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>startEdit(b.dataset.edit));
  $('#sections').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>retire(b.dataset.del));
}
function noteCard(n){
  return `<div class="note">
    <div class="k ${esc(n.kind)}">${esc(n.kind)}</div>
    <div><div class="body">${esc(n.note)}${n.context?` <span class="ctx">(${esc(n.context)})</span>`:''}</div>
      <div class="meta">by ${esc(n.created_by||'—')}${n.created_at?' · '+fmtDate(n.created_at):''}${n.category?' · '+esc(n.category):''} · ${esc(n.id)}</div></div>
    <div class="tools">
      <button class="tbtn" data-edit="${esc(n.id)}" title="Edit">✎</button>
      <button class="tbtn del" data-del="${esc(n.id)}" title="Retire">✕</button>
    </div></div>`;
}

function startEdit(id){
  const n=NOTES.find(x=>x.id===id); if(!n)return;
  editingId=id;
  $('#f_kind').value=n.kind; $('#f_category').value=n.category||''; $('#f_note').value=n.note; $('#f_context').value=n.context||'';
  $('#formTitle').textContent='Editing note '+id;
  $('#saveBtn').textContent='Save changes'; $('#cancelBtn').style.display='';
  window.scrollTo({top:0,behavior:'smooth'}); $('#f_note').focus();
}
function cancelEdit(){ editingId=null; $('#f_kind').value='voice'; $('#f_category').value=''; $('#f_note').value=''; $('#f_context').value='';
  $('#formTitle').textContent='Add a note to the brain'; $('#saveBtn').textContent='Add note'; $('#cancelBtn').style.display='none'; }

async function save(){
  const tok=getToken(); if(!tok){status('Sign in first.','err');return;}
  const note=$('#f_note').value.trim(); if(!note){status('Note text is required.','warn'); $('#f_note').focus(); return;}
  const body={kind:$('#f_kind').value, category:$('#f_category').value.trim(), note, context:$('#f_context').value.trim(), by:whoami()};
  if(editingId)body.id=editingId;
  $('#saveBtn').disabled=true; status(editingId?'Saving…':'Adding…');
  try{
    const r=await fetch(`${WORKER_URL}/brain`,{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json().catch(()=>({})); if(!r.ok)throw new Error(d.error||('HTTP '+r.status));
    cancelEdit(); await load(); status('Saved ✓','ok');
  }catch(e){ status('Save failed: '+(e.message||e),'err'); }
  finally{ $('#saveBtn').disabled=false; }
}
async function retire(id){
  const n=NOTES.find(x=>x.id===id);
  if(!confirm('Retire this note?\n\n“'+((n&&n.note)||id)+'”\n\nIt will be removed from the brain (Claude won’t see it).'))return;
  const tok=getToken(); if(!tok){status('Sign in first.','err');return;}
  status('Retiring…');
  try{
    const r=await fetch(`${WORKER_URL}/brain/${encodeURIComponent(id)}`,{method:'DELETE',headers:{'Authorization':'Bearer '+tok}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    if(editingId===id)cancelEdit();
    await load(); status('Retired ✓','ok');
  }catch(e){ status('Retire failed: '+(e.message||e),'err'); }
}

$('#saveBtn').onclick=save;
$('#cancelBtn').onclick=cancelEdit;
$('#reloadBtn').onclick=load;
$('#search').addEventListener('input',e=>{FILTER=e.target.value.trim();render()});
$('#f_note').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')save()});
load();
</script>
</body>
</html>
