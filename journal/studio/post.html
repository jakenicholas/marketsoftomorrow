<!DOCTYPE html>
<!-- build-stamp: studio-v1 · article editor (TipTap) -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>TMW Studio · Edit Post</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#070807; --panel:#131613; --panel-2:#1a1d1a;
  --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.14);
  --text:#ECEAE5; --mute:#9AA39C; --mute-2:#C2C9C3; --white:#fff;
  --green:#1FDF67; --green-soft:#42EB81;
  --gold:#e6c574; --gold-soft:#f0d68a;
  --purple:#A78BFA;
  --danger:#ff5d5d;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --serif:'Fraunces',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--ink); color:var(--text); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased}

/* ─── Top bar ─── */
.topbar{position:sticky; top:0; z-index:20; background:rgba(7,8,7,.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--hair)}
.topbar-inner{display:flex; align-items:center; gap:14px; padding:14px 22px; max-width:1400px; margin:0 auto; flex-wrap:wrap}
.back-link{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute-2); text-decoration:none; font-weight:600}
.back-link:hover{color:var(--white)}
.back-link svg{width:13px; height:13px}
.status-chip{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; padding:6px 11px; border-radius:99px}
.status-chip.draft{background:rgba(230,197,116,.10); color:var(--gold-soft); border:1px solid rgba(230,197,116,.32)}
.status-chip.published{background:rgba(31,223,103,.12); color:var(--green); border:1px solid rgba(31,223,103,.32)}
.dirty-indicator{font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; color:var(--gold-soft); opacity:0; transition:opacity .2s}
.dirty-indicator.show{opacity:1}
.btn-row{display:flex; gap:8px; flex-wrap:wrap; margin-left:auto}
.btn{font-family:var(--mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:10px 16px; border-radius:8px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--text); cursor:pointer; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center; gap:7px}
.btn:hover{border-color:rgba(255,255,255,.32); color:var(--white)}
.btn-primary{background:var(--green); color:#0a0a0a; border-color:var(--green)}
.btn-primary:hover{background:var(--green-soft); border-color:var(--green-soft)}
.btn-gold{background:var(--gold); color:#0a0a0a; border-color:var(--gold)}
.btn-danger:hover{border-color:var(--danger); color:var(--danger)}
.btn:disabled{opacity:.5; cursor:wait}
.btn svg{width:13px; height:13px}

/* ─── Layout ─── */
.layout{max-width:1400px; margin:24px auto 80px; padding:0 22px; display:grid; grid-template-columns:1fr 320px; gap:24px}
@media(max-width:980px){.layout{grid-template-columns:1fr}}

/* ─── Main editor column ─── */
.main{background:var(--panel); border:1px solid var(--hair); border-radius:14px; padding:30px}
.main input.title{background:transparent; border:0; outline:0; color:var(--white); font-family:var(--serif); font-size:38px; font-weight:600; letter-spacing:-.02em; line-height:1.1; padding:6px 0 14px; width:100%}
.main input.title::placeholder{color:var(--mute); opacity:.5}

.slug-row{display:flex; align-items:center; gap:10px; padding-bottom:18px; border-bottom:1px solid var(--hair); margin-bottom:24px; font-family:var(--mono); font-size:12px; color:var(--mute)}
.slug-row label{color:var(--mute); flex-shrink:0}
.slug-row .preview-link{flex:1; display:flex; align-items:center; gap:8px}
.slug-row .preview-link span{color:var(--mute)}
.slug-row input{flex:1; background:transparent; border:0; outline:0; color:var(--green-soft); font-family:var(--mono); font-size:12px; padding:2px 4px; border-radius:4px}
.slug-row input:focus{background:rgba(255,255,255,.04); color:var(--white)}

.excerpt{margin-bottom:20px}
.excerpt textarea{width:100%; background:rgba(255,255,255,.03); border:1px solid var(--hair-2); border-radius:8px; color:var(--cream); font-family:var(--serif); font-style:italic; font-weight:300; font-size:16px; line-height:1.5; padding:12px 14px; outline:0; resize:vertical; min-height:64px}
.excerpt textarea::placeholder{font-style:italic; color:var(--mute)}
.excerpt textarea:focus{border-color:var(--gold)}

/* ─── Toolbar ─── */
.toolbar{display:flex; flex-wrap:wrap; gap:4px; padding:8px; background:var(--panel-2); border:1px solid var(--hair); border-radius:10px 10px 0 0; margin-top:18px; position:sticky; top:64px; z-index:5}
.toolbar button{width:34px; height:34px; border-radius:6px; border:0; background:transparent; color:var(--mute-2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; padding:0; font-family:var(--serif); font-size:14px; font-weight:700}
.toolbar button:hover{background:rgba(255,255,255,.06); color:var(--white)}
.toolbar button.is-active{background:var(--green); color:var(--ink)}
.toolbar button svg{width:15px; height:15px}
.toolbar .sep{width:1px; height:20px; background:var(--hair); align-self:center; margin:0 4px}

/* ─── Editor canvas ─── */
.editor{background:var(--panel-2); border:1px solid var(--hair); border-top:0; border-radius:0 0 10px 10px; min-height:480px; padding:30px 32px; font-family:var(--sans); font-size:17px; line-height:1.7; color:var(--cream)}
.editor:focus, .editor:focus-within{outline:0}
.editor .ProseMirror{outline:none; min-height:420px}
.editor .ProseMirror p.is-editor-empty:first-child::before{content:attr(data-placeholder); float:left; color:var(--mute); pointer-events:none; height:0}
.editor p{margin:0 0 1.1em; max-width:64ch}
.editor h1,.editor h2,.editor h3{font-family:var(--serif); font-weight:600; color:var(--white); margin:1.6em 0 .5em; line-height:1.15; letter-spacing:-.01em}
.editor h2{font-size:30px} .editor h3{font-size:23px}
.editor a{color:var(--green); text-decoration:underline; text-underline-offset:3px}
.editor blockquote{font-family:var(--serif); font-style:italic; font-size:22px; color:var(--gold-soft); border-left:3px solid var(--gold); padding-left:22px; margin:1.5em 0}
.editor ul,.editor ol{padding-left:22px; margin:0 0 1.1em}
.editor li{margin:.3em 0}
.editor img{max-width:100%; height:auto; border-radius:10px; margin:1em 0; display:block}
/* Captioned-image node view: edit caption on the image (hover) + alt button */
.ed-figure{position:relative; margin:1.2em 0; display:block}
.ed-figure img{max-width:100%; height:auto; border-radius:10px; margin:0; display:block}
.ed-figure .ed-cap{position:absolute; left:0; right:0; bottom:0; width:100%; box-sizing:border-box; border:0; outline:0; padding:34px 16px 13px; font-family:var(--serif); font-style:italic; font-size:14px; color:#fff; background:linear-gradient(transparent, rgba(7,8,7,.85)); border-radius:0 0 10px 10px; opacity:0; transition:opacity .18s}
.ed-figure:hover .ed-cap, .ed-figure .ed-cap:focus{opacity:1}
.ed-figure .ed-cap::placeholder{color:rgba(255,255,255,.62); font-style:italic}
.ed-img-btn{position:absolute; top:10px; right:10px; background:rgba(7,8,7,.72); backdrop-filter:blur(6px); border:1px solid var(--hair-2); color:#fff; font-family:var(--mono); font-size:10px; letter-spacing:.06em; padding:6px 10px; border-radius:6px; cursor:pointer; opacity:0; transition:all .18s}
.ed-figure:hover .ed-img-btn{opacity:1}
.ed-figure.show-alt .ed-img-btn{opacity:1; background:var(--green); color:#0a0a0a; border-color:var(--green)}
@media (hover:none){.ed-img-btn{opacity:.9} .ed-figure .ed-cap{opacity:1}}
.ed-altrow{display:none; margin-top:8px}
.ed-figure.show-alt .ed-altrow{display:block}
.ed-altrow input{width:100%; background:rgba(255,255,255,.05); border:1px solid var(--hair-2); border-radius:6px; color:var(--white); font-family:var(--mono); font-size:11.5px; padding:8px 11px; outline:0}
.ed-altrow input:focus{border-color:var(--green)}
.editor strong{color:var(--white); font-weight:600}
.editor hr{border:0; height:1px; background:var(--hair); margin:1.8em 0}

/* ─── Sidebar ─── */
.sidebar{display:flex; flex-direction:column; gap:14px}
.card{background:var(--panel); border:1px solid var(--hair); border-radius:12px; padding:18px}
.card h4{font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute); margin-bottom:12px}
.card input, .card select{width:100%; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); border-radius:6px; color:var(--white); font-family:inherit; font-size:13.5px; padding:9px 12px; outline:0; transition:border-color .15s}
.card input:focus, .card select:focus{border-color:var(--green)}
.card textarea{width:100%; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); border-radius:6px; color:var(--white); font-family:inherit; font-size:13.5px; line-height:1.55; padding:10px 12px; outline:0; resize:vertical; min-height:104px}
.card textarea:focus{border-color:var(--green)}
.card .fieldlabel{display:block; font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--mute-2); margin-bottom:7px}
.card .seohint{font-size:11px; color:var(--mute); margin-top:8px; line-height:1.45}
.addcat button{flex:0 0 auto; background:var(--green); color:#0a0a0a; border:0; border-radius:6px; padding:0 16px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:background .15s}
.addcat button:hover{background:var(--green-soft)}
.cover-preview{aspect-ratio:16/10; background:#0a0a0a; border:1px solid var(--hair); border-radius:8px; overflow:hidden; margin-bottom:10px; display:flex; align-items:center; justify-content:center; color:var(--mute); font-family:var(--mono); font-size:11px; cursor:pointer}
.cover-preview img{width:100%; height:100%; object-fit:cover; display:block}
.cover-preview:hover{border-color:var(--green)}
.cover-row{display:flex; gap:6px; margin-top:8px}
.cover-row button{flex:1; font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; padding:7px; border-radius:6px; border:1px solid var(--hair-2); background:rgba(255,255,255,.03); color:var(--mute-2); cursor:pointer}
.cover-row button:hover{color:var(--white); border-color:var(--hair-2)}
.cover-row button.danger:hover{color:var(--danger); border-color:var(--danger)}

.chips{display:flex; flex-wrap:wrap; gap:5px; margin-top:8px}
.chip{display:inline-flex; align-items:center; gap:6px; padding:5px 10px; background:rgba(31,223,103,.10); border:1px solid rgba(31,223,103,.32); color:var(--green-soft); border-radius:99px; font-family:var(--mono); font-size:11px; letter-spacing:.04em}
.chip.main{background:rgba(230,197,116,.12); border-color:rgba(230,197,116,.5); color:var(--gold-soft); font-weight:600; box-shadow:0 0 12px rgba(230,197,116,.18)}
.chip button{background:none; border:0; color:inherit; cursor:pointer; padding:0; font-size:14px; line-height:1; opacity:.6}
.chip button:hover{opacity:1}

/* ─── Media-picker modal ─── */
.modal{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.7); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; padding:40px 20px}
.modal.show{display:flex}
.modal-inner{width:100%; max-width:1100px; max-height:90vh; background:var(--ink); border:1px solid var(--hair-2); border-radius:14px; display:flex; flex-direction:column; overflow:hidden}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--hair)}
.modal-head h3{font-family:var(--serif); font-size:20px; color:var(--white)}
.modal-head .close{background:none; border:1px solid var(--hair-2); color:var(--mute-2); width:32px; height:32px; border-radius:6px; cursor:pointer}
.modal-head .close:hover{color:var(--white); border-color:var(--hair-2)}
.modal-body{padding:18px 24px; overflow-y:auto; flex:1}
.modal .mgrid{display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:10px}
.modal .mtile{aspect-ratio:1/1; background:#0a0a0a; border:1px solid var(--hair); border-radius:8px; overflow:hidden; cursor:pointer; transition:border-color .15s, transform .15s}
.modal .mtile:hover{border-color:var(--green); transform:translateY(-2px)}
.modal .mtile img{width:100%; height:100%; object-fit:cover}
.modal .mupload{padding:14px 18px; background:var(--panel); border:1px dashed var(--hair-2); border-radius:8px; text-align:center; cursor:pointer; margin-bottom:14px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--green)}
.modal .mupload:hover{border-color:var(--green); background:var(--panel-2)}
.modal .mupload input{display:none}

#toast{position:fixed; top:80px; right:24px; z-index:100; background:rgba(7,8,7,.94); backdrop-filter:blur(14px); border:1px solid var(--hair-2); color:var(--text); padding:14px 20px; border-radius:10px; font-family:var(--mono); font-size:12px; opacity:0; transform:translateY(-10px); transition:opacity .25s, transform .25s; pointer-events:none; max-width:340px}
#toast.visible{opacity:1; transform:none}
#toast.success{border-color:var(--green); color:var(--green-soft)}
#toast.error{border-color:var(--danger); color:#ffb3b3}
</style>
  <script src="/_shared/admin-auth.js"></script>
  <script src="/_shared/media-browser.js" defer></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="/studio/" class="back-link">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 8H3M7 4L3 8l4 4"/></svg>
      Posts
    </a>
    <span class="status-chip draft" id="statusChip">Draft</span>
    <span class="dirty-indicator" id="dirtyIndicator">● unsaved</span>
    <div class="btn-row">
      <a class="btn" id="previewBtn" target="_blank" rel="noopener" href="#">Preview</a>
      <button class="btn" id="saveDraftBtn">Save draft</button>
      <button class="btn btn-primary" id="publishBtn">Publish</button>
      <button class="btn btn-danger" id="deleteBtn" style="display:none">Delete</button>
    </div>
  </div>
</div>

<div class="layout">
  <main class="main">
    <input type="text" class="title" id="titleInput" placeholder="Untitled draft">

    <div class="slug-row">
      <label>URL:</label>
      <span class="preview-link">
        <span>/post/?slug=</span><input type="text" id="slugInput" placeholder="auto-from-title">
      </span>
    </div>

    <div class="excerpt">
      <textarea id="excerptInput" rows="2" placeholder="Excerpt — 1–2 sentence summary shown in cards, search, and SEO meta."></textarea>
    </div>

    <div class="toolbar" id="toolbar">
      <button data-cmd="bold"      title="Bold (⌘B)"><strong>B</strong></button>
      <button data-cmd="italic"    title="Italic (⌘I)"><em>I</em></button>
      <button data-cmd="underline" title="Underline"><span style="text-decoration:underline">U</span></button>
      <button data-cmd="link"      title="Link (⌘K)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 9a3 3 0 004.5 0l2-2A3 3 0 1010 3l-1 1"/><path d="M9 7a3 3 0 00-4.5 0l-2 2A3 3 0 106 13l1-1"/></svg>
      </button>
      <span class="sep"></span>
      <button data-cmd="h2" title="Heading 2">H2</button>
      <button data-cmd="h3" title="Heading 3">H3</button>
      <button data-cmd="p"  title="Paragraph">P</button>
      <span class="sep"></span>
      <button data-cmd="ul"         title="Bulleted list">•</button>
      <button data-cmd="ol"         title="Numbered list">1.</button>
      <button data-cmd="blockquote" title="Quote">"</button>
      <button data-cmd="hr"         title="Divider">—</button>
      <span class="sep"></span>
      <button data-cmd="image" title="Insert image from media library">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="12" height="10" rx="1"/><circle cx="6" cy="7" r="1.2" fill="currentColor"/><path d="M2 12l4-4 3 3 2-2 3 3"/></svg>
      </button>
      <span class="sep"></span>
      <button data-cmd="undo" title="Undo (⌘Z)">↶</button>
      <button data-cmd="redo" title="Redo (⌘⇧Z)">↷</button>
    </div>
    <div class="editor" id="editor"></div>
  </main>

  <aside class="sidebar">
    <div class="card">
      <h4>Cover image</h4>
      <div class="cover-preview" id="coverPreview">No cover image</div>
      <input type="hidden" id="coverInput">
      <div class="cover-row">
        <button id="coverPickBtn">Pick from media</button>
        <button class="danger" id="coverClearBtn">Clear</button>
      </div>
    </div>

    <div class="card">
      <h4>Author</h4>
      <select id="authorSelect">
        <option value="Markets of Tomorrow">Markets of Tomorrow</option>
        <option value="Jake Nicholas">Jake Nicholas</option>
        <option value="Kait Nicholas">Kait Nicholas</option>
      </select>
    </div>

    <div class="card">
      <h4>Categories</h4>
      <select id="catSelect"><option value="">+ Add a category…</option></select>
      <div class="addcat" style="display:flex; gap:6px; margin-top:8px">
        <input type="text" id="newCatInput" placeholder="Or type a new category" style="flex:1">
        <button id="addCatBtn" type="button">Add</button>
      </div>
      <div class="chips" id="categoriesChips" style="margin-top:10px"></div>
      <label class="mainlabel" style="display:block; margin:14px 0 6px; font-size:12px; color:var(--gold-soft); letter-spacing:.04em">★ Main category <span style="color:var(--mute-2)">(shown on the site)</span></label>
      <select id="mainCatSelect"><option value="">— none —</option></select>
    </div>

    <div class="card">
      <h4>SEO</h4>
      <label class="fieldlabel">Meta description</label>
      <textarea id="seoDescInput" rows="4" placeholder="The summary Google shows under the title in search results. Defaults to the article excerpt if left blank."></textarea>
      <p class="seohint">The SEO title is set automatically from the article title.</p>
    </div>
  </aside>
</div>

<!-- Media picker modal -->
<div class="modal" id="mediaModal">
  <div class="modal-inner">
    <div class="modal-head">
      <h3 id="modalTitle">Pick an image</h3>
      <button class="close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <label class="mupload">
        <input type="file" id="modalUpload" accept="image/*">
        + Upload new
      </label>
      <div class="mgrid" id="modalGrid"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- TipTap via ESM CDN — StarterKit + Link + Image -->
<script type="module">
import { Editor } from 'https://esm.sh/@tiptap/core@2.10.3';
import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.10.3';
import Link from 'https://esm.sh/@tiptap/extension-link@2.10.3';
import Image from 'https://esm.sh/@tiptap/extension-image@2.10.3';
import Underline from 'https://esm.sh/@tiptap/extension-underline@2.10.3';
import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2.10.3';

const WORKER_URL = 'https://tmw.jake-ab7.workers.dev';
const TOKEN_KEY  = 'tmw-admin-token-v1';

const params = new URLSearchParams(location.search);
const POST_ID = params.get('id') || 'NEW';
const IS_NEW  = POST_ID === 'NEW';

let POST = null;     // server-side state
let DIRTY = false;
let CURRENT_PICKER_TARGET = null;  // 'cover' | 'inline-image'

function getToken() { return (localStorage.getItem(TOKEN_KEY) || '').trim(); }
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('success','error');
  if (kind) el.classList.add(kind);
  el.classList.add('visible');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('visible'), 2800);
}
function markDirty() { DIRTY = true; document.getElementById('dirtyIndicator').classList.add('show'); }
function markClean() { DIRTY = false; document.getElementById('dirtyIndicator').classList.remove('show'); }
function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return escHtml(s); }
function slugify(s) {
  return String(s||'').toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 200);
}

// ─── Captioned image node ───────────────────────────────────────
// Extends the Image node with caption + alt attributes, and a node view that
// lets you edit the caption on top of the image (hover + type), edit alt text
// via an "Alt" button, and serialize to <figure><img><figcaption>.
const CaptionedImage = Image.extend({
  name: 'image',
  addAttributes() {
    return {
      src: { default: null },
      alt: { default: '' },
      caption: { default: '' },
    };
  },
  parseHTML() {
    return [
      {
        tag: 'figure',
        getAttrs: (el) => {
          const img = el.querySelector('img');
          if (!img) return false;
          const cap = el.querySelector('figcaption');
          return { src: img.getAttribute('src'), alt: img.getAttribute('alt') || '', caption: cap ? cap.textContent : '' };
        },
      },
      { tag: 'img[src]', getAttrs: (el) => ({ src: el.getAttribute('src'), alt: el.getAttribute('alt') || '', caption: '' }) },
    ];
  },
  renderHTML({ HTMLAttributes }) {
    const a = HTMLAttributes || {};
    const imgAttrs = { src: a.src, alt: a.alt || '', loading: 'lazy' };
    if (a.caption && String(a.caption).trim()) {
      return ['figure', {}, ['img', imgAttrs], ['figcaption', {}, a.caption]];
    }
    return ['img', imgAttrs];
  },
  addNodeView() {
    return ({ node, getPos, editor }) => {
      const dom = document.createElement('figure');
      dom.className = 'ed-figure';
      dom.contentEditable = 'false';

      const img = document.createElement('img');
      img.src = node.attrs.src; img.alt = node.attrs.alt || '';
      dom.appendChild(img);

      const editBtn = document.createElement('button');
      editBtn.type = 'button'; editBtn.className = 'ed-img-btn'; editBtn.title = 'Edit alt text';
      editBtn.innerHTML = '✎ Alt';
      dom.appendChild(editBtn);

      const cap = document.createElement('input');
      cap.className = 'ed-cap'; cap.placeholder = 'Add a caption…'; cap.value = node.attrs.caption || '';
      dom.appendChild(cap);

      const altRow = document.createElement('div');
      altRow.className = 'ed-altrow';
      const altInput = document.createElement('input');
      altInput.placeholder = 'Alt text — describe the image (accessibility + SEO)';
      altInput.value = node.attrs.alt || '';
      altRow.appendChild(altInput);
      dom.appendChild(altRow);

      const setAttrs = (patch) => {
        if (typeof getPos !== 'function') return;
        const pos = getPos(); const cur = editor.view.state.doc.nodeAt(pos);
        if (!cur) return;
        editor.view.dispatch(editor.view.state.tr.setNodeMarkup(pos, undefined, { ...cur.attrs, ...patch }));
      };
      cap.addEventListener('input', () => setAttrs({ caption: cap.value }));
      altInput.addEventListener('input', () => { img.alt = altInput.value; setAttrs({ alt: altInput.value }); });
      editBtn.addEventListener('click', () => { dom.classList.toggle('show-alt'); if (dom.classList.contains('show-alt')) altInput.focus(); });
      [cap, altInput].forEach(el => {
        el.addEventListener('mousedown', e => e.stopPropagation());
        el.addEventListener('keydown', e => e.stopPropagation());
      });

      return {
        dom,
        update: (n) => {
          if (n.type.name !== 'image') return false;
          if (img.getAttribute('src') !== n.attrs.src) img.src = n.attrs.src;
          img.alt = n.attrs.alt || '';
          if (document.activeElement !== cap) cap.value = n.attrs.caption || '';
          if (document.activeElement !== altInput) altInput.value = n.attrs.alt || '';
          return true;
        },
        ignoreMutation: () => true,
      };
    };
  },
});

// ─── TipTap setup ───────────────────────────────────────────────
const editor = new Editor({
  element: document.getElementById('editor'),
  extensions: [
    StarterKit.configure({
      heading: { levels: [2, 3] },
      bulletList:  { keepMarks: true },
      orderedList: { keepMarks: true },
    }),
    Underline,
    Link.configure({ openOnClick: false, autolink: true, HTMLAttributes: { target: '_blank', rel: 'noopener' } }),
    CaptionedImage.configure({ HTMLAttributes: { loading: 'lazy' } }),
    Placeholder.configure({ placeholder: 'Start writing the article…' }),
  ],
  content: '',
  onUpdate: () => { markDirty(); updateToolbarState(); },
  onSelectionUpdate: () => updateToolbarState(),
});

function updateToolbarState() {
  document.querySelectorAll('#toolbar button').forEach(b => {
    const cmd = b.dataset.cmd;
    let active = false;
    if (cmd === 'bold')      active = editor.isActive('bold');
    if (cmd === 'italic')    active = editor.isActive('italic');
    if (cmd === 'underline') active = editor.isActive('underline');
    if (cmd === 'link')      active = editor.isActive('link');
    if (cmd === 'h2')        active = editor.isActive('heading', { level: 2 });
    if (cmd === 'h3')        active = editor.isActive('heading', { level: 3 });
    if (cmd === 'p')         active = editor.isActive('paragraph');
    if (cmd === 'ul')        active = editor.isActive('bulletList');
    if (cmd === 'ol')        active = editor.isActive('orderedList');
    if (cmd === 'blockquote')active = editor.isActive('blockquote');
    b.classList.toggle('is-active', active);
  });
}

// Toolbar buttons
document.getElementById('toolbar').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  e.preventDefault();
  const cmd = b.dataset.cmd;
  const c = editor.chain().focus();
  switch (cmd) {
    case 'bold':       c.toggleBold().run(); break;
    case 'italic':     c.toggleItalic().run(); break;
    case 'underline':  c.toggleUnderline().run(); break;
    case 'h2':         c.toggleHeading({ level: 2 }).run(); break;
    case 'h3':         c.toggleHeading({ level: 3 }).run(); break;
    case 'p':          c.setParagraph().run(); break;
    case 'ul':         c.toggleBulletList().run(); break;
    case 'ol':         c.toggleOrderedList().run(); break;
    case 'blockquote': c.toggleBlockquote().run(); break;
    case 'hr':         c.setHorizontalRule().run(); break;
    case 'undo':       c.undo().run(); break;
    case 'redo':       c.redo().run(); break;
    case 'link':       handleLinkButton(); break;
    case 'image':      openMediaPicker('inline-image'); break;
  }
});

function handleLinkButton() {
  const prev = editor.getAttributes('link').href;
  const url = window.prompt('Link URL (leave blank to remove)', prev || '');
  if (url === null) return;
  if (url === '') editor.chain().focus().extendMarkRange('link').unsetLink().run();
  else editor.chain().focus().extendMarkRange('link').setLink({ href: url }).run();
}

// Cmd+K → link
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); handleLinkButton(); }
});

// ─── Field wiring ───────────────────────────────────────────────
const titleEl   = document.getElementById('titleInput');
const slugEl    = document.getElementById('slugInput');
const excerptEl = document.getElementById('excerptInput');
const coverEl   = document.getElementById('coverInput');
const coverPreview = document.getElementById('coverPreview');
const authorEl  = document.getElementById('authorSelect');
const catChips  = document.getElementById('categoriesChips');
const catSelect = document.getElementById('catSelect');
const mainCatSelect = document.getElementById('mainCatSelect');
const newCatInput = document.getElementById('newCatInput');
const seoDescEl = document.getElementById('seoDescInput');

let slugManuallyEdited = false;
titleEl.addEventListener('input', () => {
  markDirty();
  if (!slugManuallyEdited && (IS_NEW || (POST && POST.body_source === 'studio' && POST.status === 'draft'))) {
    slugEl.value = slugify(titleEl.value);
  }
});
slugEl.addEventListener('input', () => { slugManuallyEdited = true; markDirty(); });
[excerptEl, coverEl, seoDescEl].forEach(el => el.addEventListener('input', markDirty));
authorEl.addEventListener('change', markDirty);

coverEl.addEventListener('input', () => updateCoverPreview());
function updateCoverPreview() {
  const url = coverEl.value.trim();
  coverPreview.innerHTML = url ? `<img src="${escAttr(url)}" alt="">` : 'No cover image';
}

document.getElementById('coverPickBtn').addEventListener('click', () => openMediaPicker('cover'));
coverPreview.addEventListener('click', () => openMediaPicker('cover'));
document.getElementById('coverClearBtn').addEventListener('click', () => { coverEl.value = ''; updateCoverPreview(); markDirty(); });

let catsList = [];
let mainCat = '';
let ALL_CATEGORIES = [];

async function loadCategoryOptions() {
  try {
    const r = await fetch(WORKER_URL + '/post-categories', { cache: 'no-store' });
    if (r.ok) { const d = await r.json(); ALL_CATEGORIES = d.categories || []; }
  } catch (e) {}
  populateCatSelect();
}
function populateCatSelect() {
  const opts = ['<option value="">+ Add a category…</option>']
    .concat(ALL_CATEGORIES.filter(c => !catsList.includes(c)).map(c => `<option value="${escAttr(c)}">${escHtml(c)}</option>`));
  catSelect.innerHTML = opts.join('');
}
function defaultMain() { return catsList.find(c => !/of tomorrow$/i.test(c)) || catsList[0] || ''; }
function addCat(v) {
  v = (v || '').trim();
  if (!v) return;
  if (!catsList.includes(v)) { catsList.push(v); if (!ALL_CATEGORIES.includes(v)) ALL_CATEGORIES.push(v); }
  if (!mainCat) mainCat = defaultMain();
  renderCatChips(); populateCatSelect(); renderMainCatOptions(); markDirty();
}
catSelect.addEventListener('change', () => { if (catSelect.value) addCat(catSelect.value); catSelect.value = ''; });
document.getElementById('addCatBtn').addEventListener('click', () => { addCat(newCatInput.value); newCatInput.value = ''; });
newCatInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addCat(newCatInput.value); newCatInput.value = ''; } });
mainCatSelect.addEventListener('change', () => { mainCat = mainCatSelect.value; renderCatChips(); markDirty(); });

function renderCatChips() {
  catChips.innerHTML = catsList.map(c => `<span class="chip${c === mainCat ? ' main' : ''}">${c === mainCat ? '★ ' : ''}${escHtml(c)}<button data-remove="${escAttr(c)}">×</button></span>`).join('');
  catChips.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    catsList = catsList.filter(x => x !== b.dataset.remove);
    if (mainCat === b.dataset.remove) mainCat = defaultMain();
    renderCatChips(); populateCatSelect(); renderMainCatOptions(); markDirty();
  }));
}
function renderMainCatOptions() {
  mainCatSelect.innerHTML = ['<option value="">— none —</option>']
    .concat(catsList.map(c => `<option value="${escAttr(c)}"${c === mainCat ? ' selected' : ''}>${escHtml(c)}</option>`)).join('');
}
loadCategoryOptions();

// ─── Media picker ───────────────────────────────────────────────
const modal = document.getElementById('mediaModal');
const modalGrid = document.getElementById('modalGrid');
const modalUpload = document.getElementById('modalUpload');
document.getElementById('modalClose').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

function openMediaPicker(target) {
  CURRENT_PICKER_TARGET = target;
  // Folder-navigable, searchable shared media browser.
  window.TMWMediaBrowser.open({ onPick: (url, alt) => pickMedia(url, alt) });
}
function closeModal() { if (modal) modal.classList.remove('show'); CURRENT_PICKER_TARGET = null; }

function pickMedia(url, alt) {
  if (CURRENT_PICKER_TARGET === 'cover') {
    coverEl.value = url; updateCoverPreview(); markDirty();
  } else if (CURRENT_PICKER_TARGET === 'inline-image') {
    editor.chain().focus().setImage({ src: url, alt: alt || '' }).run();
  }
  closeModal();
}

modalUpload.addEventListener('change', async e => {
  if (!e.target.files || !e.target.files[0]) return;
  const file = e.target.files[0];
  const form = new FormData(); form.append('file', file);
  try {
    const res = await fetch(WORKER_URL + '/admin/upload', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: form,
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    pickMedia(data.url, data.filename || '');
  } catch (err) { toast('Upload failed: ' + err.message, 'error'); }
});

// ─── Load post (if not new) ─────────────────────────────────────
async function loadPost() {
  if (IS_NEW) {
    POST = { id: 'NEW', status: 'draft' };
    titleEl.focus();
    document.getElementById('previewBtn').style.display = 'none';
    return;
  }
  try {
    // Fetch all posts and find by id (worker has by-slug, not by-id yet —
    // most slugs are stable so look up the id by listing then matching)
    const res = await fetch(WORKER_URL + '/posts?limit=500&status=published', {
      headers: { 'Authorization': 'Bearer ' + getToken() }, cache: 'no-store',
    });
    const r2 = await fetch(WORKER_URL + '/posts?limit=500&status=draft', {
      headers: { 'Authorization': 'Bearer ' + getToken() }, cache: 'no-store',
    });
    let stub = null;
    if (res.ok) { const d = await res.json(); stub = (d.items || []).find(p => p.id === POST_ID); }
    if (!stub && r2.ok) { const d = await r2.json(); stub = (d.items || []).find(p => p.id === POST_ID); }
    if (!stub) throw new Error('Post not found in current pages');
    // Now load full post by slug to get body_html
    const fullRes = await fetch(WORKER_URL + '/posts/by-slug/' + encodeURIComponent(stub.slug), { cache: 'no-store' });
    if (!fullRes.ok) throw new Error('Full post fetch HTTP ' + fullRes.status);
    const fullData = await fullRes.json();
    POST = fullData.post;

    titleEl.value     = POST.title || '';
    slugEl.value      = POST.slug || '';
    slugManuallyEdited = true;
    excerptEl.value   = POST.excerpt || '';
    coverEl.value     = POST.cover_image || '';
    authorEl.value    = POST.author_name || '';
    seoDescEl.value   = POST.seo_description || '';
    catsList = POST.categories || [];
    mainCat  = POST.main_category || defaultMain();
    renderCatChips();
    renderMainCatOptions();
    populateCatSelect();
    updateCoverPreview();
    editor.commands.setContent(POST.body_html || '');
    document.getElementById('statusChip').className = 'status-chip ' + (POST.status || 'draft');
    document.getElementById('statusChip').textContent = POST.status || 'draft';
    document.getElementById('deleteBtn').style.display = '';
    document.getElementById('previewBtn').href = '/post/?slug=' + encodeURIComponent(POST.slug);
    markClean();
  } catch (e) {
    toast('Load failed: ' + e.message, 'error');
  }
}

// ─── Save / publish / delete ────────────────────────────────────
function buildPayload() {
  return {
    title:           titleEl.value.trim(),
    slug:            slugEl.value.trim(),
    excerpt:         excerptEl.value.trim(),
    body_html:       editor.getHTML(),
    cover_image:     coverEl.value.trim(),
    cover_image_alt: '',
    author_name:     authorEl.value.trim() || 'Markets of Tomorrow',
    categories:      catsList,
    main_category:   mainCat || null,
    seo_title:       null,
    seo_description: seoDescEl.value.trim() || null,
  };
}

async function saveDraft() { return save('draft'); }
async function publish()   { return save('published'); }

async function save(status) {
  const payload = buildPayload();
  if (!payload.title) { toast('Add a title first', 'error'); return; }
  payload.status = status;
  const btn = status === 'published' ? document.getElementById('publishBtn') : document.getElementById('saveDraftBtn');
  const origLabel = btn.textContent;
  btn.disabled = true; btn.textContent = status === 'published' ? 'Publishing...' : 'Saving...';
  try {
    const isCreate = !POST || POST.id === 'NEW';
    const url = isCreate ? WORKER_URL + '/posts' : WORKER_URL + '/posts/' + encodeURIComponent(POST.id);
    const res = await fetch(url, {
      method: isCreate ? 'POST' : 'PATCH',
      headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) { const text = await res.text(); throw new Error('HTTP ' + res.status + ': ' + text.slice(0, 200)); }
    const data = await res.json();
    POST = data.post;
    document.getElementById('statusChip').className = 'status-chip ' + POST.status;
    document.getElementById('statusChip').textContent = POST.status;
    document.getElementById('deleteBtn').style.display = '';
    document.getElementById('previewBtn').href = '/post/?slug=' + encodeURIComponent(POST.slug);
    document.getElementById('previewBtn').style.display = '';
    markClean();
    toast(status === 'published' ? 'Published!' : 'Saved', 'success');
    if (isCreate) {
      // Switch URL so refresh doesn't create a duplicate
      history.replaceState(null, '', '/studio/post.html?id=' + encodeURIComponent(POST.id));
    }
  } catch (e) {
    toast('Save failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = origLabel;
  }
}

async function delPost() {
  if (!POST || POST.id === 'NEW') return;
  if (!confirm(`Delete "${POST.title}"? This cannot be undone.`)) return;
  try {
    const res = await fetch(WORKER_URL + '/posts/' + encodeURIComponent(POST.id), {
      method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('Deleted', 'success');
    setTimeout(() => location.href = '/studio/', 600);
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}

document.getElementById('saveDraftBtn').addEventListener('click', saveDraft);
document.getElementById('publishBtn').addEventListener('click', publish);
document.getElementById('deleteBtn').addEventListener('click', delPost);

// Keyboard: Cmd+S → save draft
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveDraft(); }
});

// Warn on dirty navigation
window.addEventListener('beforeunload', e => {
  if (DIRTY) { e.preventDefault(); e.returnValue = ''; }
});

// Auth gate — GitHub login (session token works as the bearer)
if (!getToken()) {
  const loginUrl = (window.TMWAuth && window.TMWAuth.loginUrl && window.TMWAuth.loginUrl()) || '/studio/';
  document.querySelector('.layout').innerHTML = `<div class="card" style="max-width:600px;margin:80px auto"><h4 style="color:var(--gold-soft)">Sign in to TMW Studio</h4><p style="color:var(--mute-2);margin:14px 0">Log in with GitHub to write and publish.</p><a class="btn primary" href="${loginUrl}" style="display:inline-block">Log in with GitHub</a></div>`;
} else {
  loadPost();
}
</script>
