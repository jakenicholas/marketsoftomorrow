<!DOCTYPE html>
<!-- build-stamp: studio-v2 · iconic-list sheet editor -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMW Studio · Lists</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#070807; --panel:#131613; --panel-2:#1a1d1a;
  --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.16);
  --text:#ECEAE5; --mute:#9AA39C; --mute-2:#C2C9C3; --white:#fff;
  --green:#1FDF67; --green-soft:#42EB81; --gold:#e6c574; --gold-soft:#f0d68a;
  --purple:#A78BFA; --purple-soft:#C4B5FD; --danger:#ff5d5d;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --serif:'Fraunces',Georgia,serif; --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--ink); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased}
.topbar{position:sticky; top:0; z-index:30; background:rgba(7,8,7,.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--hair)}
.topbar-inner{display:flex; align-items:center; gap:16px; padding:14px 20px; flex-wrap:wrap}
.brand{display:flex; flex-direction:column; gap:2px}
.brand-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--green)}
.brand-title{font-family:var(--serif); font-weight:600; font-size:20px; color:var(--white)}
.tablinks{display:flex; gap:4px; padding:5px; background:rgba(255,255,255,.04); border:1px solid var(--hair); border-radius:99px; flex-wrap:wrap}
.tablinks a{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; padding:9px 16px; border-radius:99px; color:var(--mute-2); text-decoration:none; font-weight:600}
.tablinks a:hover{color:var(--white)} .tablinks a.on{background:var(--white); color:var(--ink)}

.bar{display:flex; align-items:center; gap:10px; padding:12px 20px; border-bottom:1px solid var(--hair); flex-wrap:wrap; background:var(--panel)}
.listtabs{display:flex; gap:6px}
.lt{font-family:var(--mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; padding:9px 16px; border-radius:8px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--mute-2); cursor:pointer}
.lt.on{background:var(--green); color:#0a0a0a; border-color:var(--green)}
.bar .grow{flex:1; min-width:120px}
.token{width:100%; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); color:var(--white); font-family:var(--mono); font-size:12px; padding:9px 12px; border-radius:8px; outline:0}
.token:focus{border-color:var(--green)}
.btn{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; padding:9px 14px; border-radius:8px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--text); cursor:pointer; white-space:nowrap}
.btn:hover{border-color:rgba(255,255,255,.32); color:var(--white)}
.btn-primary{background:var(--green); color:#0a0a0a; border-color:var(--green)}
.btn-primary:hover{background:var(--green-soft)}
.btn-ghost{background:transparent}
.btn:disabled{opacity:.45; cursor:not-allowed}
.status{font-family:var(--mono); font-size:11px; color:var(--mute)}
.status.ok{color:var(--green-soft)} .status.err{color:var(--danger)} .status.warn{color:var(--gold-soft)}

/* details (meta) */
.meta{padding:14px 20px; border-bottom:1px solid var(--hair); display:none; grid-template-columns:repeat(2,1fr); gap:0 16px}
.meta.show{display:grid}
.fl{display:flex; flex-direction:column; gap:5px; margin-bottom:12px}
.fl.full{grid-column:1/-1}
.fl label{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute-2)}
.fl input, .fl textarea{background:rgba(255,255,255,.04); border:1px solid var(--hair-2); color:var(--white); font-family:var(--sans); font-size:13px; padding:8px 11px; border-radius:7px; outline:0; width:100%; resize:vertical}
.fl input:focus, .fl textarea:focus{border-color:var(--green)}
.meta-toggle{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--mute-2); cursor:pointer; padding:8px 20px; border-bottom:1px solid var(--hair); background:var(--panel-2)}
.meta-toggle:hover{color:var(--white)}

/* sheet */
.sheet-wrap{overflow:auto; max-height:calc(100vh - 230px)}
table.sheet{border-collapse:separate; border-spacing:0; width:max-content; min-width:100%; font-size:12.5px}
.sheet thead th{position:sticky; top:0; z-index:5; background:#0f120f; border-bottom:1px solid var(--hair-2); border-right:1px solid var(--hair); font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--mute-2); font-weight:600; text-align:left; padding:10px 8px; white-space:nowrap}
.sheet td{border-bottom:1px solid var(--hair); border-right:1px solid var(--hair); padding:0; vertical-align:top; background:var(--ink)}
.sheet tr:nth-child(even) td{background:rgba(255,255,255,.014)}
.sheet tr:hover td{background:rgba(31,223,103,.04)}
.sheet td.rank{text-align:center; font-family:var(--serif); font-size:18px; font-weight:600; color:var(--green-soft); width:42px; padding:6px 4px}
.sheet td input, .sheet td textarea{width:100%; background:transparent; border:0; color:var(--text); font-family:var(--sans); font-size:12.5px; padding:8px 9px; outline:0; resize:none}
.sheet td textarea{min-height:54px; line-height:1.45; font-size:12px}
.sheet td input:focus, .sheet td textarea:focus{background:rgba(31,223,103,.08); box-shadow:inset 0 0 0 1px var(--green)}
.sheet td.col-name input{font-weight:600; color:var(--white)}
.col-img{width:230px}
.imgcell{display:flex; gap:7px; align-items:flex-start; padding:6px 8px}
.imgcell img{width:46px; height:34px; object-fit:cover; border-radius:5px; border:1px solid var(--hair-2); background:#0a0a0a; flex-shrink:0; cursor:pointer}
.imgcell .imgr{flex:1; display:flex; flex-direction:column; gap:4px}
.imgcell input{background:rgba(255,255,255,.04)!important; border:1px solid var(--hair-2)!important; border-radius:5px; font-family:var(--mono); font-size:10.5px!important; padding:5px 7px!important}
.imgcell .browse{font-family:var(--mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--green-soft); cursor:pointer; text-align:left; background:none; border:0; padding:0}
.rowtools{display:flex; gap:3px; padding:6px 6px; white-space:nowrap}
.rtbtn{width:24px; height:24px; display:grid; place-items:center; border-radius:5px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--mute-2); cursor:pointer; font-size:12px; line-height:1}
.rtbtn:hover{color:var(--white); border-color:rgba(255,255,255,.3)}
.rtbtn.del:hover{color:var(--danger); border-color:var(--danger)}
.col-region input{min-width:90px}
.addrow{padding:12px 20px}
.addbtn{padding:10px 18px; border:1px dashed var(--hair-2); border-radius:9px; background:transparent; color:var(--mute-2); font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; cursor:pointer}
.addbtn:hover{border-color:var(--green); color:var(--green-soft)}
.empty{padding:60px 20px; text-align:center; color:var(--mute); font-family:var(--mono); font-size:13px}

.savebar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:rgba(7,8,7,.96); backdrop-filter:blur(20px); border-top:1px solid var(--hair); transform:translateY(120%); transition:transform .25s}
.savebar.show{transform:none}
.savebar-inner{padding:12px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px}
.savebar .msg{font-family:var(--mono); font-size:12px; color:var(--gold-soft)}

.modal{position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.72); display:none; align-items:center; justify-content:center; padding:20px}
.modal.show{display:flex}
.modal-box{background:var(--panel); border:1px solid var(--hair-2); border-radius:16px; width:min(960px,96vw); max-height:86vh; display:flex; flex-direction:column; overflow:hidden}
.modal-head{padding:14px 18px; border-bottom:1px solid var(--hair); display:flex; gap:12px; align-items:center}
.modal-head input{flex:1; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); color:var(--white); font-family:var(--mono); font-size:12.5px; padding:9px 12px; border-radius:8px; outline:0}
.modal-grid{padding:14px 18px; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:9px}
.mtile{border:1px solid var(--hair); border-radius:8px; overflow:hidden; cursor:pointer; background:#0a0a0a; aspect-ratio:4/3}
.mtile img{width:100%; height:100%; object-fit:cover; display:block} .mtile:hover{border-color:var(--green)}
</style>
  <script src="/_shared/admin-auth.js"></script>
  <script src="/_shared/media-browser.js" defer></script>
</head>
<body>

<div class="topbar"><div class="topbar-inner">
  <div class="brand"><div class="brand-eyebrow">TMW Studio</div><div class="brand-title">Iconic Lists</div></div>
  <div class="tablinks">
    <a href="/studio/">Posts</a>
    <a href="/studio/media.html">Media</a>
    <a href="/studio/migrate-wix.html">Wix library</a>
    <a href="/studio/lists.html" class="on">Lists</a>
    <a href="/studio/sync.html">Wix sync</a>
      <a href="/studio/analytics.html">Analytics</a>
  </div>
</div></div>

<div class="bar">
  <div class="listtabs" id="listTabs"></div>
  <div class="grow"></div>
  <button class="btn btn-ghost" id="reloadBtn">Reload</button>
  <button class="btn btn-ghost" id="importBtn" title="Pull items embedded in the public page">Import seed</button>
  <button class="btn btn-ghost" id="addTopBtn">+ Row</button>
  <button class="btn btn-primary" id="saveTopBtn">Save</button>
  <span class="status" id="status">—</span>
</div>

<div class="meta-toggle" id="metaToggle">▸ List details (title · subtitle · about · regions)</div>
<div class="meta" id="meta"></div>

<div class="sheet-wrap"><div id="sheet"><div class="empty">Pick a list above to start editing.</div></div></div>
<div class="addrow"><button class="addbtn" id="addBtn">+ Add row</button></div>

<div class="savebar" id="savebar"><div class="savebar-inner">
  <span class="msg" id="saveMsg">Unsaved changes</span>
  <div style="display:flex; gap:10px">
    <button class="btn btn-ghost" id="discardBtn">Discard</button>
    <button class="btn btn-primary" id="saveBtn">Save to live site</button>
  </div>
</div></div>

<div class="modal" id="mediaModal"><div class="modal-box">
  <div class="modal-head"><input id="mediaSearch" placeholder="Search media library…"><button class="btn btn-ghost" id="mediaClose">Close</button></div>
  <div class="modal-grid" id="mediaGrid"></div>
</div></div>

<datalist id="regionOpts"></datalist>

<script>
const WORKER_URL='https://tmw.jake-ab7.workers.dev';
const TOKEN_KEY='tmw-admin-token-v1';
// Column config per list kind. type: rank|text|img|textarea|region|tools.
// label '@meta1'/'@meta2' is substituted with the list's meta labels at render.
const ICONIC_COLS=[
  {l:'#',f:'rank',t:'rank'},{l:'Name',f:'name',t:'text'},{l:'Location',f:'location',t:'text'},{l:'Region',f:'region',t:'region'},
  {l:'@meta1',f:'architect',t:'text'},{l:'@meta2',f:'year',t:'text'},{l:'Image',f:'image',t:'img'},{l:'Description',f:'description',t:'textarea'},
  {l:'Recommendations',f:'recommendations',t:'textarea'},
  {l:'CTA Label',f:'ctaLabel',t:'text'},{l:'CTA URL',f:'ctaUrl',t:'text'},{l:'Official URL',f:'officialUrl',t:'text'},{l:'',f:'tools',t:'tools'}
];
const ICONIC_FIELDS=['name','location','region','architect','year','image','credit','description','recommendations','officialUrl','ctaLabel','ctaUrl'];
const PARTNER_COLS=[
  {l:'#',f:'rank',t:'rank'},{l:'Name',f:'name',t:'text'},{l:'Logo (SVG)',f:'logo',t:'img'},{l:'Image',f:'image',t:'img'},
  {l:'Category',f:'category',t:'text'},{l:'CTA Label',f:'ctaLabel',t:'text'},{l:'CTA URL',f:'ctaUrl',t:'text'},{l:'Offer',f:'offer',t:'text'},{l:'',f:'tools',t:'tools'}
];
const PARTNER_FIELDS=['name','logo','image','category','ctaLabel','ctaUrl','offer'];
const LISTS=[
  {slug:'golf',label:'Golf',meta1:'Level',meta2:'Availability',noun:'course',kind:'iconic',cols:ICONIC_COLS,fields:ICONIC_FIELDS},
  {slug:'restaurants',label:'Restaurants',meta1:'Cuisine',meta2:'Price',noun:'restaurant',kind:'iconic',cols:ICONIC_COLS,fields:ICONIC_FIELDS},
  {slug:'hotels',label:'Hotels',meta1:'City',meta2:'Price',noun:'hotel',kind:'iconic',cols:ICONIC_COLS,fields:ICONIC_FIELDS},
  {slug:'partners',label:'Partners',noun:'partner',kind:'partners',cols:PARTNER_COLS,fields:PARTNER_FIELDS},
];
let CUR=null, DOC=null, DIRTY=false, pickIdx=-1, pickField='image';
const $=s=>document.querySelector(s);
// Auth now comes from the GitHub login session (admin-auth.js stores it under
// TOKEN_KEY). No manual token field.
function getToken(){return ((window.TMWAuth&&window.TMWAuth.token&&window.TMWAuth.token())||localStorage.getItem(TOKEN_KEY)||'').trim();}
function loginUrl(){return (window.TMWAuth&&window.TMWAuth.loginUrl&&window.TMWAuth.loginUrl())||'/studio/';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function status(m,c){const e=$('#status');e.textContent=m;e.className='status '+(c||'')}
function setDirty(d){DIRTY=d;$('#savebar').classList.toggle('show',d)}

const tabsEl=$('#listTabs');
LISTS.forEach(l=>{const b=document.createElement('button');b.className='lt';b.textContent=l.label;b.dataset.slug=l.slug;b.onclick=()=>selectList(l.slug);tabsEl.appendChild(b)});

async function selectList(slug){
  if(DIRTY && !confirm('Discard unsaved changes?'))return;
  CUR=LISTS.find(l=>l.slug===slug);
  document.querySelectorAll('.lt').forEach(b=>b.classList.toggle('on',b.dataset.slug===slug));
  setDirty(false); await loadList();
}
async function loadList(){
  status('Loading…');
  try{
    const r=await fetch(`${WORKER_URL}/list/${CUR.slug}`,{cache:'no-store'});
    const w=await r.json();
    if(w.exists && w.data){DOC=normalize(w.data);status(`Loaded ${DOC.items.length} items`+(w.updatedAt?' · saved '+new Date(w.updatedAt*1000).toLocaleString():''),'ok');}
    else{DOC=normalize({slug:CUR.slug,items:[]});status('No saved data on server — Import seed or add rows.','warn');}
  }catch(e){DOC=normalize({slug:CUR.slug,items:[]});status('Load failed: '+(e.message||e),'err');}
  renderAll();
}
function normalize(d){
  d=d||{}; d.slug=d.slug||CUR.slug; d.title=d.title||''; d.subtitle=d.subtitle||''; d.about=d.about||{};
  d.regions=Array.isArray(d.regions)?d.regions:[];
  const fields=(CUR&&CUR.fields)||ICONIC_FIELDS;
  d.items=Array.isArray(d.items)?d.items.map(it=>{
    const o={id:it.id||('item-'+Math.random().toString(36).slice(2,8))};
    fields.forEach(f=>{ o[f]=it[f]||''; });
    return o;
  }):[];
  return d;
}
async function importSeed(){
  if(CUR.kind==='partners'){
    status('Fetching partners.json…');
    try{
      const r=await fetch('/partners.json',{cache:'no-store'}); const j=await r.json();
      DOC=normalize({slug:'partners', title:(j.header&&j.header.title)||'Our Partners of Tomorrow', subtitle:(j.header&&j.header.sub)||'', items:j.partners||[]});
      setDirty(true); status('Imported '+DOC.items.length+' partners — review and Save.','ok'); renderAll();
    }catch(e){status('Import failed: '+(e.message||e),'err')}
    return;
  }
  status('Fetching page seed…');
  try{
    const r=await fetch(`/${CUR.slug}/`,{cache:'no-store'}); const html=await r.text();
    const m=html.match(/id="seed-data"[^>]*>([\s\S]*?)<\/script>/); if(!m)throw new Error('no seed in page');
    DOC=normalize(JSON.parse(m[1])); setDirty(true); status('Imported '+DOC.items.length+' items — review and Save.','ok'); renderAll();
  }catch(e){status('Import failed: '+(e.message||e),'err')}
}

function refreshRegions(){$('#regionOpts').innerHTML=(DOC&&DOC.regions||[]).map(r=>`<option value="${esc(r)}">`).join('')}

function renderAll(){
  if(!DOC){$('#sheet').innerHTML='<div class="empty">Pick a list.</div>';$('#meta').innerHTML='';return}
  refreshRegions();
  // meta
  $('#meta').innerHTML=`
    <div class="fl full"><label>Title</label><input id="m_title" value="${esc(DOC.title)}"></div>
    <div class="fl full"><label>Subtitle</label><textarea id="m_subtitle" rows="2">${esc(DOC.subtitle)}</textarea></div>`
    + (CUR.kind==='partners' ? '' : `
    <div class="fl"><label>About — paragraph 1</label><textarea id="m_p1" rows="2">${esc(DOC.about.p1||'')}</textarea></div>
    <div class="fl"><label>About — pull quote</label><textarea id="m_pull" rows="2">${esc(DOC.about.pull||'')}</textarea></div>
    <div class="fl"><label>About — paragraph 2</label><textarea id="m_p2" rows="2">${esc(DOC.about.p2||'')}</textarea></div>
    <div class="fl"><label>About — paragraph 3</label><textarea id="m_p3" rows="2">${esc(DOC.about.p3||'')}</textarea></div>
    <div class="fl full"><label>Regions (comma-separated — filter pills)</label><input id="m_regions" value="${esc(DOC.regions.join(', '))}"></div>`);
  bindMeta('#m_title',v=>DOC.title=v); bindMeta('#m_subtitle',v=>DOC.subtitle=v);
  bindMeta('#m_p1',v=>DOC.about.p1=v); bindMeta('#m_pull',v=>DOC.about.pull=v);
  bindMeta('#m_p2',v=>DOC.about.p2=v); bindMeta('#m_p3',v=>DOC.about.p3=v);
  bindMeta('#m_regions',v=>{DOC.regions=v.split(',').map(s=>s.trim()).filter(Boolean);refreshRegions()});
  renderSheet();
}
function bindMeta(sel,fn){const el=$(sel);if(!el)return;el.addEventListener('input',()=>{fn(el.value);setDirty(true)})}

function cellHtml(c,it,i){
  const f=c.f;
  if(c.t==='rank') return `<td class="rank">${i+1}</td>`;
  if(c.t==='tools') return `<td><div class="rowtools">
      <button class="rtbtn" data-up="${i}" title="Move up">↑</button>
      <button class="rtbtn" data-down="${i}" title="Move down">↓</button>
      <button class="rtbtn del" data-del="${i}" title="Delete">✕</button></div></td>`;
  if(c.t==='region') return `<td class="col-region"><input data-i="${i}" data-f="region" list="regionOpts" value="${esc(it.region)}"></td>`;
  if(c.t==='textarea') return `<td class="col-desc"><textarea data-i="${i}" data-f="${f}">${esc(it[f])}</textarea></td>`;
  if(c.t==='img') return `<td class="col-img"><div class="imgcell">
      <img src="${esc(it[f])}" alt="" onerror="this.style.opacity=.15" data-thumb="${i}" data-thumb-f="${f}" style="cursor:pointer" title="Click to choose an image">
      <div class="imgr"><button class="browse" data-browse="${i}" data-browse-f="${f}">⊞ ${it[f]?'Change image':'Choose image'}</button></div></div></td>`;
  return `<td class="col-${f}"><input data-i="${i}" data-f="${f}" value="${esc(it[f])}"></td>`;
}
function renderSheet(){
  const cols=CUR.cols.map(c=>({...c, lbl: c.l==='@meta1'?CUR.meta1 : c.l==='@meta2'?CUR.meta2 : c.l}));
  if(!DOC.items.length){$('#sheet').innerHTML='<div class="empty">No rows yet — click “+ Add row”'+(CUR.kind==='partners'?'.':' or “Import seed”.')+'</div>';return}
  const thead='<thead><tr>'+cols.map(c=>`<th>${esc(c.lbl)}</th>`).join('')+'</tr></thead>';
  const rows=DOC.items.map((it,i)=>'<tr>'+cols.map(c=>cellHtml(c,it,i)).join('')+'</tr>').join('');
  $('#sheet').innerHTML=`<table class="sheet">${thead}<tbody>${rows}</tbody></table>`;
  // bind cell inputs
  $('#sheet').querySelectorAll('[data-f]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const it=DOC.items[+inp.dataset.i]; it[inp.dataset.f]=inp.value;
      if(inp.dataset.thumbsync){const t=$('#sheet').querySelector(`img[data-thumb="${inp.dataset.i}"][data-thumb-f="${inp.dataset.f}"]`);if(t){t.src=inp.value;t.style.opacity=1}}
      setDirty(true);
    });
  });
  $('#sheet').querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>move(+b.dataset.up,-1));
  $('#sheet').querySelectorAll('[data-down]').forEach(b=>b.onclick=()=>move(+b.dataset.down,1));
  $('#sheet').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const i=+b.dataset.del;if(confirm('Delete “'+(DOC.items[i].name||'this row')+'”?')){DOC.items.splice(i,1);setDirty(true);renderSheet()}});
  $('#sheet').querySelectorAll('[data-browse]').forEach(b=>b.onclick=()=>openMedia(+b.dataset.browse, b.dataset.browseF));
  $('#sheet').querySelectorAll('img[data-thumb]').forEach(t=>t.onclick=()=>openMedia(+t.dataset.thumb, t.dataset.thumbF));
}
function move(i,d){const j=i+d;if(j<0||j>=DOC.items.length)return;const t=DOC.items[i];DOC.items[i]=DOC.items[j];DOC.items[j]=t;setDirty(true);renderSheet()}
function addRow(){
  const seed={name:'New '+CUR.noun};
  if(CUR.kind==='partners'){seed.ctaLabel='Learn More';seed.category='PARTNER OF TOMORROW';}
  else{seed.ctaLabel='Book Now';}
  DOC.items.push(normalize({items:[seed]}).items[0]);setDirty(true);renderSheet();
  const w=$('.sheet-wrap');if(w)w.scrollTop=w.scrollHeight}

// media picker — folder-navigable shared browser
function openMedia(i,f){
  pickIdx=i; pickField=f||'image';
  window.TMWMediaBrowser.open({ onPick:(url)=>{ if(pickIdx>-1&&DOC.items[pickIdx]){ DOC.items[pickIdx][pickField]=url; setDirty(true); renderSheet(); } } });
}
async function openMediaLegacy(i,f){pickIdx=i;pickField=f||'image';$('#mediaModal').classList.add('show');$('#mediaSearch').value='';$('#mediaSearch').focus();loadMedia('')}
let mt=null;
$('#mediaSearch').addEventListener('input',e=>{clearTimeout(mt);mt=setTimeout(()=>loadMedia(e.target.value.trim()),250)});
$('#mediaClose').onclick=()=>$('#mediaModal').classList.remove('show');
$('#mediaModal').addEventListener('click',e=>{if(e.target.id==='mediaModal')$('#mediaModal').classList.remove('show')});
async function loadMedia(q){
  const g=$('#mediaGrid');g.innerHTML='<div style="grid-column:1/-1;color:var(--mute);font-family:var(--mono);font-size:12px">Loading…</div>';
  const tok=getToken(); if(!tok){g.innerHTML=`<div style="grid-column:1/-1;color:var(--danger);font-family:var(--mono);font-size:12px">Log in with GitHub first — <a href="${loginUrl()}" style="color:var(--green)">sign in</a>.</div>`;return}
  try{
    const p=new URLSearchParams({limit:'48'});if(q)p.set('q',q);
    const r=await fetch(`${WORKER_URL}/admin/media?`+p,{headers:{'Authorization':'Bearer '+tok}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json(); const imgs=(d.items||[]).filter(m=>!m.mime_type||m.mime_type.startsWith('image/'));
    if(!imgs.length){g.innerHTML='<div style="grid-column:1/-1;color:var(--mute);font-family:var(--mono);font-size:12px">No media found.</div>';return}
    g.innerHTML='';
    imgs.forEach(m=>{const t=document.createElement('div');t.className='mtile';t.title=m.filename||'';
      t.innerHTML=`<img src="${esc(m.url)}" alt="" loading="lazy">`;
      t.onclick=()=>{if(pickIdx>-1&&DOC.items[pickIdx]){DOC.items[pickIdx][pickField]=m.url;setDirty(true);renderSheet()}$('#mediaModal').classList.remove('show')};
      g.appendChild(t)});
  }catch(e){g.innerHTML='<div style="grid-column:1/-1;color:var(--danger);font-family:var(--mono);font-size:12px">'+esc(e.message||e)+'</div>'}
}

async function save(){
  const tok=getToken(); if(!tok){status('Log in with GitHub to save.','err');return}
  const body={slug:DOC.slug,title:DOC.title,subtitle:DOC.subtitle,about:DOC.about,regions:DOC.regions,items:DOC.items,__updatedBy:'studio'};
  $('#saveBtn').disabled=true;$('#saveTopBtn').disabled=true;$('#saveMsg').textContent='Saving…';
  try{
    const r=await fetch(`${WORKER_URL}/list/${DOC.slug}`,{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json().catch(()=>({})); if(!r.ok)throw new Error(d.error||('HTTP '+r.status));
    setDirty(false);status('Saved ✓ live at /'+DOC.slug+' — '+DOC.items.length+' items.','ok');$('#saveMsg').textContent='Saved';
  }catch(e){status('Save failed: '+(e.message||e),'err');$('#saveMsg').textContent='Save failed'}
  finally{$('#saveBtn').disabled=false;$('#saveTopBtn').disabled=false}
}

$('#metaToggle').onclick=()=>{const m=$('#meta');m.classList.toggle('show');$('#metaToggle').textContent=(m.classList.contains('show')?'▾':'▸')+' List details (title · subtitle · about · regions)'};
$('#saveBtn').onclick=save; $('#saveTopBtn').onclick=save;
$('#addBtn').onclick=addRow; $('#addTopBtn').onclick=addRow;
$('#discardBtn').onclick=()=>{if(confirm('Discard unsaved changes and reload?')){setDirty(false);loadList()}};
$('#reloadBtn').onclick=()=>{if(!DIRTY||confirm('Discard unsaved changes?')){setDirty(false);loadList()}};
$('#importBtn').onclick=importSeed;
window.addEventListener('beforeunload',e=>{if(DIRTY){e.preventDefault();e.returnValue=''}});
selectList('golf');
</script>
</body>
