<!DOCTYPE html>
<!-- build-stamp: studio-v1 · contacts (Monday.com replacement) -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>TMW Studio · Contacts</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#070807; --panel:#131613; --panel-2:#1a1d1a;
  --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.14);
  --text:#ECEAE5; --mute:#9AA39C; --mute-2:#C2C9C3; --white:#fff;
  --green:#1FDF67; --green-soft:#42EB81;
  --gold:#e6c574; --gold-soft:#f0d68a;
  --purple:#A78BFA;
  --danger:#ff5d5d;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --serif:'Fraunces',Georgia,serif;
  --mono:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--ink); color:var(--text); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased}

.topbar{position:sticky; top:0; z-index:10; background:rgba(7,8,7,.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--hair)}
.topbar-inner{display:flex; align-items:center; gap:18px; padding:16px 22px; max-width:1400px; margin:0 auto; flex-wrap:wrap}
.brand{display:flex; flex-direction:column; gap:2px}
.brand-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--green)}
.brand-title{font-family:var(--serif); font-weight:600; font-size:22px; color:var(--white)}
.brand-sub{font-family:var(--mono); font-size:11px; color:var(--mute); margin-top:2px; letter-spacing:.04em}

.tablinks{display:flex; gap:4px; padding:5px; background:rgba(255,255,255,.04); border:1px solid var(--hair); border-radius:99px}
.tablinks a{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; padding:9px 16px; border-radius:99px; color:var(--mute-2); text-decoration:none; font-weight:600; transition:all .15s}
.tablinks a:hover{color:var(--white)}
.tablinks a.on{background:var(--white); color:var(--ink)}

.btn-row{display:flex; gap:8px; flex-wrap:wrap; margin-left:auto}
.btn{font-family:var(--mono); font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:10px 16px; border-radius:8px; border:1px solid var(--hair-2); background:rgba(255,255,255,.04); color:var(--text); cursor:pointer; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center; gap:7px}
.btn:hover{border-color:rgba(255,255,255,.32); color:var(--white)}
.btn-primary{background:var(--green); color:#0a0a0a; border-color:var(--green)}
.btn-primary:hover{background:var(--green-soft); border-color:var(--green-soft); color:#0a0a0a}
.btn-danger:hover{border-color:var(--danger); color:var(--danger)}
.btn svg{width:13px; height:13px}

.container{max-width:1400px; margin:24px auto 80px; padding:0 22px}

.toolbar{display:flex; gap:14px; flex-wrap:wrap; align-items:center; padding:16px 18px; background:var(--panel); border:1px solid var(--hair); border-radius:12px; margin-bottom:16px}
.tag-pills{display:flex; gap:4px; padding:4px; background:rgba(255,255,255,.03); border:1px solid var(--hair); border-radius:99px; flex-wrap:wrap}
.tag-pills button{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; padding:7px 14px; border-radius:99px; border:0; background:transparent; color:var(--mute-2); cursor:pointer; font-weight:600}
.tag-pills button.on{background:var(--white); color:var(--ink)}
.search{flex:1; min-width:240px; max-width:520px; display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); border-radius:8px}
.search input{flex:1; background:transparent; border:0; outline:0; color:var(--white); font:inherit; font-size:13px}
.search svg{width:14px; height:14px; color:var(--mute)}
.results-meta{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:var(--mute); text-transform:uppercase; margin-left:auto}

.table-head{display:grid; grid-template-columns:1.4fr 1.5fr 1.3fr 1.4fr 90px 70px; gap:14px; padding:10px 18px; font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute); border-bottom:1px solid var(--hair); margin-bottom:4px}
.row{display:grid; grid-template-columns:1.4fr 1.5fr 1.3fr 1.4fr 90px 70px; gap:14px; align-items:center; padding:14px 18px; background:var(--panel); border:1px solid var(--hair); border-radius:10px; margin-bottom:5px; transition:border-color .15s, background .15s; cursor:pointer}
.row:hover{border-color:rgba(255,255,255,.18); background:var(--panel-2)}
.row .name{font-family:var(--serif); font-size:15.5px; color:var(--white); font-weight:600; line-height:1.25}
.row .email{font-family:var(--mono); font-size:12px; color:var(--mute-2); word-break:break-all}
.row .company{font-size:13px; color:var(--mute-2)}
.row .tagchips{display:flex; flex-wrap:wrap; gap:4px}
.row .tagchip{padding:3px 8px; border-radius:99px; font-family:var(--mono); font-size:10px; background:rgba(167,139,250,.10); border:1px solid rgba(167,139,250,.32); color:#cab8fc; letter-spacing:.04em}
.row .postcount{font-family:var(--mono); font-size:13px; color:var(--green-soft); text-align:center; font-weight:600}
.row .postcount .lbl{font-size:9.5px; color:var(--mute); letter-spacing:.1em; text-transform:uppercase; display:block; margin-top:2px; font-weight:400}
.row .actions{display:flex; gap:6px; justify-content:flex-end}
.row .icon-btn{width:30px; height:30px; border-radius:6px; border:1px solid var(--hair-2); background:transparent; color:var(--mute-2); display:flex; align-items:center; justify-content:center; cursor:pointer}
.row .icon-btn:hover{color:var(--white); border-color:rgba(255,255,255,.3)}
.row .icon-btn.danger:hover{color:var(--danger); border-color:var(--danger)}
.row .icon-btn svg{width:13px; height:13px}

.empty{padding:60px 22px; text-align:center; color:var(--mute); background:var(--panel); border:1px solid var(--hair); border-radius:12px}
.empty h3{color:var(--white); font-size:18px; margin-bottom:8px; font-family:var(--serif)}
.load-more-wrap{display:flex; justify-content:center; margin-top:20px}

.auth-needed{padding:50px 30px; text-align:center; background:var(--panel); border:1px solid var(--gold); border-radius:12px; max-width:600px; margin:50px auto}
.auth-needed h3{color:var(--gold-soft); font-family:var(--serif); font-size:22px; margin-bottom:10px}
.auth-needed p{color:var(--mute-2); margin-bottom:20px; font-size:14px}

/* ─── Contact detail modal (edit + connected posts) ─── */
.modal{position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.7); backdrop-filter:blur(10px); display:none; align-items:flex-start; justify-content:center; padding:60px 20px; overflow-y:auto}
.modal.show{display:flex}
.modal-inner{width:100%; max-width:880px; background:var(--ink); border:1px solid var(--hair-2); border-radius:14px; display:grid; grid-template-columns:1.1fr 1fr; overflow:hidden}
@media(max-width:760px){.modal-inner{grid-template-columns:1fr}}
.modal-edit{padding:24px 26px; border-right:1px solid var(--hair); background:var(--panel)}
.modal-posts{padding:24px 26px; background:var(--panel-2)}
@media(max-width:760px){.modal-edit{border-right:0; border-bottom:1px solid var(--hair)}}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px}
.modal-head h3{font-family:var(--serif); font-size:22px; color:var(--white); line-height:1.2; padding-right:10px}
.modal-head .close{background:none; border:1px solid var(--hair-2); color:var(--mute-2); width:30px; height:30px; border-radius:6px; cursor:pointer; flex-shrink:0; font-size:14px}
.modal-head .close:hover{color:var(--white); border-color:var(--hair-2)}
.field{margin-bottom:14px}
.field label{display:block; font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute-2); margin-bottom:6px}
.field input, .field textarea{width:100%; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); border-radius:6px; color:var(--white); font-family:inherit; font-size:13.5px; padding:9px 12px; outline:0; transition:border-color .15s}
.field input:focus, .field textarea:focus{border-color:var(--green)}
.field textarea{resize:vertical; min-height:80px; line-height:1.5}
.tagchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px}
.tagchips .tag{padding:5px 11px; border-radius:99px; font-family:var(--mono); font-size:10.5px; cursor:pointer; border:1px solid var(--hair-2); color:var(--mute-2); transition:all .12s; user-select:none}
.tagchips .tag.on{background:rgba(167,139,250,.18); border-color:var(--purple); color:#dccffe}
.tagchips .tag:hover{color:var(--white)}
.tagchips .tag-add-wrap{display:inline-flex; align-items:center}
.tagchips .tag-add-wrap input{background:rgba(255,255,255,.04); border:1px dashed var(--hair-2); border-radius:99px; color:var(--white); font-family:inherit; font-size:11.5px; padding:4px 12px; outline:0; width:130px}
.tagchips .tag-add-wrap input:focus{border-color:var(--purple); border-style:solid}
.modal-actions{display:flex; gap:8px; margin-top:22px; padding-top:16px; border-top:1px solid var(--hair); flex-wrap:wrap}
.modal-actions .save{background:var(--green); border-color:var(--green); color:#0a0a0a}
.modal-actions .save:hover{background:var(--green-soft); border-color:var(--green-soft)}
.modal-actions .delete{margin-left:auto; border-color:rgba(255,93,93,.4); color:#ffb3b3}
.modal-actions .delete:hover{border-color:var(--danger); color:var(--danger); background:rgba(255,93,93,.08)}
.modal-actions button:disabled{opacity:.5; cursor:wait}

.posts-head{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute); margin-bottom:12px; display:flex; justify-content:space-between; align-items:baseline}
.posts-head .count{color:var(--green-soft); font-weight:700}
.posts-list{display:flex; flex-direction:column; gap:6px; max-height:520px; overflow-y:auto; padding-right:4px}
.posts-list a.post-row{display:block; padding:11px 13px; background:rgba(255,255,255,.03); border:1px solid var(--hair); border-radius:8px; text-decoration:none; color:inherit; transition:all .14s}
.posts-list a.post-row:hover{background:rgba(167,139,250,.07); border-color:rgba(167,139,250,.32)}
.posts-list .ptitle{font-size:13.5px; color:var(--white); font-weight:500; line-height:1.3; margin-bottom:5px}
.posts-list .pmeta{font-family:var(--mono); font-size:10.5px; color:var(--mute); display:flex; gap:10px; flex-wrap:wrap; align-items:center}
.posts-list .pmeta .ptype{padding:2px 7px; border-radius:99px; background:rgba(167,139,250,.10); border:1px solid rgba(167,139,250,.32); color:#cab8fc; letter-spacing:.04em}
.posts-list .pmeta .ptype.paid{background:rgba(31,223,103,.10); border-color:rgba(31,223,103,.32); color:var(--green-soft)}
.posts-list .pmeta .pinc{color:var(--green-soft); font-weight:600}
.posts-list .empty-posts{font-family:var(--mono); font-size:11.5px; color:var(--mute); padding:14px; text-align:center}

#toast{position:fixed; top:80px; right:24px; z-index:100; background:rgba(7,8,7,.94); backdrop-filter:blur(14px); border:1px solid var(--hair-2); color:var(--text); padding:14px 20px; border-radius:10px; font-family:var(--mono); font-size:12px; opacity:0; transform:translateY(-10px); transition:opacity .25s, transform .25s; pointer-events:none; max-width:340px}
#toast.visible{opacity:1; transform:none}
#toast.success{border-color:var(--green); color:var(--green-soft)}
#toast.error{border-color:var(--danger); color:#ffb3b3}

@media(max-width:880px){
  .table-head{display:none}
  .row{grid-template-columns:1fr 70px; gap:10px; padding:12px 14px}
  .row > .email, .row > .company, .row > .tagchips, .row > .postcount{display:none}
}
</style>
  <script src="/_shared/admin-auth.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-eyebrow">TMW Studio</div>
      <div class="brand-title">Contacts</div>
      <div class="brand-sub">PR reps, brand owners, agency leads</div>
    </div>
    <div class="tablinks" style="margin-left:20px">
      <a href="/studio/">Posts</a>
      <a href="/studio/contacts.html" class="on">Contacts</a>
      <a href="/studio/media.html">Media</a>
      <a href="/studio/migrate-wix.html">Wix library</a>
      <a href="/studio/sync.html">Wix sync</a>
      <a href="/studio/analytics.html">Analytics</a>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="newContactBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 3v10M3 8h10"/></svg>
        New contact
      </button>
    </div>
  </div>
</div>

<div class="container" id="container">
  <!-- Auth gate OR contact list, injected by JS -->
</div>

<!-- Detail / edit modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="modal-edit">
      <div class="modal-head">
        <h3 id="modalTitle">Edit contact</h3>
        <button class="close" id="modalClose">✕</button>
      </div>
      <div class="field">
        <label for="fName">Name</label>
        <input id="fName" type="text" placeholder="Full name">
      </div>
      <div class="field">
        <label for="fEmail">Email</label>
        <input id="fEmail" type="email" placeholder="email@company.com">
      </div>
      <div class="field">
        <label for="fCompany">Company</label>
        <input id="fCompany" type="text" placeholder="Agency or brand">
      </div>
      <div class="field">
        <label for="fPhone">Phone</label>
        <input id="fPhone" type="tel" placeholder="Optional">
      </div>
      <div class="field">
        <label>Tags</label>
        <div class="tagchips" id="fTagChips"></div>
      </div>
      <div class="field">
        <label for="fNotes">Notes</label>
        <textarea id="fNotes" placeholder="Optional"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn save" id="saveBtn">Save</button>
        <button class="btn" id="cancelBtn">Cancel</button>
        <button class="btn delete" id="deleteBtn" style="display:none">Delete contact</button>
      </div>
    </div>
    <div class="modal-posts">
      <div class="posts-head">
        <span>Connected posts</span>
        <span class="count" id="postsCount">—</span>
      </div>
      <div class="posts-list" id="postsList">
        <div class="empty-posts">Save the contact first to see connected posts.</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WORKER_URL = 'https://tmw.jake-ab7.workers.dev';
const TOKEN_KEY  = 'tmw-admin-token-v1';
const PAGE_SIZE  = 50;

// Tag chips on the create/edit form — seed set the user picked (Travel / Real
// Estate / Hospitality / Wellness). Additional tags discovered on existing
// contacts are merged in at render time, and the user can add ad-hoc tags via
// the "+ Add tag" input.
const SEED_TAGS = ['Travel', 'Real Estate', 'Hospitality', 'Wellness'];

const STATE = {
  tag: 'all',        // 'all' | <seed tag> | any dynamic tag
  q: '',
  offset: 0,
  items: [],
  total: 0,
  hasMore: false,
  knownTags: new Set(SEED_TAGS),
  editing: null,     // contact object currently in the modal, null = new
};

function getToken() { return (localStorage.getItem(TOKEN_KEY) || '').trim(); }
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('success','error');
  if (kind) el.classList.add(kind);
  el.classList.add('visible');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('visible'), 2800);
}
function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return escHtml(s); }
function fmtDollars(n) {
  if (n == null || n === '') return '';
  const v = Number(n);
  if (!isFinite(v) || v === 0) return '';
  return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

// ─── Init: token gate, then load list ──────────────────────────────
(async function init() {
  if (!getToken()) return renderAuthGate();
  await loadContacts(true);
})();

function renderAuthGate() {
  const loginUrl = (window.TMWAuth && window.TMWAuth.loginUrl && window.TMWAuth.loginUrl()) || '#';
  document.getElementById('container').innerHTML = `
    <div class="auth-needed">
      <h3>Sign in to TMW Studio</h3>
      <p>Log in with GitHub to manage contacts.</p>
      <a class="btn btn-primary" href="${loginUrl}">Log in with GitHub</a>
    </div>
  `;
}

// ─── List loading ──────────────────────────────────────────────────
async function loadContacts(replace) {
  if (replace) { STATE.offset = 0; STATE.items = []; }
  const params = new URLSearchParams();
  params.set('limit',  PAGE_SIZE);
  params.set('offset', STATE.offset);
  if (STATE.tag !== 'all') params.set('tag', STATE.tag);
  if (STATE.q) params.set('q', STATE.q);
  try {
    const res = await fetch(WORKER_URL + '/contacts?' + params, {
      headers: { 'Authorization': 'Bearer ' + getToken() }, cache: 'no-store',
    });
    if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); return renderAuthGate(); }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    STATE.items = STATE.items.concat(data.items || []);
    STATE.total = data.total || 0;
    STATE.hasMore = !!data.hasMore;
    STATE.offset += (data.items || []).length;
    // Harvest tags so the filter strip surfaces every tag actually in use.
    for (const c of (data.items || [])) for (const t of (c.tags || [])) STATE.knownTags.add(t);
    renderList();
  } catch (e) {
    // Render the empty-shell anyway so the toolbar + "New contact" still work
    // when the worker is unreachable; the toast surfaces what went wrong.
    renderList();
    toast('Load failed: ' + e.message, 'error');
  }
}

function renderList() {
  const tagList = [...STATE.knownTags].sort((a, b) => {
    const ia = SEED_TAGS.indexOf(a), ib = SEED_TAGS.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1; if (ib >= 0) return 1;
    return a.localeCompare(b);
  });
  const html = `
    <div class="toolbar">
      <div class="tag-pills" id="tagPills">
        <button data-tag="all" class="${STATE.tag==='all'?'on':''}">All</button>
        ${tagList.map(t => `<button data-tag="${escAttr(t)}" class="${STATE.tag===t?'on':''}">${escHtml(t)}</button>`).join('')}
      </div>
      <label class="search">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
        <input id="searchInput" type="search" placeholder="Search name, email, company..." value="${escHtml(STATE.q)}">
      </label>
      <div class="results-meta">${STATE.total.toLocaleString()} contacts</div>
    </div>
    ${STATE.items.length ? `
      <div class="table-head">
        <div>Name</div>
        <div>Email</div>
        <div>Company</div>
        <div>Tags</div>
        <div style="text-align:center">Posts</div>
        <div style="text-align:right">Actions</div>
      </div>
      ${STATE.items.map(rowHtml).join('')}
      ${STATE.hasMore ? `<div class="load-more-wrap"><button class="btn" id="loadMoreBtn">Load more</button></div>` : ''}
    ` : `<div class="empty"><h3>No contacts yet</h3><p>Click "New contact" to add one — they'll surface in the picker on every post.</p></div>`}
  `;
  document.getElementById('container').innerHTML = html;

  document.querySelectorAll('#tagPills button').forEach(b => b.addEventListener('click', () => {
    STATE.tag = b.dataset.tag;
    loadContacts(true);
  }));
  let searchTimer;
  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { STATE.q = e.target.value.trim(); loadContacts(true); }, 280);
  });
  document.getElementById('loadMoreBtn')?.addEventListener('click', () => loadContacts(false));
  document.querySelectorAll('.row[data-edit-id]').forEach(row => {
    row.addEventListener('click', () => openModal(row.dataset.editId));
  });
  document.querySelectorAll('.row .actions').forEach(a => a.addEventListener('click', e => e.stopPropagation()));
  document.querySelectorAll('[data-delete-id]').forEach(b => b.addEventListener('click', async e => {
    e.preventDefault(); e.stopPropagation();
    const id = b.dataset.deleteId;
    const name = b.dataset.deleteName || id;
    if (!confirm(`Delete "${name}"? Any posts connected to this contact will simply lose the link — the posts themselves stay.`)) return;
    try {
      const res = await fetch(WORKER_URL + '/contacts/' + encodeURIComponent(id), {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + getToken() },
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      toast('Deleted', 'success');
      loadContacts(true);
    } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
  }));
}

function rowHtml(c) {
  const tagHtml = (c.tags || []).slice(0, 4).map(t => `<span class="tagchip">${escHtml(t)}</span>`).join('');
  return `<div class="row" data-edit-id="${escAttr(c.id)}">
    <div class="name">${escHtml(c.name || '(unnamed)')}</div>
    <div class="email">${escHtml(c.email || '—')}</div>
    <div class="company">${escHtml(c.company || '—')}</div>
    <div class="tagchips">${tagHtml || `<span style="color:var(--mute); font-family:var(--mono); font-size:11px">—</span>`}</div>
    <div class="postcount">${c.post_count || 0}<span class="lbl">posts</span></div>
    <div class="actions">
      <button class="icon-btn danger" data-delete-id="${escAttr(c.id)}" data-delete-name="${escAttr(c.name || '')}" title="Delete">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 4h10M6 4V2.5h4V4M5 4l.5 9.5h5L11 4"/></svg>
      </button>
    </div>
  </div>`;
}

// ─── Modal: open / hydrate / save / delete ─────────────────────────
const modal     = document.getElementById('modal');
const fName     = document.getElementById('fName');
const fEmail    = document.getElementById('fEmail');
const fCompany  = document.getElementById('fCompany');
const fPhone    = document.getElementById('fPhone');
const fTagChips = document.getElementById('fTagChips');
const fNotes    = document.getElementById('fNotes');
const saveBtn   = document.getElementById('saveBtn');
const cancelBtn = document.getElementById('cancelBtn');
const deleteBtn = document.getElementById('deleteBtn');
const closeBtn  = document.getElementById('modalClose');
const postsCount= document.getElementById('postsCount');
const postsList = document.getElementById('postsList');

let selectedTags = new Set();

function closeModal() { modal.classList.remove('show'); STATE.editing = null; }
closeBtn.addEventListener('click', closeModal);
cancelBtn.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('show')) closeModal(); });

document.getElementById('newContactBtn').addEventListener('click', () => openModal(null));

async function openModal(id) {
  STATE.editing = null;
  fName.value = ''; fEmail.value = ''; fCompany.value = ''; fPhone.value = ''; fNotes.value = '';
  selectedTags = new Set();
  document.getElementById('modalTitle').textContent = id ? 'Edit contact' : 'New contact';
  deleteBtn.style.display = id ? '' : 'none';
  postsCount.textContent = '—';
  postsList.innerHTML = `<div class="empty-posts">${id ? 'Loading…' : 'Save the contact first to see connected posts.'}</div>`;
  renderTagChips();
  modal.classList.add('show');
  setTimeout(() => fName.focus(), 50);
  if (!id) return;
  try {
    const res = await fetch(WORKER_URL + '/contacts/' + encodeURIComponent(id), {
      headers: { 'Authorization': 'Bearer ' + getToken() }, cache: 'no-store',
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const c = data.contact || {};
    STATE.editing = c;
    fName.value    = c.name    || '';
    fEmail.value   = c.email   || '';
    fCompany.value = c.company || '';
    fPhone.value   = c.phone   || '';
    fNotes.value   = c.notes   || '';
    selectedTags = new Set(c.tags || []);
    for (const t of selectedTags) STATE.knownTags.add(t);
    renderTagChips();
    renderConnectedPosts(data.posts || []);
  } catch (e) {
    toast('Load contact failed: ' + e.message, 'error');
    closeModal();
  }
}

function renderTagChips() {
  const seedAndKnown = [...STATE.knownTags].sort((a, b) => {
    const ia = SEED_TAGS.indexOf(a), ib = SEED_TAGS.indexOf(b);
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1; if (ib >= 0) return 1;
    return a.localeCompare(b);
  });
  fTagChips.innerHTML = seedAndKnown.map(t =>
    `<span class="tag${selectedTags.has(t) ? ' on' : ''}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
  ).join('') + `<span class="tag-add-wrap"><input id="tagAddInput" type="text" placeholder="+ Add tag"></span>`;
  fTagChips.querySelectorAll('.tag[data-tag]').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.tag;
      if (selectedTags.has(t)) { selectedTags.delete(t); el.classList.remove('on'); }
      else { selectedTags.add(t); el.classList.add('on'); }
    });
  });
  const addInput = document.getElementById('tagAddInput');
  addInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && addInput.value.trim()) {
      e.preventDefault();
      const t = addInput.value.trim();
      selectedTags.add(t);
      STATE.knownTags.add(t);
      renderTagChips();
    }
  });
}

function renderConnectedPosts(posts) {
  postsCount.textContent = posts.length;
  if (!posts.length) {
    postsList.innerHTML = `<div class="empty-posts">No posts connected to this contact yet.</div>`;
    return;
  }
  postsList.innerHTML = posts.map(p => {
    const dateStr = p.published_at
      ? new Date(p.published_at * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : (p.status === 'draft' ? 'Draft' : 'Unpublished');
    const inc = fmtDollars(p.income);
    const typeCls = (p.post_type === 'Paid') ? 'paid' : '';
    return `<a class="post-row" href="/studio/post.html?id=${encodeURIComponent(p.id || '')}&slug=${encodeURIComponent(p.slug)}">
      <div class="ptitle">${escHtml(p.title)}</div>
      <div class="pmeta">
        <span class="ptype ${typeCls}">${escHtml(p.post_type || 'Editorial')}</span>
        ${inc ? `<span class="pinc">${escHtml(inc)}</span>` : ''}
        <span>${escHtml(dateStr)}</span>
      </div>
    </a>`;
  }).join('');
}

saveBtn.addEventListener('click', async () => {
  const name = fName.value.trim();
  if (!name) { toast('Name is required', 'error'); fName.focus(); return; }
  const payload = {
    name,
    email:   fEmail.value.trim()   || null,
    company: fCompany.value.trim() || null,
    phone:   fPhone.value.trim()   || null,
    notes:   fNotes.value.trim()   || null,
    tags:    [...selectedTags],
  };
  saveBtn.disabled = true; const origLabel = saveBtn.textContent; saveBtn.textContent = 'Saving…';
  try {
    const isCreate = !STATE.editing;
    const url = isCreate
      ? WORKER_URL + '/contacts'
      : WORKER_URL + '/contacts/' + encodeURIComponent(STATE.editing.id);
    const res = await fetch(url, {
      method: isCreate ? 'POST' : 'PATCH',
      headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) { const t = await res.text(); throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 200)); }
    const data = await res.json();
    toast(isCreate ? 'Created' : 'Saved', 'success');
    // Reload the list to reflect the change; refresh the modal's posts list
    // from the contact's reverse-lookup so newly-saved contacts show their
    // connected posts (which, for a brand-new contact, is empty).
    STATE.editing = data.contact;
    deleteBtn.style.display = '';
    document.getElementById('modalTitle').textContent = 'Edit contact';
    if (isCreate) {
      renderConnectedPosts([]);
    } else {
      // Re-fetch to pick up the latest connected-posts snapshot.
      const det = await fetch(WORKER_URL + '/contacts/' + encodeURIComponent(data.contact.id), {
        headers: { 'Authorization': 'Bearer ' + getToken() }, cache: 'no-store',
      });
      if (det.ok) renderConnectedPosts((await det.json()).posts || []);
    }
    loadContacts(true);
  } catch (e) {
    toast('Save failed: ' + e.message, 'error');
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = origLabel;
  }
});

deleteBtn.addEventListener('click', async () => {
  if (!STATE.editing) return;
  const c = STATE.editing;
  if (!confirm(`Delete "${c.name || c.id}"? Any posts connected to this contact will simply lose the link — the posts themselves stay.`)) return;
  deleteBtn.disabled = true;
  try {
    const res = await fetch(WORKER_URL + '/contacts/' + encodeURIComponent(c.id), {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + getToken() },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast('Deleted', 'success');
    closeModal();
    loadContacts(true);
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
  finally { deleteBtn.disabled = false; }
});
</script>
