<!DOCTYPE html>
<!-- build-stamp: studio-v1 · media library -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TMW Studio · Media Library</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#070807; --panel:#131613; --panel-2:#1a1d1a;
  --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.14);
  --text:#ECEAE5; --mute:#9AA39C; --white:#fff;
  --green:#1FDF67; --green-soft:#42EB81;
  --gold-soft:#f0d68a;
  --danger:#ff5d5d;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --serif:'Fraunces',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--ink); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; line-height:1.5}

.topbar{position:sticky; top:0; z-index:10; background:rgba(7,8,7,.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--hair)}
.topbar-inner{display:flex; align-items:center; gap:18px; padding:16px 22px; max-width:1400px; margin:0 auto}
.brand{display:flex; flex-direction:column; gap:2px}
.brand-eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--green)}
.brand-title{font-family:var(--serif); font-weight:600; font-size:22px; color:var(--white)}

.tablinks{display:flex; gap:4px; padding:5px; background:rgba(255,255,255,.04); border:1px solid var(--hair); border-radius:99px; margin-left:20px}
.tablinks a{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; padding:9px 16px; border-radius:99px; color:var(--mute); text-decoration:none; font-weight:600}
.tablinks a:hover{color:var(--white)}
.tablinks a.on{background:var(--white); color:var(--ink)}

.container{max-width:1400px; margin:24px auto 80px; padding:0 22px}

/* Drop zone */
.dropzone{display:block; position:relative; padding:50px 24px; border:2px dashed var(--hair-2); border-radius:14px; text-align:center; background:var(--panel); transition:border-color .15s, background .15s; margin-bottom:18px; cursor:pointer}
.dropzone:hover, .dropzone.drag{border-color:var(--green); background:var(--panel-2)}
.dropzone svg{width:36px; height:36px; color:var(--mute); margin-bottom:14px}
.dropzone h3{font-family:var(--serif); font-size:20px; color:var(--white); margin-bottom:6px}
.dropzone p{color:var(--mute); font-size:13px}
.dropzone input{display:none}
.dropzone .pickbtn{display:inline-block; margin-top:16px; padding:10px 20px; background:var(--green); color:var(--ink); font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; border-radius:99px; border:0; cursor:pointer}
.dropzone .pickbtn:hover{background:var(--green-soft)}

/* Upload progress strip */
.uploading{display:flex; align-items:center; gap:12px; padding:14px 18px; background:rgba(31,223,103,.06); border:1px solid rgba(31,223,103,.3); border-radius:10px; margin-bottom:14px; font-family:var(--mono); font-size:12px; color:var(--green-soft)}
.uploading .spin{width:16px; height:16px; border:2px solid rgba(31,223,103,.2); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toolbar */
.toolbar{display:flex; gap:14px; flex-wrap:wrap; align-items:center; padding:14px 18px; background:var(--panel); border:1px solid var(--hair); border-radius:12px; margin-bottom:16px}
.search{flex:1; min-width:240px; max-width:520px; display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(255,255,255,.04); border:1px solid var(--hair-2); border-radius:8px}
.search input{flex:1; background:transparent; border:0; outline:0; color:var(--white); font:inherit; font-size:13px}
.search svg{width:14px; height:14px; color:var(--mute)}
.results-meta{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:var(--mute); text-transform:uppercase; margin-left:auto}

/* Grid */
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px}
.tile{position:relative; aspect-ratio:1/1; background:#0a0a0a; border:1px solid var(--hair); border-radius:10px; overflow:hidden; cursor:pointer; transition:transform .15s, border-color .15s}
.tile:hover{transform:translateY(-2px); border-color:var(--green)}
.tile img{width:100%; height:100%; object-fit:cover; display:block}
.tile .meta{position:absolute; left:0; right:0; bottom:0; padding:24px 10px 9px; background:linear-gradient(transparent, rgba(7,8,7,.92)); color:var(--white); font-family:var(--mono); font-size:10px; letter-spacing:.04em}
.tile .meta-name{display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.tile .meta-sub{display:block; color:var(--mute); margin-top:2px}
.tile .actions{position:absolute; top:8px; right:8px; display:flex; gap:5px; opacity:0; transition:opacity .15s}
.tile:hover .actions{opacity:1}
.tile .actions button{width:30px; height:30px; border-radius:6px; border:0; background:rgba(7,8,7,.78); backdrop-filter:blur(8px); color:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center}
.tile .actions button:hover{background:var(--green); color:var(--ink)}
.tile .actions button.danger:hover{background:var(--danger); color:var(--white)}
.tile .actions svg{width:13px; height:13px}
.tile .copied{position:absolute; inset:0; background:rgba(31,223,103,.85); color:var(--ink); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:.08em; opacity:0; transition:opacity .2s; pointer-events:none}
.tile.copied .copied{opacity:1}

.empty{padding:60px 22px; text-align:center; color:var(--mute); background:var(--panel); border:1px solid var(--hair); border-radius:12px}
.empty h3{color:var(--white); font-size:18px; margin-bottom:8px; font-family:var(--serif)}

#toast{position:fixed; top:80px; right:24px; z-index:100; background:rgba(7,8,7,.94); backdrop-filter:blur(14px); border:1px solid var(--hair-2); color:var(--text); padding:14px 20px; border-radius:10px; font-family:var(--mono); font-size:12px; opacity:0; transform:translateY(-10px); transition:opacity .25s, transform .25s; pointer-events:none; max-width:340px}
#toast.visible{opacity:1; transform:none}
#toast.success{border-color:var(--green); color:var(--green-soft)}
#toast.error{border-color:var(--danger); color:#ffb3b3}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-eyebrow">TMW Studio</div>
      <div class="brand-title">Media Library</div>
    </div>
    <div class="tablinks">
      <a href="/journal/studio/">Posts</a>
      <a href="/journal/studio/media.html" class="on">Media</a>
      <a href="/journal/studio/sync.html">Wix sync</a>
    </div>
  </div>
</div>

<div class="container">
  <label class="dropzone" id="dropzone" for="fileInput">
    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v14M5 10l7-7 7 7M3 21h18"/></svg>
    <h3>Drop files here, or click to choose</h3>
    <p>Images and videos · up to 25 MB each</p>
    <span class="pickbtn">Choose files</span>
  </label>

  <div id="uploads"></div>

  <div class="toolbar">
    <label class="search">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
      <input id="searchInput" type="search" placeholder="Search filenames + alt text...">
    </label>
    <div class="results-meta" id="resultsMeta">— assets</div>
  </div>

  <div id="grid" class="grid"><!-- tiles --></div>
  <div id="loadMoreWrap" style="display:none; justify-content:center; margin-top:20px"><button id="loadMoreBtn" class="pickbtn" style="cursor:pointer; border:0">Load more</button></div>
</div>

<div id="toast"></div>

<script>
const WORKER_URL = 'https://tmw.jake-ab7.workers.dev';
const TOKEN_KEY  = 'tmw-admin-token-v1';
const PAGE_SIZE  = 60;

const STATE = { items: [], total: 0, offset: 0, hasMore: false, q: '' };

function getToken() { return (localStorage.getItem(TOKEN_KEY) || '').trim(); }
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('success','error');
  if (kind) el.classList.add(kind);
  el.classList.add('visible');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('visible'), 2800);
}

// ─── Init ─────────────────────────────────────────────────────────
(async function init() {
  if (!getToken()) {
    document.querySelector('.container').innerHTML = `<div class="empty"><h3>Admin token required</h3><p>Visit <a href="/journal/studio/" style="color:var(--green)">Posts</a> first to set your token, then come back.</p></div>`;
    return;
  }
  hookDropzone();
  hookSearch();
  await loadMedia(true);
})();

// ─── Drag-drop + click upload ────────────────────────────────────
function hookDropzone() {
  const dz = document.getElementById('dropzone');
  const input = document.getElementById('fileInput');

  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); dz.classList.add('drag');
  }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); dz.classList.remove('drag');
  }));
  dz.addEventListener('drop', e => { if (e.dataTransfer.files) handleFiles([...e.dataTransfer.files]); });
  input.addEventListener('change', e => { if (e.target.files) handleFiles([...e.target.files]); input.value = ''; });
}

async function handleFiles(files) {
  if (!files.length) return;
  const uploadsEl = document.getElementById('uploads');
  for (const file of files) {
    const node = document.createElement('div');
    node.className = 'uploading';
    node.innerHTML = `<div class="spin"></div><span>Uploading ${escHtml(file.name)} (${humanSize(file.size)})...</span>`;
    uploadsEl.appendChild(node);

    try {
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(WORKER_URL + '/admin/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + getToken() },
        body: form,
      });
      if (res.status === 401) { localStorage.removeItem(TOKEN_KEY); toast('Token rejected', 'error'); node.remove(); return; }
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status}: ${text.slice(0, 200)}`);
      }
      const data = await res.json();
      node.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--green)"><path d="M3 8l4 4 6-8"/></svg><span>Uploaded ${escHtml(data.filename || file.name)}</span>`;
      setTimeout(() => node.remove(), 2000);
      STATE.items.unshift(normalizeMedia(data));
      STATE.total++;
      renderGrid();
    } catch (e) {
      node.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;color:var(--danger)"><path d="M3 3l10 10M13 3L3 13"/></svg><span style="color:var(--danger)">Failed ${escHtml(file.name)}: ${escHtml(e.message)}</span>`;
      setTimeout(() => node.remove(), 6000);
    }
  }
}

function normalizeMedia(m) {
  return {
    key: m.key,
    filename: m.filename || (m.key && m.key.split('/').pop()) || '',
    mime_type: m.mime_type,
    size_bytes: m.size_bytes,
    alt_text: m.alt_text,
    uploaded_at: m.uploaded_at,
    url: m.url,
  };
}

// ─── List loading ─────────────────────────────────────────────────
function hookSearch() {
  let t;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(t);
    t = setTimeout(() => { STATE.q = e.target.value.trim(); loadMedia(true); }, 280);
  });
}

async function loadMedia(replace) {
  if (replace) { STATE.offset = 0; STATE.items = []; }
  const params = new URLSearchParams();
  params.set('limit', PAGE_SIZE);
  params.set('offset', STATE.offset);
  if (STATE.q) params.set('q', STATE.q);
  try {
    const res = await fetch(WORKER_URL + '/admin/media?' + params, {
      headers: { 'Authorization': 'Bearer ' + getToken() },
      cache: 'no-store',
    });
    if (res.status === 401) { toast('Token rejected — set on /studio/ first', 'error'); return; }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    STATE.items = STATE.items.concat((data.items || []).map(normalizeMedia));
    STATE.total = data.total || 0;
    STATE.hasMore = !!data.hasMore;
    STATE.offset += (data.items || []).length;
    renderGrid();
  } catch (e) {
    toast('Load failed: ' + e.message, 'error');
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  document.getElementById('resultsMeta').textContent = STATE.total.toLocaleString() + ' asset' + (STATE.total === 1 ? '' : 's');
  document.getElementById('loadMoreWrap').style.display = STATE.hasMore ? 'flex' : 'none';
  if (!STATE.items.length) {
    grid.innerHTML = '';
    if (!STATE.q) grid.parentNode.querySelector('.empty')?.remove();
    return;
  }
  grid.innerHTML = STATE.items.map(tileHtml).join('');
  grid.querySelectorAll('[data-copy-url]').forEach(b => b.addEventListener('click', async e => {
    e.preventDefault(); e.stopPropagation();
    const tile = b.closest('.tile');
    try { await navigator.clipboard.writeText(b.dataset.copyUrl); tile.classList.add('copied'); setTimeout(() => tile.classList.remove('copied'), 900); }
    catch { toast('Copy failed', 'error'); }
  }));
  grid.querySelectorAll('[data-delete-key]').forEach(b => b.addEventListener('click', async e => {
    e.preventDefault(); e.stopPropagation();
    if (!confirm('Delete this asset permanently?')) return;
    try {
      const res = await fetch(WORKER_URL + '/admin/media/' + encodeURIComponent(b.dataset.deleteKey), {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + getToken() },
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      toast('Deleted', 'success');
      STATE.items = STATE.items.filter(m => m.key !== b.dataset.deleteKey);
      STATE.total--;
      renderGrid();
    } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
  }));
  document.getElementById('loadMoreBtn')?.addEventListener('click', () => loadMedia(false));
}

function tileHtml(m) {
  const isImage = (m.mime_type || '').startsWith('image/');
  const isVideo = (m.mime_type || '').startsWith('video/');
  const preview = isImage && m.url
    ? `<img src="${escAttr(m.url)}" alt="${escAttr(m.alt_text || m.filename)}" loading="lazy">`
    : isVideo
      ? `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--mute);font-family:var(--mono);font-size:11px">VIDEO</div>`
      : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--mute);font-family:var(--mono);font-size:11px">${escHtml((m.mime_type || 'file').split('/')[1] || 'file').toUpperCase()}</div>`;
  return `<div class="tile">
    ${preview}
    <div class="meta">
      <span class="meta-name">${escHtml(m.filename || m.key)}</span>
      <span class="meta-sub">${humanSize(m.size_bytes || 0)}</span>
    </div>
    <div class="actions">
      <button data-copy-url="${escAttr(m.url || '')}" title="Copy CDN URL">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11V3a1 1 0 011-1h8"/></svg>
      </button>
      <button class="danger" data-delete-key="${escAttr(m.key)}" title="Delete">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 4h10M6 4V2.5h4V4M5 4l.5 9.5h5L11 4"/></svg>
      </button>
    </div>
    <div class="copied">URL copied</div>
  </div>`;
}

function humanSize(n) {
  if (!n) return '0 B';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
}
function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return escHtml(s); }
</script>

</body>
</html>
