        if (clearBtn) clearBtn.style.display = query ? 'block' : 'none';
        if (!query) {
          sidebarAC.classList.add('hidden');
          renderGrid('gridDesktop'); updateResultCount('gridDesktop'); return;
        }
        const source = map.getSource('projects');
        if (!source?._data) return;
        buildAutocomplete(query, source._data.features, sidebarAC, (f, isCity) => {
          sidebarAC.classList.add('hidden');
          if (isCity === 'geo') {
            searchBar.value = f._geoLabel;
            if (clearBtn) clearBtn.style.display = 'flex';
            const gf = f._geoFeature;
            const g = document.getElementById('gridDesktop');
            if (g) g.innerHTML = '<div class="grid-loading"><div class="grid-loading-spinner"></div><div class="grid-loading-text">Loading...</div></div>';
            const allFeats = window.allProjectFeatures || source._data.features;
            flyToGeoFeature(gf);
            map.once('moveend', () => { renderFilteredGrid('gridDesktop', allFeats); });
            return;
          }
          searchBar.value = isCity ? f._cityLabel : f.properties.title;
          if (clearBtn) clearBtn.style.display = 'flex';
          sidebarAC.classList.add('hidden');
          if (isCity) {
            const allFeats = window.allProjectFeatures || source._data.features;
            const cityFeatures = allFeats.filter(p => p.properties.city === f._cityValue);
            const firstInCity = cityFeatures[0];
            if (firstInCity) {
              // Show spinner during flyTo
              const g = document.getElementById('gridDesktop');
              if (g) g.innerHTML = '<div class="grid-loading"><div class="grid-loading-spinner"></div><div class="grid-loading-text">Loading...</div></div>';
              window._mapFlyingTo = true; map.flyTo({ center: firstInCity.geometry.coordinates, zoom: 11 });
              map.once('moveend', () => {
                renderFilteredGrid('gridDesktop', allFeats);
              });
            } else {
              renderFilteredGrid('gridDesktop', allFeats);
            }
          } else {
            const projectMatchesFilters =
              (activeFilters.desktop.type === 'all' || f._projectTypes?.includes(activeFilters.desktop.type.toLowerCase())) &&
              (activeFilters.desktop.status === 'all' || f.properties.delivery === activeFilters.desktop.status);
            if (!projectMatchesFilters) clearAllFilters('desktop');
            // Show spinner, fly to project, re-render tiles on moveend
            const g = document.getElementById('gridDesktop');
            if (g) g.innerHTML = '<div class="grid-loading"><div class="grid-loading-spinner"></div><div class="grid-loading-text">Loading...</div></div>';
            const allFeats = window.allProjectFeatures || source._data.features;
            showPopup(f);
            map.once('moveend', () => { renderFilteredGrid('gridDesktop', allFeats); });
          }
        });
        const ql = query.toLowerCase();
        const filtered = (window.allProjectFeatures || source._data.features)
          .filter(f => f.properties.title.toLowerCase().includes(ql) || f.properties.city.toLowerCase().includes(ql));
        renderFilteredGrid('gridDesktop', filtered);
      });
      searchBar.addEventListener('blur', () => { setTimeout(() => sidebarAC.classList.add('hidden'), 150); });
      searchBar.addEventListener('focus', (e) => { if (e.target.value.trim()) e.target.dispatchEvent(new Event('input')); });
    }

    // ─── MOBILE DRAWER ────────────────────────────────────────────────────────
    function setupMobileDrawer() {
      const drawer = document.getElementById('mobileDrawer');
      const handle = document.getElementById('mobileDrawerHandle');
      const content = document.getElementById('mobileDrawerContent');
      const mapBtn = document.getElementById('mapReturnButton');
      if (!drawer || !handle || !content || !mapBtn) return;

      let startY = 0, currentY = 0, startTransform = 0, isDragging = false, isExpanded = false;
      const getViewportHeight = () => {
        try {
          const h = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--app-height'));
          return isNaN(h) ? window.innerHeight - 50 : h - 50;
        } catch { return window.innerHeight - 50; }
      };

      function collapseDrawer() {
        isExpanded = false;
        drawer.classList.remove('expanded');
        drawer.style.transform = 'translateY(100%)';
        mapBtn.classList.remove('visible');
        content.scrollTop = 0;
        // Reset header to transparent when drawer closes
        const mobileHeader = content.querySelector('.mobile-header');
        if (mobileHeader) mobileHeader.classList.remove('scrolled');
        if (mobileHandle) mobileHandle.classList.remove('scrolled');
        drawer.classList.remove('scrolled-drawer');
        window.mobileScrollObserver?.disconnect();
        window.mobileScrollLoading = false;
      }

      // Toggle header opacity based on scroll position
      const mobileHeader = content.querySelector('.mobile-header');
      const mobileHandle = document.getElementById('mobileDrawerHandle');
      content.addEventListener('scroll', () => {
        const scrolled = content.scrollTop > 10;
        if (mobileHeader) mobileHeader.classList.toggle('scrolled', scrolled);
        if (mobileHandle) mobileHandle.classList.toggle('scrolled', scrolled);
        drawer.classList.toggle('scrolled-drawer', scrolled);
      }, { passive: true });

      function expandDrawer() {
        isExpanded = true;
        drawer.classList.add('expanded');
        drawer.style.transform = 'translateY(0)';
        mapBtn.classList.add('visible');
        content.style.overflow = 'auto';
        content.style.overflowY = 'scroll';
        content.style.webkitOverflowScrolling = 'touch';
        content.style.pointerEvents = 'auto';
        content.style.touchAction = 'auto';
        window.mobileLoadedCount = 12; window.mobileScrollLoading = false;
        const mobileMapBtn = document.getElementById('mobileMapButton');
        if (mobileMapBtn) {
          mobileMapBtn.classList.remove('ready');
          mobileMapBtn.style.opacity = '0.5';
          setTimeout(() => { mobileMapBtn.classList.add('ready'); mobileMapBtn.style.opacity = '1.0'; }, 150);
        }

        // Restore search results if search was active, using stored features for reliability
        const mobileSearch = document.getElementById('mobileSearchBar');
        const searchQuery = mobileSearch ? mobileSearch.value.trim() : '';
        if (searchQuery) {
          if (window.mobileSearchFeatures) {
            // Use the exactly stored result set — most reliable
            renderFilteredGrid('gridMobile', window.mobileSearchFeatures);
          } else if (window.allProjectFeatures) {
            const ql = searchQuery.toLowerCase();
            const filtered = window.allProjectFeatures.filter(f =>
              f.properties.title.toLowerCase().includes(ql) ||
              f.properties.city.toLowerCase().includes(ql)
            );
            renderFilteredGrid('gridMobile', filtered);
          }
        } else {
          renderGrid('gridMobile');
        }
        // Render pills after grid pointer-events are restored (100ms delay in renderGrid)
        setTimeout(() => {
          renderPills('mobile'); updateFilterBadge('mobile');
        }, 150);
      }

      window.mobileDrawerCollapse = collapseDrawer;
      window.mobileDrawerExpand   = expandDrawer;

      content.addEventListener('touchstart', (e) => {
        if (!isExpanded) { try { e.preventDefault(); e.stopPropagation(); } catch {} return false; }
      }, { passive: false });

      handle.addEventListener('touchstart', (e) => {
        isDragging = true; startY = e.touches[0].clientY; drawer.style.transition = 'none';
        try {
          const transform = window.getComputedStyle(drawer).transform;
          const vh = getViewportHeight();
          startTransform = (transform && transform !== 'none') ? (new DOMMatrix(transform).m42 || (isExpanded ? 0 : vh)) : (isExpanded ? 0 : vh);
        } catch { startTransform = isExpanded ? 0 : getViewportHeight(); }
      }, { passive: true });

      handle.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        try { e.preventDefault(); } catch {}
        if (!e.touches?.[0]) return;
        currentY = e.touches[0].clientY;
        const vh = getViewportHeight();
        drawer.style.transform = `translateY(${Math.max(0, Math.min(startTransform + currentY - startY, vh))}px)`;
      }, { passive: false });

      handle.addEventListener('touchend', () => {
        if (!isDragging) return; isDragging = false;
        const vh = getViewportHeight();
        drawer.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1)';
        (startTransform + currentY - startY < vh * 0.5 || (!isExpanded && currentY - startY < -30)) ? expandDrawer() : collapseDrawer();
      }, { passive: true });

      handle.addEventListener('click', (e) => {
        e.stopPropagation();
        drawer.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1)';
        isExpanded ? collapseDrawer() : expandDrawer();
      });

      // Tiles button
      const mobileTilesBtn = document.getElementById('mobileTilesButton');
      if (mobileTilesBtn && isMobile) {
        mobileTilesBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const tryOpen = () => {
            if (map.getSource('projects')?._data) {
              expandDrawer();
              // Only focus search if no active query — prevents re-firing input event
              // which would wipe city/search filtered results
              setTimeout(() => {
                const mobileSearch = document.getElementById('mobileSearchBar');
                if (mobileSearch && !mobileSearch.value.trim()) mobileSearch.focus();
              }, 350);
              gtag('event', 'view_change', { 'view_type': 'tiles', 'action': 'open_drawer', 'device_type': 'mobile' });
            } else {
              let attempts = 0;
              const interval = setInterval(() => {
                attempts++;
                if (map.getSource('projects')?._data) { clearInterval(interval); expandDrawer(); }
                else if (attempts >= 50) clearInterval(interval);
              }, 100);
            }
          };
          tryOpen();
        });
      }

      const mobileMapBtn = document.getElementById('mobileMapButton');
      if (mobileMapBtn) {
        mobileMapBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (window.gridRendering?.['gridMobile']) return;
          drawer.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1)';
          collapseDrawer();
          gtag('event', 'view_change', { 'view_type': 'map', 'action': 'close_drawer', 'device_type': 'mobile' });
        });
      }
      mapBtn.addEventListener('click', (e) => { e.stopPropagation(); collapseDrawer(); });
    }

    map.on('load', () => {

          type: 'vector',

        });

      // Try adding rail layer immediately — streets-v8 'road' source-layer

      const railClasses = ['major_rail','minor_rail'];
      if (!map.getLayer('current-transit-rail')) {
        try {
          map.addLayer({
            id: 'current-transit-rail',
            type: 'line',
            source: 'mbstreets',

            filter: ['in', ['get', 'class'], ['literal', railClasses]],
            layout: { 'line-join': 'round', 'line-cap': 'round', visibility: 'none' },
            paint: {
              'line-color': '#FF6B00',
              'line-width': ['interpolate', ['linear'], ['zoom'], 0, 0.3, 4, 0.5, 8, 1, 12, 1.5, 16, 2],
              'line-opacity': 0.85
            }
          }, 'brightline-existing');
          window._transitLayerIds = ['current-transit-rail'];
          window._workingTransitSource = 'mbstreets';
        } catch(e) {
          // Source not ready yet — will be added when user toggles
          window._workingTransitSource = null;
        }
      }
    });

    // ─── INITIALIZE DATA ─────────────────────────────────────────────────────
    function initializeData() {
      Papa.parse('https://docs.google.com/spreadsheets/d/1qwU7ykIDUrtPlIQu-qk2FIJwiz-WWg5caq02ja30sgM/export?format=csv&gid=0', {
        download: true, header: true, complete: results => {
          const rows = results.data.filter(r => r.Latitude && r.Longitude);
          const features = rows.map(p => {
            const types = p.ProjectType
              ? p.ProjectType.split(',').map(t => t.trim().toLowerCase()).filter(t => t)
              : [];
            return {
              type: 'Feature',
              geometry: { type: 'Point', coordinates: [+p.Longitude, +p.Latitude] },
              properties: {
                title: p.Title, city: p.City, description: p.Description,
                delivery: p.Delivery, image: p.ImageURL, website: p.OfficialWebsite,
                projectType: p.ProjectType,
                // Store as plain comma string — arrays get mangled by Mapbox serialization
                projectTypesStr: types.join(','),
                // New fields
                developer: p.Developer || '',
                architect: p.Architect || '',
                deliveryDate: p.DeliveryDate || '',
                descriptionLong: p.DescriptionLong || '',
                image2: p.Image2 || '',
                image3: p.Image3 || '',
                image4: p.Image4 || '',
                image5: p.Image5 || '',
                // Keep JS array on the feature object itself for grid filtering (not used by Mapbox)
                featured: p.Featured?.trim().toLowerCase() === 'featured'
              },
              // Attach types array directly on feature (accessible in JS, not Mapbox)
              _projectTypes: types
            };
          });

          // Master list — never mutated, used to restore pins on clear
          window.allProjectFeatures = features;

    
          // projectTypes lives only on _projectTypes (JS array, not in GeoJSON properties)
          // renderGrid reads f.properties.projectTypes — patch it here for grid use only
          features.forEach(f => { f.properties.projectTypes = f._projectTypes; });

          // Build clean GeoJSON for Mapbox — strip the JS-only array from properties
          const geoFeatures = features.map(f => ({
            type: 'Feature',
            geometry: f.geometry,
            properties: Object.assign({}, f.properties, { projectTypes: undefined })
          }));

          const projectGeo = { type: 'FeatureCollection', features: geoFeatures };
          map.addSource('projects', { type:'geojson', data:projectGeo, cluster:true, clusterMaxZoom:16, clusterRadius:35 });
          map.addLayer({ id:'clusters', type:'circle', source:'projects', filter:['has','point_count'], paint:{'circle-color':'#1FDF67','circle-radius':['step',['get','point_count'],20,100,30,750,40],'circle-stroke-width':2,'circle-stroke-color':'#fff'} });
          map.addLayer({ id:'cluster-count', type:'symbol', source:'projects', filter:['has','point_count'], layout:{'text-field':'{point_count_abbreviated}','text-size':12}, paint:{'text-color':'#ffffff'} });
          map.addLayer({ id:'unclustered-point', type:'circle', source:'projects', filter:['!',['has','point_count']], paint:{'circle-color':'#1FDF67','circle-radius':8,'circle-stroke-width':2,'circle-stroke-color':'#fff'} });
          map.addLayer({ id:'featured-glow', type:'circle', source:'projects', filter:['all',['!',['has','point_count']],['==',['get','featured'],true]], paint:{'circle-color':'transparent','circle-radius':16,'circle-blur':0.8,'circle-stroke-width':3,'circle-stroke-color':'#FFD300','circle-stroke-opacity':0.6} }, 'unclustered-point');
    
          map.on('click','clusters',e=>{if(stationPopup){stationPopup.remove();stationPopup=null;}const f=e.features[0];map.getSource('projects').getClusterExpansionZoom(f.properties.cluster_id,(err,z)=>map.flyTo({center:f.geometry.coordinates,zoom:z}));});
          map.on('click','unclustered-point',e=>{
            if(stationPopup){stationPopup.remove();stationPopup=null;}
            const raw = e.features[0];
            // Look up the full feature from master list (Mapbox serializes away JS arrays)
            const f = window.allProjectFeatures
              ? (window.allProjectFeatures.find(p => p.properties.title === raw.properties.title) || raw)
              : raw;
            gtag('event','project_click',{'project_name':f.properties.title,'project_city':f.properties.city,'project_featured':f.properties.featured||false,'click_source':'map_pin','device_type':isMobile?'mobile':'desktop'});
            showPopup(f);
          });

          updateDesktopSegmentLabels();
          updateMobileSegmentLabels();
          setupMobileDrawer();

          // Re-render once map is fully idle so in-view bounds are accurate
          map.once('idle', () => {
            renderGrid('gridDesktop');
            renderGrid('gridMobile');
            updateResultCount('gridDesktop');
            updateResultCount('gridMobile');
            // Handle deep-link URL after everything is ready
            handleDeepLink();
          });

          // ── Build city→state map via Mapbox reverse geocoding ──────────────
          // One API call per unique city using a representative coordinate.
          // Results cached in window.cityStateMap for autocomplete labels.
          (async () => {
            window.cityStateMap = window.cityStateMap || {};
            const token = mapboxgl.accessToken;
            // Collect one coordinate per city not yet cached
            const cityCoords = {};
            allProjectFeatures.forEach(f => {
              const city = f.properties.city;
              if (city && !window.cityStateMap[city] && !cityCoords[city]) {
                cityCoords[city] = f.geometry.coordinates; // [lng, lat]
              }
            });
            const entries = Object.entries(cityCoords);
            if (!entries.length) return;
            // Batch with a small delay between calls to avoid rate limits
            for (const [city, [lng, lat]] of entries) {
              try {
                const res = await fetch(
                  `https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?types=region&access_token=${token}`
                );
                const data = await res.json();
                const region = data.features?.[0];
                if (region) {
                  // Use short code like "FL", "NY", "TX" — strip country prefix
                  const code = region.properties?.short_code || '';
                  const state = code.replace(/^US-/i, '').toUpperCase();
                  window.cityStateMap[city] = state || region.text || '';
                }
              } catch (e) {
                // Silently skip on error — label will just show city name
              }
              await new Promise(r => setTimeout(r, 50)); // 50ms between calls
            }
          })();

          let updateTimeout;
          map.on('moveend', () => {
            const wasFlyingTo = window._mapFlyingTo;
            window._mapFlyingTo = false;
            if (wasFlyingTo) return; // programmatic flyTo — handled by map.once, skip debounce
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
              const dsort = document.getElementById('sortSelectDesktop')?.value;
              const msort = document.getElementById('sortSelectMobile')?.value;
              updateResultCount('gridDesktop');
              updateResultCount('gridMobile');
              if (!isMobile) {
                const sidebar = document.getElementById('desktopSidebar');
                const desktopSearch = document.getElementById('sidebarSearchBar');
                const hasActiveSearch = desktopSearch && desktopSearch.value.trim().length > 0;
                if (sidebar?.classList.contains('open') && dsort === 'default') {
                  if (hasActiveSearch && window.allProjectFeatures) {
                    renderFilteredGrid('gridDesktop', window.allProjectFeatures);
                  } else {
                    renderGrid('gridDesktop');
                  }
                }
              }
              if (isMobile) {
                const mobileSearch = document.getElementById('mobileSearchBar');
                const hasActiveSearch = mobileSearch && mobileSearch.value.trim().length > 0;
                // Always update mobile grid on move (not just when expanded)
                window.mobileLoadedCount = 12;
                if (hasActiveSearch && (window.mobileSearchFeatures || window.allProjectFeatures)) {
                  renderFilteredGrid('gridMobile', window.mobileSearchFeatures || window.allProjectFeatures);
                } else {
                  renderGrid('gridMobile');
                }
              }
            }, 400);
          });
          map.on('zoomend', () => {
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
              updateResultCount('gridDesktop');
              updateResultCount('gridMobile');
              if (!isMobile && document.getElementById('desktopSidebar')?.classList.contains('open')) renderGrid('gridDesktop');
            }, 300);
          });
        }
      });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // TWO-TIER PAYWALL
    //   • Anonymous users: 5 clicks → email signup wall
    //   • Free signed-in users: 30 clicks → subscription paywall ($9/mo or $90/yr)
    //   • Paid subscribers: unlimited
    // Click count for signed-in users persists on Memberstack member record,
    // so closing tabs / opening incognito doesn't reset it.
    // ═══════════════════════════════════════════════════════════════════════
    (function() {
      const ANON_CLICK_LIMIT = 5;        // before email signup wall
      const FREE_MEMBER_CLICK_LIMIT = 12; // 5 anon + 7 after signup, then subscription paywall
      const STORAGE_KEY = 'mot_click_count';
      const PRICE_ID_MONTHLY = 'prc_monthly-86u0uyc';
      const PRICE_ID_ANNUAL  = 'prc_annual-9i2e0eab';
      const MEMBER_FIELD = 'clickCount';  // Memberstack custom field name

      let isPaidMember = false;
      let isSignedIn = false;
      let memberClickCount = 0;  // mirrors the value on the member record
      let memberstackReady = false;

      // ─── Anonymous click counter (browser-side) ───────────────────────────
      function getAnonClicks() {
        return parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
      }
      function setAnonClicks(n) {
        localStorage.setItem(STORAGE_KEY, String(n));
      }
      function clearAnonClicks() {
        localStorage.removeItem(STORAGE_KEY);
      }

      // ─── Member click counter (server-side via Memberstack) ───────────────
      async function loadMemberClickCount() {
        if (!window.$memberstackDom) return 0;
        try {
          // Custom fields live under member.customFields
          const result = await window.$memberstackDom.getCurrentMember();
          const member = result?.data;
          if (!member) return 0;
          const cf = member.customFields || {};
          // Memberstack normalizes Number fields to numbers, but be defensive
          const raw = cf[MEMBER_FIELD];
          return parseInt(raw || 0, 10) || 0;
        } catch (e) {
          console.warn('[Paywall] Could not read member click count:', e);
          return 0;
        }
      }
      async function saveMemberClickCount(n) {
        if (!window.$memberstackDom) return;
        try {
          await window.$memberstackDom.updateMember({
            customFields: { [MEMBER_FIELD]: n }
          });
        } catch (e) {
          console.warn('[Paywall] Could not save member click count:', e);
        }
      }

      // ─── Wait for Memberstack DOM package to load ─────────────────────────
      function waitForMemberstack(callback) {
        if (window.$memberstackDom) { callback(window.$memberstackDom); return; }
        let attempts = 0;
        const interval = setInterval(() => {
          attempts++;
          if (window.$memberstackDom) {
            clearInterval(interval);
            callback(window.$memberstackDom);
          } else if (attempts > 50) {
            clearInterval(interval);
            console.warn('[Paywall] Memberstack failed to load — paywall disabled');
          }
        }, 100);
      }

      // ─── Refresh authentication + paid status from Memberstack ────────────
      async function refreshMemberStatus() {
        if (!window.$memberstackDom) return;
        try {
          const result = await window.$memberstackDom.getCurrentMember();
          const member = result?.data;

          if (!member) {
            isSignedIn = false;
            isPaidMember = false;
            memberClickCount = 0;
            updateAuthHeaderUI(null);
            return;
          }

          isSignedIn = true;
          const plans = member.planConnections || [];
          isPaidMember = plans.some(p => p.active === true || p.status === 'ACTIVE');

          // Load member's persisted click count from custom fields
          const cf = member.customFields || {};
          memberClickCount = parseInt(cf[MEMBER_FIELD] || 0, 10) || 0;

          // If anon localStorage count is higher (just signed up after burning anon clicks),
          // migrate it onto the member record so they don't get a free reset.
          const anonCount = getAnonClicks();
          if (!isPaidMember && anonCount > memberClickCount) {
            memberClickCount = anonCount;
            await saveMemberClickCount(memberClickCount);
          }
          // Anonymous counter is no longer needed — they're signed in
          clearAnonClicks();

          if (isPaidMember) {
            // Paid → reset their member click count too (so if they cancel later,
            // they get the full 30 free clicks again)
            if (memberClickCount !== 0) {
              memberClickCount = 0;
              await saveMemberClickCount(0);
            }
            hideAllPaywalls();
          }

          // Load favorites whenever we have an authenticated member
          if (isSignedIn) {
            await loadFavoritesFromMember();
          } else {
            window._favorites = new Set();
            syncFavoritesUI();
          }

          updateAuthHeaderUI(member);
        } catch (e) {
          console.warn('[Paywall] refreshMemberStatus error:', e);
        }
      }

      async function openSignup() {
        if (!window.$memberstackDom) return;
        try {
          if (window.gtag) gtag('event', 'signup_modal_opened');
          await window.$memberstackDom.openModal('SIGNUP');
          // After modal closes, refresh status. If they signed up successfully,
          // refreshMemberStatus will migrate their anon click count and hide the wall.
          await refreshMemberStatus();

            hideAllPaywalls();

          console.error('[Paywall] Signup error:', e);

        if (!window.$memberstackDom) return;
        try {
          await window.$memberstackDom.openModal('LOGIN');
          await refreshMemberStatus();
          if (isPaidMember || (isSignedIn && memberClickCount < FREE_MEMBER_CLICK_LIMIT)) {
            hideAllPaywalls();

      async function startCheckout(priceId) {
        if (!window.$memberstackDom) {
          alert('Payment system loading — please try again in a moment.');
          return;
        }
        try {
          if (window.gtag) gtag('event', 'paywall_subscribe_clicked', { 'price_id': priceId });
          const current = await window.$memberstackDom.getCurrentMember();
          const member = current?.data;

          if (member) {
            // Logged-in user → straight to Stripe Checkout
            await window.$memberstackDom.purchasePlansWithCheckout({
              priceId: priceId,
              cancelUrl: window.location.href,
              successUrl: window.location.href.split('?')[0] + '?subscribed=1'
            });
          } else {
            // Not signed in → signup modal with plan attached, auto-routes to checkout after
            await window.$memberstackDom.openModal('SIGNUP', {
              signup: { plans: [priceId] }
            });
            await refreshMemberStatus();
          }
        } catch (e) {
          console.error('[Paywall] Checkout error:', e);
          if (e?.code !== 'modal-closed' && e?.message !== 'Modal closed') {
            alert('Could not start checkout: ' + (e.message || e.code || 'unknown error'));
          }
        }
      }

      // ─── Favorites store (Memberstack metaData) ───────────────────────────
      // Stored as: member.metaData.favorites = ["marina-village", "water-street", ...]
      // Cache mirrors the array as a Set for O(1) lookups + instant UI updates.
      window._favorites = new Set();

      function projectSlugify(title) {
        // Must produce the SAME slug as Python's slugify() in generate_pages.py
        // so favorites toggled from project pages match favorites toggled from the map.
        // Python: lower → strip chars not in [a-z0-9\s-] → collapse [\s-]+ → trim '-'
        return (title || '').toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '')
          .replace(/[\s-]+/g, '-')
          .replace(/^-|-$/g, '');
      }
      window.projectSlugify = projectSlugify;

      async function loadFavoritesFromMember() {
        if (!window.$memberstackDom) return;
        try {
          const result = await window.$memberstackDom.getMemberJSON();
          const json = result?.data || {};
          const arr = Array.isArray(json.favorites) ? json.favorites : [];
          window._favorites = new Set(arr.filter(s => typeof s === 'string'));
          syncFavoritesUI();
        } catch (e) { console.warn('[Favorites] load error:', e); }
      }

      async function saveFavoritesToMember() {
        if (!window.$memberstackDom) return;
        try {
          // updateMemberJSON merges with existing JSON
          await window.$memberstackDom.updateMemberJSON({
            json: { favorites: Array.from(window._favorites) }
          });
        } catch (e) { console.warn('[Favorites] save error:', e); }
      }

      // Public API: toggles a project favorite. Returns new state or false if blocked.
      // - Anonymous → opens signup wall
      // - Free signed-in → opens subscription paywall
      // - Paid → toggles + persists
      window.toggleFavorite = function(projectTitle, btnEl) {
        const slug = projectSlugify(projectTitle);
        if (!slug) return false;

        if (!isPaidMember) {
          // Show appropriate paywall — favorites are paid-only
          if (!isSignedIn) {
            showSignupWall();
          } else {
            showSubscriptionPaywall();
          }
          if (window.gtag) gtag('event', 'favorite_blocked', { 'project_slug': slug, 'reason': isSignedIn ? 'free_member' : 'anonymous' });
          return false;
        }

        const isFav = window._favorites.has(slug);
        if (isFav) {
          window._favorites.delete(slug);
        } else {
          window._favorites.add(slug);
        }
        // Update all UI representations of this project
        syncFavoritesUI();
        // Persist async (don't block click)
        saveFavoritesToMember();
        if (window.gtag) gtag('event', isFav ? 'favorite_removed' : 'favorite_added', { 'project_slug': slug });
        return !isFav;
      };

      // Public: is a project favorited?
      window.isFavorited = function(projectTitle) {
        return window._favorites.has(projectSlugify(projectTitle));
      };

      // Update all visible favorite buttons to reflect current state
      function syncFavoritesUI() {
        document.querySelectorAll('[data-fav-slug]').forEach(el => {
          const slug = el.getAttribute('data-fav-slug');
          el.classList.toggle('favorited', window._favorites.has(slug));
        });
      }
      window.syncFavoritesUI = syncFavoritesUI;

      // ─── Public API: gate every project interaction ───────────────────────
      // Returns true if interaction is allowed, false if blocked
      window.paywallCheck = function() {
        // Paid → unlimited
        if (isPaidMember) return true;

        if (!isSignedIn) {
          // Anonymous user → use localStorage counter
          const count = getAnonClicks();
          if (count >= ANON_CLICK_LIMIT) {
            showSignupWall();
            return false;
          }
          setAnonClicks(count + 1);
          return true;
        }

        // Signed-in free user → use member-record counter
        if (memberClickCount >= FREE_MEMBER_CLICK_LIMIT) {
          showSubscriptionPaywall();
          return false;
        }
        memberClickCount += 1;
        // Async save (don't await — let the click proceed instantly)
        saveMemberClickCount(memberClickCount);
        return true;
      };

      // ─── Init ─────────────────────────────────────────────────────────────
      waitForMemberstack(async (ms) => {
        memberstackReady = true;
        await refreshMemberStatus();

        // Listen for any auth state change (login, signup, logout).
        // CRITICAL: keep this callback synchronous and defer work to a microtask.
        // Memberstack's internal dispatcher can mishandle async callbacks (manifests
        // as a "c(...) is not a function" toast), so we schedule and return immediately.
        if (typeof ms.onAuthChange === 'function') {
          ms.onAuthChange((member) => {
            setTimeout(async () => {
              if (member) {
                try { await ms.hideModal(); } catch (e) { /* modal might not be open */ }
              }
              await refreshMemberStatus();
              if (isPaidMember || (isSignedIn && memberClickCount < FREE_MEMBER_CLICK_LIMIT)) {
                hideAllPaywalls();
              }
            }, 0);
          });
        }

        // If returning from successful checkout, refresh after Stripe webhook lands
        if (new URLSearchParams(window.location.search).get('subscribed') === '1') {
          setTimeout(refreshMemberStatus, 1500);
          history.replaceState({}, '', window.location.pathname + window.location.search.replace(/[?&]subscribed=1/, ''));
        }
      });

      // Build the auth UI immediately (will say "Sign in" until member status loads)
      updateAuthHeaderUI(null);
    })();
  </script>
</body>
</html>
