        [51.5500, 33.9500], // Kashan area
        [51.6000, 33.4000], // Central Iran plains
        [51.6757, 32.6546], // Esfahan
      ], '#FFD300');

      // ── Iraq: National HSR (Baghdad → Mosul + Baghdad → Basra) ───────────────
      addRailLine('iraq-hsr-north', [
        [44.3661, 33.3152], // Baghdad
        [43.9800, 33.9000], // Taji
        [43.8000, 34.3000], // Balad
        [43.6800, 34.4500], // Samarra
        [43.5000, 34.8500], // Tikrit
        [43.3000, 35.4000], // Baiji
        [43.1300, 36.3400], // Mosul
      ], '#FFD300');
      addRailLine('iraq-hsr-south', [
        [44.3661, 33.3152], // Baghdad
        [44.5000, 32.7000], // Mahmudiyah
        [45.0000, 32.4000], // Kut approach
        [45.8200, 32.5000], // Kut
        [46.5000, 31.7000], // Amara
        [47.1000, 31.1000], // Basra approaches
        [47.8309, 30.5081], // Basra
      ], '#FFD300');

      // ── UK: HS2 (London → Birmingham → Manchester) ────────────────────────────
      addRailLine('hs2', [
        [-0.1276, 51.5074], // London Euston
        [-0.2500, 51.5700], // Old Oak Common
        [-0.4800, 51.6800], // Hertfordshire
        [-0.7500, 51.8200], // Chilterns tunnel
        [-0.9500, 51.9500], // North Chilterns
        [-1.1500, 52.0800], // Northamptonshire
        [-1.4000, 52.2300], // Approaching Birmingham
        [-1.5000, 52.4000], // Birmingham Interchange
        [-1.8904, 52.4862], // Birmingham Curzon Street
        [-2.0700, 52.6500], // Lichfield
        [-2.1000, 52.8500], // Staffordshire
        [-2.2000, 53.0500], // Crewe area
        [-2.2280, 53.4808], // Manchester Piccadilly
      ], '#FFD300');

      // ── Serbia–Hungary: Belgrade–Budapest ─────────────────────────────────────
      addRailLine('belgrade-budapest', [
        [20.4612, 44.8048], // Belgrade
        [19.9500, 45.0500], // NW of Belgrade
        [19.8317, 45.2671], // Novi Sad
        [19.6600, 45.8000], // Subotica
        [19.6700, 46.0800], // Kelebia border
        [19.5500, 46.3000], // Southern Hungary
        [19.1270, 46.5790], // Kiskunhalas
        [19.0500, 46.9000], // Kecskemét area
        [19.0500, 47.2000], // Central Hungary
        [19.0500, 47.4984], // Budapest Keleti
      ], '#FFD300');

      // ── Rail Baltica (Tallinn → Pärnu → Riga → Panevėžys → Kaunas → Białystok → Warsaw)
      addRailLine('rail-baltica', [
        [24.7536, 59.4370], // Tallinn Ülemiste
        [24.6500, 59.1500], // South of Tallinn
        [24.5200, 58.8500], // Pärnu approach
        [24.5000, 58.3800], // Pärnu
        [24.4000, 57.9000], // Latvia border
        [24.2500, 57.5500], // South Latvia
        [24.1050, 57.1590], // Riga
        [24.0800, 56.9500], // Salaspils
        [24.3500, 56.6000], // Heading SE Latvia
        [25.0000, 56.3000], // Latvia/Lithuania border
        [24.9000, 55.9000], // North Lithuania
        [24.8500, 55.7300], // Panevėžys
        [24.1000, 55.2000], // Heading south
        [23.9200, 54.9000], // Kaunas approach
        [23.9500, 54.6872], // Kaunas
        [23.5500, 54.4000], // South Kaunas
        [23.0500, 54.0000], // Lithuanian/Polish border
        [22.8000, 53.7500], // Suwałki area
        [22.3000, 53.3500], // Augustów
        [23.1688, 53.1325], // Białystok
        [22.5000, 52.5000], // SW toward Warsaw
        [21.1330, 52.2297], // Warsaw Centralna
      ], '#FFD300');

      // ── GCC Gulf Railway (Kuwait → Saudi → Qatar → UAE → Oman) ───────────────
      // ── GCC Railway — Kuwait → coast → Dammam → east Saudi coast → UAE ────────
      // ── South Africa: Pretoria–Musina HSR (N1 corridor) ────────────────────────
      // Based on reference map: Pretoria → Hammanskraal → Bela-Bela → Mokopane
      // → Polokwane → Louis Trichardt → Musina (Zimbabwe border)
      // Route stays near 28.3-29.0°E, fairly straight N then NE
      addRailLine('sa-hsr', [
        [28.1900, -25.7500], // Pretoria
        [28.2100, -25.4500], // Centurion/Hammanskraal approach
        [28.2500, -25.1500], // Hammanskraal
        [28.2900, -24.8800], // Bela-Bela
        [28.4000, -24.5500], // Modimolle
        [28.6500, -24.2000], // Mokopane
        [28.9500, -23.9500], // Between Mokopane and Polokwane
        [29.4486, -23.9060], // Polokwane
        [29.9000, -23.0500], // Louis Trichardt approach
        [29.9200, -23.0400], // Louis Trichardt
        [30.0300, -22.3500], // Heading to Musina
        [30.0500, -22.3600], // Musina (Zimbabwe border)
      ], '#FFD300');
      // ── 4. Cascadia High-Speed Rail (Portland → Seattle → Vancouver BC) ───────
      addRailLine('cascadia-hsr', [
        [-122.6784, 45.5231], // Portland Union Station
        [-122.6732, 45.6280], // Vancouver WA
        [-122.9010, 46.1320], // Kelso/Longview area
        [-122.9050, 46.5850], // Centralia / Chehalis
        [-122.4302, 47.2529], // Tacoma
        [-122.3320, 47.6062], // Seattle King Street Station
        [-122.3400, 47.9590], // Everett
        [-122.3580, 48.7510], // Bellingham
        [-122.5010, 49.0003], // US/Canada border crossing
        [-123.1130, 49.2827], // Vancouver BC Pacific Central
      ], '#FFD300');

      const stationFeatures = stations.map(s => ({ type:'Feature', properties:{ name:s.name, color: s.color || '#FFD300' }, geometry:{ type:'Point', coordinates:s.coords } }));
      const stationGeo = { type:'FeatureCollection', features:stationFeatures };
      if (!map.getSource('stations')) {
        map.addSource('stations', { type:'geojson', data:stationGeo });
      } else {
        map.getSource('stations').setData(stationGeo);
      }
      if (!map.getLayer('station-dots'))  map.addLayer({ id:'station-dots',  type:'circle', source:'stations', paint:{'circle-color':['get','color'],'circle-radius':['interpolate',['linear'],['zoom'],4,2,8,4,12,6,15,8],'circle-stroke-color':'#fff','circle-stroke-width':['interpolate',['linear'],['zoom'],4,0.5,10,1.5,14,2]} });
      if (!map.getLayer('station-hover')) map.addLayer({ id:'station-hover', type:'circle', source:'stations', paint:{'circle-color':'transparent','circle-radius':18,'circle-stroke-width':0} });

      // Station interactions (safe to re-register — Mapbox deduplicates on same handler ref,
      // but we guard with a flag to avoid stacking listeners on style switch)
      if (!window._mapListenersAdded) {
        window._mapListenersAdded = true;

        map.on('mouseenter','station-hover',(e)=>{
          // Don't show station tooltip if a cluster pin is rendered nearby
          const clusters = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
          if (clusters.length > 0) return;
          if(stationPopup)stationPopup.remove(); map.getCanvas().style.cursor='pointer';
          const f=e.features[0];
          stationPopup=new mapboxgl.Popup({closeButton:false,closeOnClick:false,offset:[0,-10],className:"station-tooltip"}).setLngLat(f.geometry.coordinates).setHTML(`<div style="background:rgba(20,20,20,0.9);color:#fff;padding:8px 12px;border-radius:6px;font-size:14px;font-weight:500;">${f.properties.name}</div>`).addTo(map);
        });
        map.on('mouseleave','station-hover',()=>{ map.getCanvas().style.cursor=''; if(stationPopup){stationPopup.remove();stationPopup=null;} });
        if(isMobile){ map.on('click','station-hover',(e)=>{ 
          const clusters = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
          if (clusters.length > 0) return;
          if(stationPopup)stationPopup.remove(); const f=e.features[0]; stationPopup=new mapboxgl.Popup({closeButton:false,closeOnClick:false,offset:[0,-10],className:"station-tooltip"}).setLngLat(f.geometry.coordinates).setHTML(`<div style="background:rgba(20,20,20,0.9);color:#fff;padding:8px 12px;border-radius:6px;font-size:14px;font-weight:500;">${f.properties.name}</div>`).addTo(map); }); }
        map.on('movestart',()=>{ if(stationPopup){stationPopup.remove();stationPopup=null;} });
        map.on('zoomstart',()=>{ if(stationPopup){stationPopup.remove();stationPopup=null;} });
        map.on('mouseenter','brightline-existing',()=>{ map.getCanvas().style.cursor='pointer'; });
        map.on('mouseleave','brightline-existing',()=>{ map.getCanvas().style.cursor=''; });
        map.on('mousemove','brightline-existing',()=>{});
        if(isMobile){ map.on('click','brightline-existing',(e)=>{ if(stationPopup){stationPopup.remove();stationPopup=null;} }); map.on('movestart',()=>{}); }
      }

      // Load project data — if already loaded, just restore from master list
      if (window.allProjectFeatures) {
        // Style switched — re-add projects source from cached data
        const geoFeatures = window.allProjectFeatures.map(f => ({
          type: 'Feature', geometry: f.geometry,
          properties: Object.assign({}, f.properties, { projectTypes: undefined })
        }));
        if (!map.getSource('projects')) {
          map.addSource('projects', { type:'geojson', data:{ type:'FeatureCollection', features:geoFeatures }, cluster:true, clusterMaxZoom:16, clusterRadius:35 });
        }
        if (!map.getLayer('clusters'))          map.addLayer({ id:'clusters',          type:'circle', source:'projects', filter:['has','point_count'], paint:{'circle-color':'#1FDF67','circle-radius':['step',['get','point_count'],20,100,30,750,40],'circle-stroke-width':2,'circle-stroke-color':'#fff'} });
        if (!map.getLayer('cluster-count'))     map.addLayer({ id:'cluster-count',     type:'symbol', source:'projects', filter:['has','point_count'], layout:{'text-field':'{point_count_abbreviated}','text-size':12}, paint:{'text-color':'#ffffff'} });
        if (!map.getLayer('unclustered-point')) map.addLayer({ id:'unclustered-point', type:'circle', source:'projects', filter:['!',['has','point_count']], paint:{'circle-color':'#1FDF67','circle-radius':8,'circle-stroke-width':2,'circle-stroke-color':'#fff'} });
        if (!map.getLayer('featured-glow'))     map.addLayer({ id:'featured-glow',     type:'circle', source:'projects', filter:['all',['!',['has','point_count']],['==',['get','featured'],true]], paint:{'circle-color':'transparent','circle-radius':16,'circle-blur':0.8,'circle-stroke-width':3,'circle-stroke-color':'#FFD300','circle-stroke-opacity':0.6} }, 'unclustered-point');
        // Re-apply any active filters
        updateMapPinFilters();
        renderGrid('gridDesktop');
        renderGrid('gridMobile');
        updateResultCount('gridDesktop');
        updateResultCount('gridMobile');
      } else {
        // First load — fetch from CSV
        initializeData();
      }
    }


    // ─── INITIALIZE DATA ─────────────────────────────────────────────────────
    function initializeData() {
      Papa.parse('https://docs.google.com/spreadsheets/d/1qwU7ykIDUrtPlIQu-qk2FIJwiz-WWg5caq02ja30sgM/export?format=csv&gid=0', {
        download: true, header: true, complete: results => {
          const rows = results.data.filter(r => r.Latitude && r.Longitude);
          const features = rows.map(p => {
            const types = p.ProjectType
              ? p.ProjectType.split(',').map(t => t.trim().toLowerCase()).filter(t => t)
              : [];
            return {
              type: 'Feature',
              geometry: { type: 'Point', coordinates: [+p.Longitude, +p.Latitude] },
              properties: {
                title: p.Title, city: p.City, description: p.Description,
                delivery: p.Delivery, image: p.ImageURL, website: p.OfficialWebsite,
                projectType: p.ProjectType,
                // Store as plain comma string — arrays get mangled by Mapbox serialization
                projectTypesStr: types.join(','),
                // Keep JS array on the feature object itself for grid filtering (not used by Mapbox)
                featured: p.Featured?.trim().toLowerCase() === 'featured'
              },
              // Attach types array directly on feature (accessible in JS, not Mapbox)
              _projectTypes: types
            };
          });

          // Master list — never mutated, used to restore pins on clear
          window.allProjectFeatures = features;

          // projectTypes lives only on _projectTypes (JS array, not in GeoJSON properties)
          // renderGrid reads f.properties.projectTypes — patch it here for grid use only
          features.forEach(f => { f.properties.projectTypes = f._projectTypes; });

          // Build clean GeoJSON for Mapbox — strip the JS-only array from properties
          const geoFeatures = features.map(f => ({
            type: 'Feature',
            geometry: f.geometry,
            properties: Object.assign({}, f.properties, { projectTypes: undefined })
          }));

          const projectGeo = { type: 'FeatureCollection', features: geoFeatures };
          map.addSource('projects', { type:'geojson', data:projectGeo, cluster:true, clusterMaxZoom:16, clusterRadius:35 });
          map.addLayer({ id:'clusters', type:'circle', source:'projects', filter:['has','point_count'], paint:{'circle-color':'#1FDF67','circle-radius':['step',['get','point_count'],20,100,30,750,40],'circle-stroke-width':2,'circle-stroke-color':'#fff'} });
          map.addLayer({ id:'cluster-count', type:'symbol', source:'projects', filter:['has','point_count'], layout:{'text-field':'{point_count_abbreviated}','text-size':12}, paint:{'text-color':'#ffffff'} });
          map.addLayer({ id:'unclustered-point', type:'circle', source:'projects', filter:['!',['has','point_count']], paint:{'circle-color':'#1FDF67','circle-radius':8,'circle-stroke-width':2,'circle-stroke-color':'#fff'} });
          map.addLayer({ id:'featured-glow', type:'circle', source:'projects', filter:['all',['!',['has','point_count']],['==',['get','featured'],true]], paint:{'circle-color':'transparent','circle-radius':16,'circle-blur':0.8,'circle-stroke-width':3,'circle-stroke-color':'#FFD300','circle-stroke-opacity':0.6} }, 'unclustered-point');

          map.on('click','clusters',e=>{if(stationPopup){stationPopup.remove();stationPopup=null;}const f=e.features[0];map.getSource('projects').getClusterExpansionZoom(f.properties.cluster_id,(err,z)=>map.flyTo({center:f.geometry.coordinates,zoom:z}));});
          map.on('click','unclustered-point',e=>{
            if(stationPopup){stationPopup.remove();stationPopup=null;}
            const raw = e.features[0];
            // Look up the full feature from master list (Mapbox serializes away JS arrays)
            const f = window.allProjectFeatures
              ? (window.allProjectFeatures.find(p => p.properties.title === raw.properties.title) || raw)
              : raw;
            gtag('event','project_click',{'project_name':f.properties.title,'project_city':f.properties.city,'project_featured':f.properties.featured||false,'click_source':'map_pin','device_type':isMobile?'mobile':'desktop'});
            showPopup(f);
          });

          renderGrid('gridDesktop');
          renderGrid('gridMobile');
          populateLocationFilter();
          updateDesktopSegmentLabels();
          updateMobileSegmentLabels();
          setupMobileDrawer();

          // ── Build city→state map via Mapbox reverse geocoding ──────────────
          // One API call per unique city using a representative coordinate.
          // Results cached in window.cityStateMap for autocomplete labels.
          (async () => {
            window.cityStateMap = window.cityStateMap || {};
            const token = mapboxgl.accessToken;
            // Collect one coordinate per city not yet cached
            const cityCoords = {};
            allProjectFeatures.forEach(f => {
              const city = f.properties.city;
              if (city && !window.cityStateMap[city] && !cityCoords[city]) {
                cityCoords[city] = f.geometry.coordinates; // [lng, lat]
              }
            });
            const entries = Object.entries(cityCoords);
            if (!entries.length) return;
            // Batch with a small delay between calls to avoid rate limits
            for (const [city, [lng, lat]] of entries) {
              try {
                const res = await fetch(
                  `https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?types=region&access_token=${token}`
                );
                const data = await res.json();
                const region = data.features?.[0];
                if (region) {
                  // Use short code like "FL", "NY", "TX" — strip country prefix
                  const code = region.properties?.short_code || '';
                  const state = code.replace(/^US-/i, '').toUpperCase();
                  window.cityStateMap[city] = state || region.text || '';
                }
              } catch (e) {
                // Silently skip on error — label will just show city name
              }
              await new Promise(r => setTimeout(r, 50)); // 50ms between calls
            }
          })();

          let updateTimeout;
          map.on('moveend', () => {
            const wasFlyingTo = window._mapFlyingTo;
            window._mapFlyingTo = false;
            if (wasFlyingTo) return; // programmatic flyTo — handled by map.once, skip debounce
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
              const dsort = document.getElementById('sortSelectDesktop')?.value;
              const msort = document.getElementById('sortSelectMobile')?.value;
              updateResultCount('gridDesktop');
              updateResultCount('gridMobile');
              if (!isMobile) {
                const sidebar = document.getElementById('desktopSidebar');
                const desktopSearch = document.getElementById('sidebarSearchBar');
                const hasActiveSearch = desktopSearch && desktopSearch.value.trim().length > 0;
                if (sidebar?.classList.contains('open') && dsort === 'default') {
                  if (hasActiveSearch && window.allProjectFeatures) {
                    renderFilteredGrid('gridDesktop', window.allProjectFeatures);
                  } else {
                    renderGrid('gridDesktop');
                  }
                }
              }
              if (isMobile) {
                const drawer = document.getElementById('mobileDrawer');
                const mobileSearch = document.getElementById('mobileSearchBar');
                const hasActiveSearch = mobileSearch && mobileSearch.value.trim().length > 0;
                if (drawer?.classList.contains('expanded') && msort === 'default') {
                  window.mobileLoadedCount = 12;
                  if (hasActiveSearch && (window.mobileSearchFeatures || window.allProjectFeatures)) {
                    renderFilteredGrid('gridMobile', window.mobileSearchFeatures || window.allProjectFeatures);
                  } else {
                    renderGrid('gridMobile');
                  }
                }
              }
            }, 300);
          });
          map.on('zoomend', () => {
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
              updateResultCount('gridDesktop');
              updateResultCount('gridMobile');
              if (!isMobile && document.getElementById('desktopSidebar')?.classList.contains('open')) renderGrid('gridDesktop');
            }, 300);
          });
        }
      });
    }

    document.getElementById('exitFullscreen').onclick = () => {
      document.getElementById('fullscreenModal').classList.remove('active');
      if (fullscreenMap) { map.setCenter(fullscreenMap.getCenter()); map.setZoom(fullscreenMap.getZoom()); }
    };
  </script>
