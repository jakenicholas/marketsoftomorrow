name: Generate Project Pages + Pulse

on:
  schedule:
    # Hourly so sheet edits land within ~1h max. (Was nightly, which made
    # manual edits feel broken because they didn't ship until 2am UTC.)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Manual trigger from the Actions tab. Use this after editing the sheet
    # to force a near-instant rebuild instead of waiting for the schedule.

# Cancel any in-flight runs when a new one starts. Without this, two
# back-to-back manual triggers could race and the older run's commit
# might overwrite the newer one.
concurrency:
  group: generate-pages-pulse
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 0 (NEW): Fetch projects.json from the private tmw-data repo
      # and flatten it into projects-flat.json. This is the new source of
      # truth for every downstream consumer (pulse, pages, intel, and
      # index.html via the live site). Used to be a Google Sheet CSV; the
      # CSV path is preserved as commented fallback in generate_pages.py
      # for rollback.
      - name: Fetch + flatten projects.json from tmw-data
        env:
          TMW_DATA_TOKEN: ${{ secrets.TMW_DATA_TOKEN }}
        run: python3 fetch_projects.py

      # Step order matters here:
      #
      # 1. Pulse FIRST. generate_pulse.py refreshes articles.json (pulls
      #    new RSS articles, runs orphan-slug reassignment for renamed
      #    projects, writes the final per-project article archive).
      #
      # 2. Pages SECOND. generate_pages.py reads articles.json from disk
      #    and embeds the Coverage section into each static project
      #    page. If pages ran first, every page would freeze with the
      #    PREVIOUS run's articles.json -- making the runtime project
      #    modal (which fetches articles.json fresh) and the static page
      #    show different article counts.
      #
      # 3. Intel THIRD. generate_intel.py is independent of the other two
      #    (reads the sheet fresh, writes intel.json from scratch). Runs
      #    last so a failure here doesn't block pulse/pages from shipping.
      #
      # Pulse pipeline: rebuild pulse.json (recent site activity feed) and
      # articles.json (per-project article archive used by Coverage section).
      # Reads RSS + the sheet, diffs against prior state, writes both JSONs.
      - name: Generate pulse + articles archive
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python3 generate_pulse.py

      # Static project pages: regenerate every /projects/<slug>/index.html
      # plus sitemap.xml + robots.txt from the Google Sheet AND the
      # just-updated articles.json.
      - name: Generate project pages
        run: python3 generate_pages.py

      # TMW Intelligence: compute time-to-completion estimates by finding
      # comparable completed projects in the same type + metro. Writes
      # intel.json which the map popup + project modal read at runtime.
      # If this fails (no eligible comparables, parse error, etc) the
      # site still works -- the intel block just doesn't render.
      - name: Generate intel.json
        run: python3 generate_intel.py
        continue-on-error: true

      # Firm profile pages: /architects/<slug>/ and /developers/<slug>/
      # Reads firms-flat.json (written by fetch_projects.py) + projects-flat.json +
      # articles.json. Skips firms with zero referenced projects. Non-blocking —
      # if this fails, the rest of the site still ships.
      - name: Generate architect + developer pages
        run: python3 generate_firm_pages.py
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          # Stage all outputs so we can detect any change. articles.json,
          # pulse.json, atlas.json, and intel.json need to be tracked too --
          # without them, manual sheet edits would update static pages but
          # other data would stay stale until the next nightly run.
          #
          # projects-flat.json is the flattened tmw-data snapshot (written
          # by fetch_projects.py at the top of this workflow). Committing
          # it means the live frontend always has a fresh public copy at
          # /projects-flat.json. Also serves as a useful audit trail: a
          # `git log projects-flat.json` shows exactly when each project
          # change rolled to the live map.
          #
          # .pulse-snapshot.json is the internal state file the pulse
          # generator diffs against on each run. It MUST be committed
          # so the next run knows what was already known -- otherwise
          # every run starts from a fresh empty snapshot, and renamed
          # projects (slug changed in the sheet) emit spurious "new
          # project added" events every hour. The orphan-rename detector
          # in generate_pulse.py handles single-run renames, but only
          # if it can see the previous state, which means the snapshot
          # has to live in the repo.
          git add projects/ architects/ developers/ sitemap.xml robots.txt pulse.json articles.json atlas.json intel.json projects-flat.json firms-flat.json .pulse-snapshot.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --staged --name-only | head -30
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PAGE_COUNT=$(git diff --staged --name-only | grep "projects/.*index.html" | wc -l)
          MSG="Auto-update: ${PAGE_COUNT} pages + pulse [skip ci]"
          git commit -m "$MSG"
          git push
