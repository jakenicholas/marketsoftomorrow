# File: .github/workflows/generate-digest.yml
# Runs weekly (Tuesday morning) to refresh digest-latest.html before the send.
# Does NOT send anything. Sending is a separate workflow (send-digest.yml,
# Tuesdays at 11:00 UTC) — this runs 5h ahead of it so the send has fresh HTML.

name: Generate Newsletter Digest

on:
  schedule:
    # Tuesdays at 06:00 UTC (1am EST / 2am EDT). pulse.json is refreshed hourly
    # by generate-pages.yml, so it's already current at run time.
    - cron: '0 6 * * 2'
  workflow_dispatch:

# contents: write -> push the refreshed digest back to main
# pages/id-token  -> deploy job publishes it to GitHub Pages (a GITHUB_TOKEN
#                    push does NOT trigger pages.yml, so we deploy in-workflow)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2 premailer

      - name: Generate digest
        run: python3 newsletter/generate_digest.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter/digest-latest.html newsletter/digest-subject.txt newsletter/digest-archive/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            # A GITHUB_TOKEN push does NOT trigger pages.yml (GitHub's
            # recursion guard), so this workflow deploys the result itself
            # in the deploy job below rather than relying on pages.yml.
            git commit -m "digest: nightly refresh"
            git push
          fi

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # Publish the refreshed digest (and whatever else is on main) to Pages,
  # in-workflow. Skipped when nothing changed. Shares the `pages`
  # concurrency group so it never deploys simultaneously with
  # generate-pages.yml or pages.yml.
  deploy:
    needs: build
    if: needs.build.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
