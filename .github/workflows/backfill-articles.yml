name: Backfill Articles Archive

# This workflow is MANUAL-ONLY. Trigger it from the Actions tab when you
# want to do a full rebuild of articles.json by pulling every published
# post from the Wix Blog REST API.
#
# Required GitHub Secrets:
#   WIX_API_KEY   — generated at https://manage.wix.com/account/api-keys
#                   with "Blog -> Read Blog" permission enabled
#   WIX_SITE_ID   — extracted from your Wix dashboard URL (after /dashboard/)

on:
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backfill script
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python3 backfill_articles.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backfill articles archive from Wix Blog API"
            git push
          fi
