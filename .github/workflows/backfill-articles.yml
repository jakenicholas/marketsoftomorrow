name: Backfill Articles Archive

# This workflow is MANUAL-ONLY. Trigger it from the Actions tab when you
# want to do a full rebuild of articles.json by pulling every published
# post from the Wix Blog REST API.
#
# Required GitHub Secrets:
#   WIX_API_KEY   — generated at https://manage.wix.com/account/api-keys
#                   with "Blog -> Read Blog" permission enabled
#   WIX_SITE_ID   — extracted from your Wix dashboard URL (after /dashboard/)

on:
  workflow_dispatch: {}

# Same concurrency group as the hourly job. Prevents the scheduled run
# from racing with a manual backfill -- whichever started first wins.
concurrency:
  group: generate-pages-pulse
  cancel-in-progress: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backfill script
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python3 backfill_articles.py

      # Regenerate static project pages so each /projects/<slug>/index.html
      # picks up the freshly-rebuilt articles.json in its Coverage section.
      # Without this step the Coverage section on static pages would stay
      # stale until the next hourly Generate Project Pages run.
      - name: Regenerate static project pages
        run: python3 generate_pages.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage everything that might have changed: articles.json plus
          # every regenerated project page + sitemap.
          git add articles.json projects/ sitemap.xml robots.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            PAGE_COUNT=$(git diff --cached --name-only | grep "projects/.*index.html" | wc -l || echo 0)
            git commit -m "Backfill articles archive + regen ${PAGE_COUNT} pages"
            git push
          fi
