name: Send Newsletter Digest (Draft)

on:
  # Manual trigger from Actions tab
  workflow_dispatch:

  # Tuesdays at 14:00 UTC (10am EDT / 9am EST)
  schedule:
    - cron: '0 14 * * 2'

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Resend draft
        env:
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID:     ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_AUDIENCE_LABELS: ${{ secrets.RESEND_AUDIENCE_LABELS }}
          RESEND_FROM:            ${{ secrets.RESEND_FROM }}
        run: python3 send_digest.py
