# File: .github/workflows/send-digest.yml
# Runs Tuesday morning to create a Resend DRAFT for human review.
# You receive an email from Resend, review the draft, hit send manually.

name: Send Newsletter Digest (Draft)

on:
  schedule:
    # Tuesdays at 14:00 UTC (9am EST / 10am EDT)
    - cron: '0 14 * * 2'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Resend draft
        env:
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_FROM:        ${{ secrets.RESEND_FROM }}
        run: python3 send_digest.py
