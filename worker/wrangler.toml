# Cloudflare Worker config for the Map of Tomorrow analytics backend.
# build-stamp: studio-v3 (coverage-links endpoint; CI deploy)
#
# This worker has two jobs:
#   1. Proxy authenticated requests to the GA4 Data API (using a service-account
#      JWT, NOT an API key — the GA4 Data API does not accept API keys).
#   2. Receive identified-user events from map.oftmw.com and persist them to a
#      Cloudflare D1 database, then serve them back to analytics.html for
#      per-member views (watchlist, activity feed, individual timelines).
#
# Deploying:
#   cd worker
#   npm install -g wrangler                # one time
#   wrangler login                          # one time
#   wrangler d1 create tmw_events          # one time — note the database_id
#   # paste the database_id below into [[d1_databases]].database_id
#   wrangler d1 execute tmw_events --remote --file=./schema.sql
#   wrangler secret put GA_SERVICE_ACCOUNT_JSON
#   # paste the entire contents of the service-account JSON file when prompted
#   wrangler deploy
#
# See README.md for the full runbook including the Google Cloud + GA4 steps.

name = "tmw"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Custom route — the existing worker is already published at this subdomain.
# Wrangler will keep using it on deploy. If you want a different name, change
# `name` above and the WORKER_URL in analytics.html / index.html will need to
# match the new <name>.<your-subdomain>.workers.dev URL.

[vars]
# Non-secret config. Edit if your GA4 property changes.
GA4_PROPERTY_ID = "467692471"
ALLOWED_ORIGINS = "https://map.oftmw.com,https://oftmw.com,https://www.oftmw.com,https://studio.oftmw.com,http://localhost:8000,http://127.0.0.1:8000"

# Wix RSS feed for the journal. After cutover, point this at whatever subdomain
# you publish the Wix site to (e.g. https://studio.oftmw.com/blog-feed.xml).
BLOG_FEED_URL = "https://www.oftmw.com/blog-feed.xml"

# Public base URL for R2 media. The bucket stays PRIVATE — media is served by
# the worker's own GET /media/<key> route (see handleMediaServe), so there's no
# world-readable r2.dev access to enable. To move to a clean custom domain
# later, bind media.oftmw.com to the worker (or the bucket) and repoint this —
# no re-migration needed since only the base changes.
MEDIA_PUBLIC_BASE = "https://pub-7da0281887564d10a10107987c7c6c0c.r2.dev"

# Cron trigger — drives the Wix → R2 media migration server-side every minute
# (see scheduled() in src/index.js). Self-pacing and resumable; it auto-pauses
# (sets sync_state migrate_auto='0') once everything is indexed and copied, so
# steady-state ticks are cheap no-ops. Re-arm any time with:
#   GET /admin/migrate-wix-media?auto=on
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "tmw_events"
# Fill this in after running `wrangler d1 create tmw_events`:
database_id = "81c16100-a129-47d8-902e-3b6b50d35089"

# R2 bucket — holds blog images uploaded via Studio. Create with:
#   wrangler r2 bucket create tmw-media
# Then enable public access in the Cloudflare dashboard:
#   R2 → tmw-media bucket → Settings → Public Access → "Allow Access"
# That gives you a https://pub-<hash>.r2.dev public URL — set it as
# MEDIA_PUBLIC_BASE below (no trailing slash).
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "tmw-media"

# Workers AI — embeddings for semantic retrieval (TMW Intelligence). Available on
# all accounts; no creation step.
[ai]
binding = "AI"

# Vectorize — the semantic index (created: tmw-knowledge, 768-dim, cosine =
# the bge-base-en-v1.5 embedding model). Powers /semantic-search + /admin/reindex.
[[vectorize]]
binding = "VECTORIZE"
index_name = "tmw-knowledge"

# Secrets (set via `wrangler secret put NAME`, not in this file):
#   GA_SERVICE_ACCOUNT_JSON   — full JSON contents of the GCP service-account key
#   EVENT_INGEST_TOKEN        — shared secret the map sends with every event
#                               POST so randoms can't forge events into your DB
#   ADMIN_TOKEN               — bearer token required to write to /list/:slug
#                               and /admin/* endpoints. Generate with:
#                                   openssl rand -hex 32
#                               then `wrangler secret put ADMIN_TOKEN`.
#   WIX_API_KEY               — Wix Headless API key for /admin/sync-wix.
#                               Generate in Wix Studio: Settings → Headless →
#                               API Keys → New key with Blog.READ-POSTS scope.
#                               Format: a long JWT-like string. Run:
#                                   wrangler secret put WIX_API_KEY
#   WIX_SITE_ID               — Your Wix site ID (UUID). Find in Wix Studio
#                               Settings → General → Site ID. Run:
#                                   wrangler secret put WIX_SITE_ID
#   WIX_ACCOUNT_ID            — Optional. Some endpoints need it. Find in
#                               Wix Studio account settings. Run:
#                                   wrangler secret put WIX_ACCOUNT_ID
#   MEMBERSTACK_SECRET_KEY    — Memberstack Admin API secret key (sk_...) for
#                               the /subscriptions revenue tiles on the map
#                               dashboard. Get it in Memberstack → Dev Tools →
#                               API Keys (the SECRET key, not the public pk_).
#                               Run:
#                                   wrangler secret put MEMBERSTACK_SECRET_KEY
#   STRIPE_SECRET_KEY         — Restricted Stripe key (read: subscriptions +
#                               charges) for authoritative subscription income
#                               on the map analytics tiles. Memberstack bills
#                               through Stripe, so this gives real MRR (annual
#                               amortized) + actual collected revenue. Run:
#                                   wrangler secret put STRIPE_SECRET_KEY
#   CF_ACCOUNT_ID             — Cloudflare account ID (the hex string in any
#                               dashboard URL: dash.cloudflare.com/<this>). Used
#                               for the Stream API (carousel video transcode). Run:
#                                   wrangler secret put CF_ACCOUNT_ID
#   STREAM_API_TOKEN          — Cloudflare API token with the "Stream:Edit"
#                               permission. Create at dash.cloudflare.com →
#                               My Profile → API Tokens → Create Token → custom →
#                               Account · Stream · Edit. Then:
#                                   wrangler secret put STREAM_API_TOKEN
